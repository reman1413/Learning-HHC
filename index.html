let _eeid='';
function openEmpModal(id){
  _eeid=id||'';const u=id?ls('users').find(x=>x.id===id):null;
  document.getElementById('md').innerHTML=`<div class="mo" onclick="cmo(event)"><div class="modal">
    <div class="mh"><h3>${id?'Edit Staff':'Add New Staff'}</h3><button class="mc" onclick="cmo()">✕</button></div>
    <div class="fg"><label>Full Name</label><input id="en" value="${u?u.name:''}"></div>
    <div class="fg2">
      <div><label>Employee Number</label><input id="ebid" value="${u?u.badge_id:''}"></div>
      <div><label>${u&&u.role==='admin'?'Password':'Iqama Number'}</label><input id="eiq" value="${u?u.iqama_number:''}"></div>
    </div>
    <div class="fg2">
      <div><label>File Number</label><input id="efn" value="${u?u.file_number||'':''}" placeholder="EMP-001"></div>
      <div><label>Email</label><input id="eem" type="email" value="${u?u.email||'':''}"></div>
    </div>
    <div class="fg"><label>Role</label><select id="erole">
      <option value="employee" ${!u||u.role==='employee'?'selected':''}>Employee</option>
      <option value="admin" ${u&&u.role==='admin'?'selected':''}>Admin</option>
    </select></div>
    <div style="display:flex;gap:12px;justify-content:flex-end"><button class="btn bg2" onclick="cmo()">Cancel</button><button class="btn bp" onclick="saveEmp()">💾 Save</button></div>
  </div></div>`
}
async function saveEmp(){
  const n0=document.getElementById('en').value.trim();
  const b=document.getElementById('ebid').value.trim();
  const iq=document.getElementById('eiq').value.trim();
  const fn=document.getElementById('efn').value.trim();
  const em=document.getElementById('eem').value.trim();
  const rl=document.getElementById('erole').value;
  if(!n0||!b||!iq){toast('Name, Employee Number and Password/Iqama are required','er');return}
  try{
    if(_eeid)await db.updUser(_eeid,{name:n0,badge_id:b,iqama_number:iq,file_number:fn,email:em,role:rl});
    else{
      const exists=await db.userByBadge(b);
      if(exists){toast('Employee number already used','er');return}
      await db.addUser({name:n0,badge_id:b,iqama_number:iq,file_number:fn,email:em,role:rl,created_at:n()});
    }
    toast(_eeid?'Updated! ✅':'Staff added! ✅','ok');cmo();pageAdminStaff();
  }catch(e){toast('❌ Error: '+e.message,'er');console.error(e);}
}
async function delEmp(id){if(confirm('Delete this user? This cannot be undone.')){await db.delUser(id);toast('Deleted','ok');pageAdminStaff()}}

async function pageAdminStaff1(uid){
  const users=await db.users(),u=users.find(x=>x.id===uid);if(!u){go('astaff');return}
  const secs=await db.sections(),comps=await db.completions(uid),atts=await db.attempts(uid),certs=await db.certs(uid);
  let blocks='';
  for(const sec of secs){
    const lecs=await db.lectures(sec.id);
    let lecRows='';
    let doneCount=0;
    for(const lec of lecs){
      const watched=comps.find(c=>c.lecture_id===lec.id);
      const lecAtts=atts.filter(a=>a.lecture_id===lec.id);
      const bestScore=lecAtts.length?Math.max(...lecAtts.map(a=>a.score)):null;
      const passed=lec.has_quiz?lecAtts.some(a=>a.passed):!!watched;
      if(watched&&passed)doneCount++;
      lecRows+=`<tr>
        <td>${lec.title}</td>
        <td>${watched?'<span class="bdg bdg-ok">✓ Yes</span>':'<span class="bdg" style="background:var(--err-l);color:#9F1239;border:1px solid #FCA5A5">✗ No</span>'}</td>
        <td>${lec.has_quiz?(bestScore!==null?`<strong style="color:${bestScore>=90?'var(--ok)':'var(--err)'}">${bestScore}%</strong>`:'<span style="color:var(--muted)">Not attempted</span>'):'<span style="color:var(--muted)">No quiz</span>'}</td>
        <td>${lec.has_quiz?(lecAtts.length||0):'—'}</td>
      </tr>`;
    }
    const cert=certs.find(c=>c.section_id===sec.id);
    const pct=lecs.length?Math.round(doneCount/lecs.length*100):0;
    blocks+=`<div class="card" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <h3 style="color:var(--ink);font-family:'Fraunces';font-weight:600;font-size:20px">${sec.title}</h3>
        <div style="display:flex;align-items:center;gap:14px">
          <div class="pbar" style="width:120px"><div class="pfill" style="width:${pct}%"></div></div>
          <strong style="color:var(--pu-d);font-family:'Readex Pro'">${pct}%</strong>
          ${cert?`<button class="btn bo bsm" onclick="go('cert',{id:'${cert.id}'},{page:'astaff1',par:{id:'${uid}'},label:'Back'})">🏆 Cert</button>`:''}
        </div>
      </div>
      ${lecs.length?`<div class="tw"><table><thead><tr><th>Lecture</th><th>Watched</th><th>Best Score</th><th>Attempts</th></tr></thead><tbody>${lecRows}</tbody></table></div>`:'<p style="color:var(--muted);font-size:13px">No lectures in this section yet</p>'}
    </div>`;
  }
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('adash')">Dashboard</a><span>›</span><a onclick="go('astaff')">Staff</a><span>›</span><span>${u.name}</span></div>
    <div class="ph"><div><h2>${u.name}</h2><p>Employee #${u.badge_id} · ${u.email||'No email'} · ${u.file_number||'No file #'}</p></div>
      <button class="btn bg2 bsm" onclick="openEmpModal('${u.id}')">✏ Edit</button></div>
    <div class="stats">
      <div class="stat"><div class="si">📚</div><div class="sv">${comps.length}</div><div class="sl">Watched</div></div>
      <div class="stat"><div class="si">📝</div><div class="sv">${atts.length}</div><div class="sl">Attempts</div></div>
      <div class="stat"><div class="si">✅</div><div class="sv">${atts.filter(a=>a.passed).length}</div><div class="sl">Passed</div></div>
      <div class="stat"><div class="si">🏆</div><div class="sv">${certs.length}</div><div class="sl">Certs</div></div>
    </div>
    ${blocks||'<div style="text-align:center;padding:48px;color:var(--muted);background:var(--card);border-radius:18px">No sections yet</div>'}
  </div><div id="md"></div>`
}

function cmo(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('md').innerHTML=''}
function toast(msg,type){
  const cls=type==='ok'?'ok':type==='er'?'er':'';
  const div=document.createElement('div');div.className='ti '+cls;div.textContent=msg;
  document.getElementById('toast').appendChild(div);
  setTimeout(()=>{div.style.animation='si .25s reverse';setTimeout(()=>div.remove(),250);},3500);
}
async function syncAll(){
  if(!SB)return;
  try{
    await Promise.all([db.users(),db.sections(),db.allCompletions(),db.allAttempts(),db.allCerts()]);
  }catch(e){console.warn('sync fail',e);}
}
async function syncThenRefresh(){if(SB){toast('Syncing...','');await syncAll();toast('Updated','ok');render();}else{render();}}
