// ────────────────────────────────────────────────────────────────
// SECTION 1 — PERMISSION SYSTEM
// Owner = badge_id '101466' (Reman) — full control, cannot be edited/deleted
// Admin = role 'admin' (others) — can add but cannot delete others' content
// ────────────────────────────────────────────────────────────────

const OWNER_BADGE = '101466';

function isOwner() {
  return U && U.badge_id === OWNER_BADGE;
}

function isAdmin() {
  return U && U.role === 'admin';
}

// Can delete a resource? Owner: always. Admin: only their own additions.
function canDelete(createdByBadge) {
  if (!U) return false;
  if (isOwner()) return true;
  // Admin can only delete things they created
  return isAdmin() && createdByBadge === U.badge_id;
}

// ────────────────────────────────────────────────────────────────
// SECTION 2 — ACTIVITY LOG
// Tracks every add/edit action by non-owner admins
// ────────────────────────────────────────────────────────────────

function logActivity(action, resourceType, resourceTitle) {
  if (!U || isOwner()) return; // don't log owner's own actions
  try {
    const logs = JSON.parse(localStorage.getItem('lms_activity_log') || '[]');
    logs.unshift({
      id: 'log_' + Date.now(),
      admin_id: U.id,
      admin_name: U.name,
      admin_badge: U.badge_id,
      action,           // 'added_lecture', 'added_staff', 'added_section', etc.
      resource_type: resourceType,
      resource_title: resourceTitle,
      timestamp: new Date().toISOString()
    });
    // Keep last 500 entries
    localStorage.setItem('lms_activity_log', JSON.stringify(logs.slice(0, 500)));
  } catch (e) { console.warn('Activity log error:', e); }
}

function getActivityLog() {
  try { return JSON.parse(localStorage.getItem('lms_activity_log') || '[]'); } catch { return []; }
}

function getUnseenLogCount() {
  const seen = parseInt(localStorage.getItem('lms_log_seen_count') || '0', 10);
  return Math.max(0, getActivityLog().length - seen);
}

function markLogSeen() {
  localStorage.setItem('lms_log_seen_count', String(getActivityLog().length));
}

// ────────────────────────────────────────────────────────────────
// SECTION 3 — ACKNOWLEDGEMENTS DB LAYER
// ────────────────────────────────────────────────────────────────

const ackDb = {
  getMemos() {
    try { return JSON.parse(localStorage.getItem('lms_memos') || '[]'); } catch { return []; }
  },
  saveMemos(arr) {
    localStorage.setItem('lms_memos', JSON.stringify(arr));
  },
  addMemo(memo) {
    const arr = this.getMemos();
    memo.id = 'memo_' + Date.now();
    memo.created_at = new Date().toISOString();
    memo.created_by = U ? U.badge_id : OWNER_BADGE;
    memo.created_by_name = U ? U.name : 'Admin';
    arr.unshift(memo);
    this.saveMemos(arr);
    return memo;
  },
  updateMemo(id, data) {
    const arr = this.getMemos().map(m => m.id === id ? { ...m, ...data } : m);
    this.saveMemos(arr);
  },
  deleteMemo(id) {
    this.saveMemos(this.getMemos().filter(m => m.id !== id));
    // Also delete signatures for this memo
    const sigs = this.getSignatures().filter(s => s.memo_id !== id);
    localStorage.setItem('lms_ack_sigs', JSON.stringify(sigs));
  },
  getSignatures() {
    try { return JSON.parse(localStorage.getItem('lms_ack_sigs') || '[]'); } catch { return []; }
  },
  saveSignatures(arr) {
    localStorage.setItem('lms_ack_sigs', JSON.stringify(arr));
  },
  sign(memoId, userId, userName, badgeId, iqama) {
    const sigs = this.getSignatures();
    if (sigs.find(s => s.memo_id === memoId && s.user_id === userId)) return false; // already signed
    sigs.push({
      id: 'sig_' + Date.now(),
      memo_id: memoId,
      user_id: userId,
      user_name: userName,
      badge_id: badgeId,
      iqama_confirmed: iqama,
      signed_at: new Date().toISOString()
    });
    this.saveSignatures(sigs);
    return true;
  },
  hasSigned(memoId, userId) {
    return this.getSignatures().some(s => s.memo_id === memoId && s.user_id === userId);
  },
  getSignaturesForMemo(memoId) {
    return this.getSignatures().filter(s => s.memo_id === memoId);
  }
};

async function signMemo(memoId) {
  const iqInput = document.getElementById('ack-iq-' + memoId);
  const cb = document.getElementById('ack-cb-' + memoId);
  const iq = iqInput ? iqInput.value.trim() : '';

  if (!cb || !cb.checked) { toast('Please check the acknowledgement box', 'er'); return; }
  if (!iq) { toast('Please enter your iqama number', 'er'); return; }
  if (iq !== U.iqama_number) { toast('❌ Incorrect iqama number — please try again', 'er'); return; }

  const ok = ackDb.sign(memoId, U.id, U.name, U.badge_id, iq);
  if (ok) {
    toast('✅ Memo acknowledged and signed!', 'ok');
    pageAcknowledgements();
  } else {
    toast('You have already signed this memo', '');
  }
}

let _pendingMemoFile = null;
function handleMemoFile(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('m-file-status');
  if (file.size > 5 * 1024 * 1024) { if (st) st.innerHTML = `<span style="color:var(--err)">⚠ File too large (max 5 MB)</span>`; return; }
  const reader = new FileReader();
  reader.onload = e => {
    _pendingMemoFile = { data: e.target.result, name: file.name, type: file.type };
    if (st) st.innerHTML = `<span style="color:var(--ok);font-weight:700">✅ ${file.name} ready</span>`;
  };
  reader.readAsDataURL(file);
}

function saveMemo(id) {
  const title = document.getElementById('m-title').value.trim();
  const body = document.getElementById('m-body').value.trim();
  const num = document.getElementById('m-num').value.trim();
  const dept = document.getElementById('m-dept').value.trim();
  const active = document.getElementById('m-active').checked;

  if (!title || !body) { toast('Title and body are required', 'er'); return; }

  const memoData = { title, body, memo_number: num, department: dept, active };

  if (_pendingMemoFile) {
    memoData.file_url = _pendingMemoFile.data;
    memoData.file_name = _pendingMemoFile.name;
    _pendingMemoFile = null;
  }

  if (id) {
    ackDb.updateMemo(id, memoData);
    toast('Memo updated! ✅', 'ok');
  } else {
    ackDb.addMemo(memoData);
    logActivity('added_memo', 'Memo', title);
    toast('Memo created! ✅', 'ok');
  }
  cmo();
  pageAdminMemos();
}

function deleteMemo(id) {
  if (!confirm('Delete this memo? All signatures will also be deleted.')) return;
  ackDb.deleteMemo(id);
  toast('Memo deleted', 'ok');
  pageAdminMemos();
}

// ────────────────────────────────────────────────────────────────
// SECTION 6 — ADMIN: MEMO SIGNATURE DETAIL PAGE
// ────────────────────────────────────────────────────────────────

async function openMemoDetail(memoId) {
  const memo = ackDb.getMemos().find(m => m.id === memoId);
  if (!memo) return;
  const users = await db.users();
  const employees = users.filter(u => u.role === 'employee');
  const sigs = ackDb.getSignaturesForMemo(memoId);
  const sigMap = {};
  sigs.forEach(s => { sigMap[s.user_id] = s; });

  const signed = employees.filter(e => sigMap[e.id]);
  const pending = employees.filter(e => !sigMap[e.id]);
  const pct = employees.length ? Math.round(signed.length / employees.length * 100) : 0;

  const signedRows = signed.map(e => {
    const sig = sigMap[e.id];
    const dt = new Date(sig.signed_at).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `<tr>
      <td><strong>${e.name}</strong></td>
      <td><span class="chip cd">#${e.badge_id}</span></td>
      <td style="font-size:12.5px;color:var(--muted)">${e.file_number || '—'}</td>
      <td><span class="bdg bdg-ok">✓ ${dt}</span></td>
    </tr>`;
  }).join('');

  const pendingRows = pending.map(e => `<tr>
    <td><strong>${e.name}</strong></td>
    <td><span class="chip cd">#${e.badge_id}</span></td>

async function exportMemoSignatures(memoId) {
  const memo = ackDb.getMemos().find(m => m.id === memoId);
  const users = await db.users();
  const employees = users.filter(u => u.role === 'employee');
  const sigs = ackDb.getSignaturesForMemo(memoId);
  const sigMap = {};
  sigs.forEach(s => { sigMap[s.user_id] = s; });

  const rows = [['Memo', 'Employee Name', 'Employee #', 'File #', 'Status', 'Signed At']];
  employees.forEach(e => {
    const sig = sigMap[e.id];
    rows.push([
      memo.title,
      e.name,
      e.badge_id,
      e.file_number || '—',
      sig ? 'Signed' : 'Pending',
      sig ? new Date(sig.signed_at).toLocaleString() : '—'
    ]);
  });

  const q = v => '"' + String(v).split('"').join('""') + '"';
  const nl = '\r\n';
  const csv = rows.map(r => r.map(q).join(',')).join(nl);
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'Memo_Signatures_' + memo.title.replace(/\s+/g, '_').slice(0, 30) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('Exported! ✅', 'ok');
}

  const users = await db.users();

  if (!isOwner() && target && target.role === 'admin') {

};
