function handleAdminUpload(lid,input,isVideo){
  const file=input.files[0]; if(!file) return;
  const st=document.getElementById('up-status');
  const maxBytes=(isVideo?50:8)*1024*1024;
  if(file.size>maxBytes){ if(st) st.innerHTML=`<span style="color:var(--err)">⚠ File too large (${(file.size/1048576).toFixed(1)} MB). Max ${isVideo?50:8} MB.</span>`; return; }
  if(st) st.textContent='Reading file...';
  const reader=new FileReader();
  reader.onload=e=>{
    _pendingFile={data:e.target.result,name:file.name,type:file.type,size:file.size};
    const uz=document.getElementById('uz');
    if(uz){ uz.classList.add('has-file'); uz.innerHTML=`<div style="font-size:38px;margin-bottom:8px">✅</div><div style="font-weight:700;color:#065F46">${file.name}</div><div style="font-size:12px;color:var(--muted);margin-top:5px">${(file.size/1048576).toFixed(2)} MB</div>`; }
    if(st) st.innerHTML=`<span style="color:var(--ok);font-weight:700">✅ Ready to save</span>`;
    const btn=document.getElementById('save-btn'); if(btn) btn.disabled=false;
  };
  reader.onerror=()=>{ if(st) st.innerHTML=`<span style="color:var(--err)">❌ Error reading file</span>`; };
  reader.readAsDataURL(file);
}
async function finishUpload(lid){
  if(!_pendingFile){ toast('No file','er'); return; }
  const btn=document.getElementById('save-btn');
  if(btn){ btn.disabled=true; btn.textContent='Uploading...'; }
  try{
    if(SB){
      const path='lectures/'+lid+'/'+_pendingFile.name;
      const byteStr=atob(_pendingFile.data.split(',')[1]);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:_pendingFile.type});
      const{error}=await SB.storage.from('lms-files').upload(path,blob,{upsert:true,contentType:_pendingFile.type});
      if(error) throw new Error(error.message);
      const{data}=SB.storage.from('lms-files').getPublicUrl(path);
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type,file_path:data.publicUrl});
      saveFile(lid,{..._pendingFile,url:data.publicUrl});
      toast('✅ Uploaded to cloud!','ok');
    } else {
      const ok=saveFile(lid,_pendingFile);
      if(!ok) throw new Error('Browser storage full. Connect Supabase to upload larger files.');
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type});
      toast('✅ File uploaded!','ok');
    }
    _pendingFile=null; cmo(); pageAdminLectures(PAR.id);
  } catch(e){ toast('❌ '+e.message,'er'); if(btn){ btn.disabled=false; btn.textContent='💾 Save'; } }
}

async function saveLec(){
  const t=document.getElementById('lt').value.trim();
  const type=document.getElementById('ltype').value;
  const url=type==='youtube'?(document.getElementById('lurl').value.trim()):'';
  const hq=document.getElementById('lhq').checked;
  const seqStep=parseInt(document.getElementById('lreq')?.value||'0',10)||0;
  const isPrereq=seqStep===1;
  const qc=parseInt(document.getElementById('lqc')?.value||'10');
  const qp=parseInt(document.getElementById('lqp')?.value||'100');
  if(!t){ toast('Enter a title','er'); return; }
  const fullData={title:t,type,url,has_quiz:hq,quiz_count:qc,quiz_pass_pct:qp,is_prerequisite:isPrereq,sequence_step:seqStep,created_by:U?U.badge_id:OWNER_BADGE};
  try{
    const lecs=await db.lectures(_elsid);
    let savedId=_elid;
    try{
      if(_elid) await db.updLecture(_elid,fullData);
      else{ const newLec=await db.addLecture({section_id:_elsid,...fullData,order_num:lecs.length+1,created_at:n()}); savedId=newLec?.id||(ls('lectures').slice(-1)[0]?.id); logActivity('added_lecture','Lecture',t); }
    } catch(e){
      const msg=e.message||'';
      if(/is_prerequisite|sequence_step|quiz_pass_pct/i.test(msg)){
        const basicData={title:t,type,url,has_quiz:hq,quiz_count:qc};
        if(_elid) await db.updLecture(_elid,basicData);
        else{ const newLec=await db.addLecture({section_id:_elsid,...basicData,order_num:lecs.length+1,created_at:n()}); savedId=newLec?.id||(ls('lectures').slice(-1)[0]?.id); }
      } else { throw e; }
    }
    if(savedId){
      setSeqOv(savedId,{is_prerequisite:isPrereq,sequence_step:seqStep});
      ls2('lectures',ls('lectures').map(l=>l.id===savedId?{...l,is_prerequisite:isPrereq,sequence_step:seqStep,quiz_pass_pct:qp,created_by:U?U.badge_id:OWNER_BADGE}:l));

    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    let qText='', opts={}, correct='', foundQ=false;
    for(const line of lines){
      if(/^Q[:\.\)]/i.test(line)){ qText=line.replace(/^Q[:\.\)]\s*/i,'').trim(); foundQ=true; }
      else if(/^A[:\.\)]/i.test(line)) opts.a=line.replace(/^A[:\.\)]\s*/i,'').trim();
      else if(/^B[:\.\)]/i.test(line)) opts.b=line.replace(/^B[:\.\)]\s*/i,'').trim();
      else if(/^C[:\.\)]/i.test(line)) opts.c=line.replace(/^C[:\.\)]\s*/i,'').trim();
      else if(/^D[:\.\)]/i.test(line)) opts.d=line.replace(/^D[:\.\)]\s*/i,'').trim();
      else if(/^Correct[:\s]/i.test(line)) correct=line.replace(/^Correct[:\s]+/i,'').trim().toLowerCase().charAt(0);
    }
    if(!foundQ){ errors.push(`Block ${i+1}: Missing question (Q: ...)`); return; }
    if(!opts.a||!opts.b||!opts.c||!opts.d){ errors.push(`Q${i+1}: Missing options A/B/C/D`); return; }
    if(!['a','b','c','d'].includes(correct)){ errors.push(`Q${i+1}: Invalid correct answer`); return; }
    questions.push({question_text:qText,option_a:opts.a,option_b:opts.b,option_c:opts.c,option_d:opts.d,correct_answer:correct});
  });
  return{questions,errors};
}
function previewBulk(){
  const{questions,errors}=parseBulkQuestions(document.getElementById('bulk-text').value);
  let html='';
  if(errors.length) html+=`<div class="al" style="background:var(--err-l);color:#9F1239;border-color:#FCA5A5">⚠ <strong>${errors.length} issue${errors.length>1?'s':''}:</strong><br>${errors.join('<br>')}</div>`;
  if(questions.length){
    html+=`<div class="al al-ok">✅ Parsed <strong>${questions.length} question${questions.length>1?'s':''}</strong> ready to save</div>`;
    html+=`<div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:11px;padding:14px;background:var(--pu-mist)">`;
    questions.forEach((q,i)=>{

        <strong>Q${i+1}.</strong> ${q.question_text}<br>
        ${['a','b','c','d'].map(k=>`<span style="color:${q.correct_answer===k?'var(--ok)':'var(--muted)'};">${k.toUpperCase()}) ${q['option_'+k]}</span>`).join('<br>')}
        <span style="margin-left:8px;color:var(--ok);font-weight:700">✓ ${q.correct_answer.toUpperCase()}</span>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById('bulk-preview').innerHTML=html;
}
async function saveBulk(){
  const{questions,errors}=parseBulkQuestions(document.getElementById('bulk-text').value);
  if(errors.length){ toast(`⚠ Fix ${errors.length} error${errors.length>1?'s':''} first`,'er'); previewBulk(); return; }
  if(!questions.length){ toast('No valid questions found','er'); return; }
  if(!confirm(`Add ${questions.length} questions?`)) return;
  let added=0;
  for(const q of questions){ try{ await db.addQuestion({lecture_id:_bulkLid,...q,created_at:n()}); added++; } catch(e){ console.error('Q save:',e); } }

}

    <div class="card">
      <h3 style="margin-bottom:14px;font-family:'Fraunces';font-weight:600;color:var(--ink);font-size:20px">⚙ Admins (<span id="adm-count">${adms.length}</span>)</h3>
      <div class="tw"><table><thead><tr><th>Name</th><th>Employee #</th><th>Password</th><th>File #</th><th>Role</th><th>Actions</th></tr></thead>
      <tbody>${adms.map(renderRow).join('')||'<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">No admins</td></tr>'}</tbody></table></div>
    </div>
  </div><div id="md"></div>`;
}
let _eeid='';
function openEmpModal(id){
  _eeid=id||''; const u=id?ls('users').find(x=>x.id===id):null;
  // Protect owner — only owner can edit their own account
  if(u&&u.badge_id===OWNER_BADGE&&!isOwner()){ toast('⚠ The owner account can only be edited by the owner','er'); return; }
  document.getElementById('md').innerHTML=`<div class="mo" onclick="cmo(event)"><div class="modal">
    <div class="mh"><h3>${id?'Edit Staff':'Add New Staff'}</h3><button class="mc" onclick="cmo()">✕</button></div>
    <div class="fg"><label>Full Name</label><input id="en" value="${u?u.name:''}"></div>
    <div class="fg2">
      <div><label>Employee Number</label><input id="ebid" value="${u?u.badge_id:''}" ${u&&u.badge_id===OWNER_BADGE?'readonly style="background:#f5f5f5;cursor:not-allowed"':''}></div>
      <div><label>${u&&u.role==='admin'?'Password':'Iqama Number'}</label><input id="eiq" value="${u?u.iqama_number:''}"></div>
    </div>
    <div class="fg2">
      <div><label>File Number</label><input id="efn" value="${u?u.file_number||'':''}" placeholder="EMP-001"></div>
      <div><label>Email</label><input id="eem" type="email" value="${u?u.email||'':''}"></div>
    </div>
    <div class="fg"><label>Role</label><select id="erole" ${u&&u.badge_id===OWNER_BADGE?'disabled':''}> 
      <option value="employee" ${!u||u.role==='employee'?'selected':''}>Employee</option>
      <option value="admin" ${u&&u.role==='admin'?'selected':''}>Admin</option>
    </select></div>
    <div style="display:flex;gap:12px;justify-content:flex-end"><button class="btn bg2" onclick="cmo()">Cancel</button><button class="btn bp" onclick="saveEmp()">💾 Save</button></div>
  </div></div>`;
}
async function saveEmp(){
  const n0=document.getElementById('en').value.trim();
  const b=document.getElementById('ebid').value.trim();
  const iq=document.getElementById('eiq').value.trim();
  const fn=document.getElementById('efn').value.trim();
  const em=document.getElementById('eem').value.trim();
  const rl=document.getElementById('erole').value;
  if(!n0||!b||!iq){ toast('Name, Employee Number and Password/Iqama are required','er'); return; }
  try{
    if(_eeid) await db.updUser(_eeid,{name:n0,badge_id:b,iqama_number:iq,file_number:fn,email:em,role:rl});
    else{
      const exists=await db.userByBadge(b); if(exists){ toast('Employee number already used','er'); return; }
      await db.addUser({name:n0,badge_id:b,iqama_number:iq,file_number:fn,email:em,role:rl,created_at:n(),created_by:U?U.badge_id:OWNER_BADGE});
      logActivity('added_staff','Staff',n0);
    }
    toast(_eeid?'Updated! ✅':'Staff added! ✅','ok'); cmo(); pageAdminStaff();
  } catch(e){ toast('❌ Error: '+e.message,'er'); }
}
async function delEmp(id){
  const users=await db.users();
  const target=users.find(u=>u.id===id);
  if(target&&target.badge_id===OWNER_BADGE){ toast('⚠ The owner account cannot be deleted','er'); return; }
  if(target&&target.role==='admin'&&!isOwner()){ toast('⚠ Only the owner can delete admin accounts','er'); return; }
  if(confirm('Delete this user? Cannot be undone.')){ await db.delUser(id); toast('Deleted','ok'); pageAdminStaff(); }
}
function filterStaff(query){
  const q=(query||'').toLowerCase().trim();
  const rows=document.querySelectorAll('.staff-row');
  let visible=0, empVis=0, admVis=0;
  rows.forEach(r=>{ const text=r.getAttribute('data-search')||''; const isAdm=r.querySelector('.bdg'); const show=!q||text.includes(q); r.style.display=show?'':'none'; if(show){ visible++; if(isAdm) admVis++; else empVis++; } });
  const cnt=document.getElementById('staff-count'); if(cnt) cnt.textContent=q?(visible+' match'+(visible===1?'':'es')):visible;
  const ec=document.getElementById('emp-count'); if(ec) ec.textContent=empVis;
  const ac=document.getElementById('adm-count'); if(ac) ac.textContent=admVis;
}
async function pageAdminStaff1(uid){
  const users=await db.users(), u=users.find(x=>x.id===uid); if(!u){ go('astaff'); return; }
  const secs=await db.sections(), comps=await db.completions(uid), atts=await db.attempts(uid), certs=await db.certs(uid);
  let blocks='';
  for(const sec of secs){
    const lecs=await db.lectures(sec.id);
    let lecRows='', doneCount=0;
    for(const lec of lecs){
      const watched=comps.find(c=>c.lecture_id===lec.id);
      const lecAtts=atts.filter(a=>a.lecture_id===lec.id);
      const bestScore=lecAtts.length?Math.max(...lecAtts.map(a=>a.score)):null;
      const passed=lec.has_quiz?lecAtts.some(a=>a.passed):!!watched;
      if(watched&&passed) doneCount++;
      lecRows+=`<tr><td>${lec.title}</td>
        <td>${watched?'<span class="bdg bdg-ok">✓ Yes</span>':'<span class="bdg" style="background:var(--err-l);color:#9F1239;border:1px solid #FCA5A5">✗ No</span>'}</td>
        <td>${lec.has_quiz?(bestScore!==null?`<strong style="color:${bestScore>=90?'var(--ok)':'var(--err)'}">${bestScore}%</strong>`:'<span style="color:var(--muted)">Not attempted</span>'):'<span style="color:var(--muted)">No quiz</span>'}</td>
        <td>${lec.has_quiz?(lecAtts.length||0):'—'}</td></tr>`;
    }
    const cert=certs.find(c=>c.section_id===sec.id);
    const pct=lecs.length?Math.round(doneCount/lecs.length*100):0;
    blocks+=`<div class="card" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <h3 style="color:var(--ink);font-family:'Fraunces';font-weight:600;font-size:20px">${sec.title}</h3>
        <div style="display:flex;align-items:center;gap:14px">
          <div class="pbar" style="width:120px"><div class="pfill" style="width:${pct}%"></div></div>
          <strong style="color:var(--pu-d);font-family:'Readex Pro'">${pct}%</strong>
          ${cert?`<button class="btn bo bsm" onclick="go('cert',{id:'${cert.id}'},{page:'astaff1',par:{id:'${uid}'},label:'Back'})">🏆 Cert</button>`:''}
        </div>
      </div>
      ${lecs.length?`<div class="tw"><table><thead><tr><th>Lecture</th><th>Watched</th><th>Best Score</th><th>Attempts</th></tr></thead><tbody>${lecRows}</tbody></table></div>`:'<p style="color:var(--muted);font-size:13px">No lectures yet</p>'}
    </div>`;
  }
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('adash')">Dashboard</a><span>›</span><a onclick="go('astaff')">Staff</a><span>›</span><span>${u.name}</span></div>
    <div class="ph"><div><h2>${u.name}</h2><p>Employee #${u.badge_id} · ${u.email||'No email'} · ${u.file_number||'No file #'}</p></div>
      <button class="btn bg2 bsm" onclick="openEmpModal('${u.id}')">✏ Edit</button></div>
    <div class="stats">
      <div class="stat"><div class="si">📚</div><div class="sv">${comps.length}</div><div class="sl">Watched</div></div>
      <div class="stat"><div class="si">📝</div><div class="sv">${atts.length}</div><div class="sl">Attempts</div></div>
      <div class="stat"><div class="si">✅</div><div class="sv">${atts.filter(a=>a.passed).length}</div><div class="sl">Passed</div></div>
      <div class="stat"><div class="si">🏆</div><div class="sv">${certs.length}</div><div class="sl">Certs</div></div>
    </div>
    ${blocks||'<div style="text-align:center;padding:48px;color:var(--muted);background:var(--card);border-radius:18px">No sections yet</div>'}
  </div><div id="md"></div>`;
}

// ════════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════════
function cmo(e){ if(e&&e.target!==e.currentTarget) return; document.getElementById('md').innerHTML=''; }
function toast(msg,type){
  const cls=type==='ok'?'ok':type==='er'?'er':'';
  const div=document.createElement('div'); div.className='ti '+cls; div.textContent=msg;
  document.getElementById('toast').appendChild(div);
  setTimeout(()=>{ div.style.animation='si .25s reverse'; setTimeout(()=>div.remove(),250); },3500);
}
async function syncAll(){
  if(!SB) return;
  try{ await Promise.all([db.users(),db.sections(),db.allCompletions(),db.allAttempts(),db.allCerts()]); } catch(e){ console.warn('sync fail',e); }
}
async function syncThenRefresh(){ if(SB){ toast('Syncing...',''); await syncAll(); toast('Updated','ok'); render(); } else { render(); } }

// ════════════════════════════════════════════════════════════════
// INITIALIZATION
// ════════════════════════════════════════════════════════════════
window.addEventListener('load',async()=>{
  if(!localStorage.getItem('lms_setup_seen')&&!SB_URL){
    localStorage.setItem('lms_setup_seen','1'); PAGE='setup';
  } else {
    PAGE=U?'home':'login';
  }
  if(SB) await syncAll();
  render();
});
</script>
