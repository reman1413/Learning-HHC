<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ════════════════════════════════════════════════════════════════
const SB_URL = localStorage.getItem('sb_url') || 'https://rwnbniuccbxqxdjszayl.supabase.co';
const SB_KEY = localStorage.getItem('sb_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3bmJuaXVjY2J4cXhkanN6YXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTU3MzAsImV4cCI6MjA5MjAzMTczMH0.bKW5zsJ2TDJhigpxucNQ-Ay2M3ZwjHLbErkx322fz-k';
let SB = null;
let DEMO_MODE = true;

if (SB_URL && SB_KEY) {
  try {
    SB = window.supabase.createClient(SB_URL, SB_KEY);
    DEMO_MODE = false;
  } catch(e) { console.warn('Supabase init failed', e); }
}

// ════════════════════════════════════════════════════════════════
// LOCAL STORAGE (demo / fallback)
// ════════════════════════════════════════════════════════════════
function ls(k){try{return JSON.parse(localStorage.getItem('lms_'+k)||'[]')}catch{return[]}}
function ls2(k,v){localStorage.setItem('lms_'+k,JSON.stringify(v))}
function n(){return new Date().toISOString()}
function uid(){return 'id'+Date.now()+Math.floor(Math.random()*9999)}
function saveFile(lid,d){try{localStorage.setItem('lms_f_'+lid,JSON.stringify(d));return true}catch{return false}}
function getFile(lid){try{return JSON.parse(localStorage.getItem('lms_f_'+lid)||'null')}catch{return null}}
function delFile(lid){localStorage.removeItem('lms_f_'+lid)}

function seed(){
  if(ls('seeded').length)return;
  ls2('users',[
    {id:'u0',badge_id:'101466',name:'Reman Badawood',email:'reman@meenahealth.com',iqama_number:'2000000000',file_number:'ADM-001',role:'admin',created_at:n()}
  ]);
  ls2('sections',[]);ls2('lectures',[]);ls2('questions',[]);
  ls2('completions',[]);ls2('attempts',[]);ls2('certs',[]);ls2('seeded',[1]);
}
seed();

// ════════════════════════════════════════════════════════════════
// DB LAYER — Supabase or localStorage
// ════════════════════════════════════════════════════════════════
const db = {
  // ── USERS ──
  async users(){
    if(SB){
      const{data,error}=await SB.from('lms_users').select('*');
      if(!error&&data){ls2('users',data);return data;}
    }
    return ls('users');
  },
  async userByBadge(bid){
    if(SB){const{data}=await SB.from('lms_users').select('*').eq('badge_id',bid).single();return data||null}
    return ls('users').find(u=>u.badge_id===bid)||null;
  },
  async addUser(u){
    if(SB){
      const {data,error}=await SB.from('lms_users').insert(u).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('users');a.push(data);ls2('users',a);
      return data;
    }
    u.id=uid();let a=ls('users');a.push(u);ls2('users',a);return u;
  },
  async updUser(id,d){
    if(SB){
      const {error}=await SB.from('lms_users').update(d).eq('id',id);
      if(error)throw new Error('Update failed: '+error.message);
    }
    ls2('users',ls('users').map(u=>u.id===id?{...u,...d}:u));
  },
  async delUser(id){
    if(SB){
      const {error}=await SB.from('lms_users').delete().eq('id',id);
      if(error)throw new Error('Delete failed: '+error.message);
    }
    ls2('users',ls('users').filter(u=>u.id!==id));
  },
  // ── SECTIONS ──
  async sections(){
    if(SB){
      const{data,error}=await SB.from('lms_sections').select('*').order('order_num');
      if(!error&&data){ls2('sections',data);return data;}
    }
    return ls('sections').sort((a,b)=>a.order_num-b.order_num);
  },
  async addSection(s){
    if(SB){
      const {data,error}=await SB.from('lms_sections').insert(s).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('sections');a.push(data);ls2('sections',a);
      return data;
    }
    s.id=uid();let a=ls('sections');a.push(s);ls2('sections',a);return s;
  },
  async updSection(id,d){
    if(SB){
      const {error}=await SB.from('lms_sections').update(d).eq('id',id);
      if(error)throw new Error('Update failed: '+error.message);
    }
    ls2('sections',ls('sections').map(s=>s.id===id?{...s,...d}:s));
  },
  async delSection(id){
    if(SB){await SB.from('lms_sections').delete().eq('id',id)}
    else{
      ls2('sections',ls('sections').filter(s=>s.id!==id));
      const lids=ls('lectures').filter(l=>l.section_id===id).map(l=>l.id);
      lids.forEach(lid=>delFile(lid));
      ls2('lectures',ls('lectures').filter(l=>l.section_id!==id));
      ls2('questions',ls('questions').filter(q=>!lids.includes(q.lecture_id)));
    }
  },
  // ── LECTURES ──
  async lectures(sid){
    if(SB){
      const{data,error}=await SB.from('lms_lectures').select('*').eq('section_id',sid).order('order_num');
      if(!error&&data){
        const others=ls('lectures').filter(l=>l.section_id!==sid);
        ls2('lectures',[...others,...data]);
        return data;
      }
    }
    return ls('lectures').filter(l=>l.section_id===sid).sort((a,b)=>a.order_num-b.order_num);
  },
  async lecture(id){
    if(SB){const{data}=await SB.from('lms_lectures').select('*').eq('id',id).single();return data||null}
    return ls('lectures').find(l=>l.id===id)||null;
  },
  async addLecture(l){
    if(SB){
      const {data,error}=await SB.from('lms_lectures').insert(l).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('lectures');a.push(data);ls2('lectures',a);
      return data;
    }
    l.id=uid();let a=ls('lectures');a.push(l);ls2('lectures',a);return l;
  },
  async updLecture(id,d){
    if(SB){
      const {error}=await SB.from('lms_lectures').update(d).eq('id',id);
      if(error)throw new Error('Update failed: '+error.message);
    }
    ls2('lectures',ls('lectures').map(l=>l.id===id?{...l,...d}:l));
  },
  async delLecture(id){
    if(SB){
      const {error}=await SB.from('lms_lectures').delete().eq('id',id);
      if(error)throw new Error('Delete failed: '+error.message);
    }
    delFile(id);ls2('lectures',ls('lectures').filter(l=>l.id!==id));ls2('questions',ls('questions').filter(q=>q.lecture_id!==id));
  },
  // ── QUESTIONS ──
  async questions(lid){
    if(SB){
      const{data,error}=await SB.from('lms_questions').select('*').eq('lecture_id',lid);
      if(!error&&data){
        const others=ls('questions').filter(q=>q.lecture_id!==lid);
        ls2('questions',[...others,...data]);
        return data;
      }
    }
    return ls('questions').filter(q=>q.lecture_id===lid);
  },
  async addQuestion(q){
    if(SB){
      const {data,error}=await SB.from('lms_questions').insert(q).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('questions');a.push(data);ls2('questions',a);
      return data;
    }
    q.id=uid();let a=ls('questions');a.push(q);ls2('questions',a);return q;
  },
  async updQuestion(id,d){
    if(SB){
      const {error}=await SB.from('lms_questions').update(d).eq('id',id);
      if(error)throw new Error('Update failed: '+error.message);
    }
    ls2('questions',ls('questions').map(q=>q.id===id?{...q,...d}:q));
  },
  async delQuestion(id){
    if(SB){
      const {error}=await SB.from('lms_questions').delete().eq('id',id);
      if(error)throw new Error('Delete failed: '+error.message);
    }
    ls2('questions',ls('questions').filter(q=>q.id!==id));
  },
  // ── COMPLETIONS ──
  async completions(uid){
    if(SB){const{data}=await SB.from('lms_completions').select('*').eq('user_id',uid);return data||[]}
    return ls('completions').filter(c=>c.user_id===uid);
  },
  async allCompletions(){
    if(SB){const{data}=await SB.from('lms_completions').select('*');return data||[]}
    return ls('completions');
  },
  async addCompletion(c){
    if(SB){await SB.from('lms_completions').upsert({user_id:c.user_id,lecture_id:c.lecture_id,completed_at:c.completed_at},{onConflict:'user_id,lecture_id'});}
    let a=ls('completions');if(!a.find(x=>x.user_id===c.user_id&&x.lecture_id===c.lecture_id)){c.id=c.id||uid();a.push(c);ls2('completions',a);}
  },
  async isCompleted(uid,lid){
    if(SB){const{data}=await SB.from('lms_completions').select('id').eq('user_id',uid).eq('lecture_id',lid).single();return!!data}
    return ls('completions').some(c=>c.user_id===uid&&c.lecture_id===lid);
  },
  // ── ATTEMPTS ──
  async attempts(uid){
    if(SB){const{data}=await SB.from('lms_attempts').select('*').eq('user_id',uid);return data||[]}
    return ls('attempts').filter(a=>a.user_id===uid);
  },
  async allAttempts(){
    if(SB){const{data}=await SB.from('lms_attempts').select('*');return data||[]}
    return ls('attempts');
  },
  async addAttempt(a){
    if(SB){await SB.from('lms_attempts').insert({user_id:a.user_id,lecture_id:a.lecture_id,score:a.score,passed:a.passed,attempted_at:a.attempted_at});}
    a.id=a.id||uid();let arr=ls('attempts');arr.push(a);ls2('attempts',arr);
  },
  async hasPassed(uid,lid){
    if(SB){const{data}=await SB.from('lms_attempts').select('id').eq('user_id',uid).eq('lecture_id',lid).eq('passed',true).single();return!!data}
    return ls('attempts').some(a=>a.user_id===uid&&a.lecture_id===lid&&a.passed);
  },
  // ── CERTS ──
  async certs(uid){
    if(SB){const{data}=await SB.from('lms_certs').select('*').eq('user_id',uid);return data||[]}
    return ls('certs').filter(c=>c.user_id===uid);
  },
  async allCerts(){
    if(SB){const{data}=await SB.from('lms_certs').select('*');return data||[]}
    return ls('certs');
  },
  async certById(id){
    if(SB){const{data}=await SB.from('lms_certs').select('*').eq('id',id).single();return data||null}
    return ls('certs').find(c=>c.id===id)||null;
  },
  async addCert(c){
    if(SB){
      const {data,error}=await SB.from('lms_certs').insert(c).select().single();
      if(!error&&data){let a=ls('certs');a.push(data);ls2('certs',a);return data;}
    }
    c.id=uid();let a=ls('certs');a.push(c);ls2('certs',a);return c;
  },
  // ── FILE UPLOAD to Supabase Storage ──
  async uploadFile(lid, file, progressCb){
    if(SB){
      const path=`lectures/${lid}/${file.name}`;
      const{error}=await SB.storage.from('lms-files').upload(path,file,{upsert:true});
      if(error)throw error;
      const{data}=SB.storage.from('lms-files').getPublicUrl(path);
      return{url:data.publicUrl,name:file.name,type:file.type,size:file.size};
    }else{
      // localStorage base64
      return new Promise((res,rej)=>{
        const reader=new FileReader();
        reader.onload=e=>{
          const ok=saveFile(lid,{data:e.target.result,name:file.name,type:file.type,size:file.size});
          if(ok)res({url:null,name:file.name,type:file.type,size:file.size});
          else rej(new Error('Storage full'));
        };
        reader.onerror=()=>rej(new Error('Read failed'));
        reader.readAsDataURL(file);
      });
    }
  },
  getFileUrl(lid){
    if(SB){const lec=ls('lectures').find(l=>l.id===lid);return lec?.file_path||null}
    const fd=getFile(lid);return fd?fd.data:null;
  }
};

let U=JSON.parse(sessionStorage.getItem('lms_u')||'null');
let PAGE='login',PAR={},BACK=null;
function setU(u){U=u;u?sessionStorage.setItem('lms_u',JSON.stringify(u)):sessionStorage.removeItem('lms_u')}

function go(page,par={},back=null){BACK=back;PAGE=page;PAR=par;render()}

async function render(){
  if(!U&&PAGE!=='login'&&PAGE!=='setup'){pageLogin();return}
  switch(PAGE){
    case 'login':pageLogin();break;
    case 'setup':pageSetup();break;
    case 'home':U.role==='admin'?await pageAdminDash():await pageHome();break;
    case 'section':await pageSection(PAR.id);break;
    case 'lecture':await pageLecture(PAR.id);break;
    case 'quiz':await pageQuiz(PAR.id);break;
    case 'cert':await pageCert(PAR.id);break;
    case 'adash':await pageAdminDash();break;
    case 'asections':await pageAdminSections();break;
    case 'alectures':await pageAdminLectures(PAR.id);break;
    case 'aquestions':await pageAdminQuestions(PAR.id);break;
    case 'astaff':await pageAdminStaff();break;
    case 'astaff1':await pageAdminStaff1(PAR.id);break;
    case 'acerts':await pageAdminCerts();break;
    default:await pageHome();
  }
}

async function pageSection(sid){
  const secs=await db.sections(),sec=secs.find(s=>s.id===sid);if(!sec){go('home');return}
  const lecs=await db.lectures(sid),comps=await db.completions(U.id),certs=await db.certs(U.id);
  const hasCert=certs.find(c=>c.section_id===sid);
  const allDone=lecs.length>0&&lecs.every(l=>comps.find(c=>c.lecture_id===l.id));
  const items=lecs.map(lec=>{
    const done=comps.find(c=>c.lecture_id===lec.id);
    const badge=done?`<span class="bdg bdg-ok">✅ Done</span>`:lec.has_quiz?`<span class="bdg bdg-q">📝 Quiz</span>`:`<span class="bdg bdg-w">${lec.type==='pptx'?'📄':'▶'} View</span>`;
    return`<div class="lec-item ${done?'done':''}" onclick="go('lecture',{id:'${lec.id}'},{page:'section',par:{id:'${sid}'},label:'Back to Section'})">
      <div class="lec-ico">${lec.type==='youtube'?'▶':'📄'}</div>
      <div class="lec-info"><h4>${lec.title}</h4><span>${lec.type==='youtube'?'Video lecture':'Presentation / PDF'}${lec.has_quiz?' · Includes quiz':''}</span></div>
      ${badge}
    </div>`}).join('');
  const banner=hasCert
    ?`<div class="al al-ok"><span>🏆 You earned a certificate for this section!</span><button class="btn bp bsm" onclick="go('cert',{id:'${hasCert.id}'},{page:'section',par:{id:'${sid}'},label:'Back'})">View Certificate</button></div>`
    :allDone?`<div class="al al-i"><span>🎉 All lectures complete! Claim your certificate.</span><button class="btn bp bsm" onclick="issueCert('${sid}')">Get Certificate</button></div>`:'';
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('home')">🏠 Home</a><span>›</span><span>${sec.title}</span></div>
    <div class="ph"><div><h2>${sec.title}</h2><p>${sec.description||''}</p></div></div>
    ${banner}
    <div>${items||'<div style="text-align:center;padding:40px;color:var(--muted)">No lectures yet.</div>'}</div>
  </div>`
}
async function issueCert(sid){
  const secs=await db.sections(),sec=secs.find(s=>s.id===sid);
  const code=sec.title.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const ref='MH-'+new Date().getFullYear()+'-'+code+'-'+Math.floor(10000+Math.random()*90000);
  const cert={user_id:U.id,section_id:sid,ref_number:ref,issued_at:n()};
  await db.addCert(cert);toast('🏆 Certificate issued!','ok');
  go('cert',{id:cert.id},{page:'section',par:{id:sid},label:'Back to Section'});
}

function initYT(vid,lid,hasQ){
  // Use direct iframe - faster and more reliable
  const wrap=document.getElementById('ytp');
  if(!wrap)return;
  wrap.style.position='absolute';wrap.style.top='0';wrap.style.left='0';wrap.style.width='100%';wrap.style.height='100%';
  const iframe=document.createElement('iframe');
  iframe.id='yt-iframe';
  iframe.src='https://www.youtube.com/embed/'+vid+'?rel=0&modestbranding=1&enablejsapi=1&origin='+encodeURIComponent(location.origin);
  iframe.style.cssText='width:100%;height:100%;border:none;';
  iframe.allow='accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture';
  iframe.allowFullscreen=true;
  wrap.appendChild(iframe);
  // Listen via postMessage for video end
  let watching=false;
  window.onmessage=async function(e){
    if(!e.data||typeof e.data!=='string')return;
    try{
      const d=JSON.parse(e.data);
      if(d.event==='onStateChange'){
        if(d.info===1)watching=true; // playing
        if(d.info===0&&watching){ // ended
          vidDone=true;
          await db.addCompletion({user_id:U.id,lecture_id:lid,completed_at:n()});
          const qb=document.getElementById('qbtn'),db2=document.getElementById('dbtn');
          if(qb){qb.disabled=false;qb.innerHTML='📝 Take Quiz';}
          if(db2){db2.disabled=false;db2.innerHTML='✅ Mark Complete';}
          toast('✅ Video complete!','ok');
        }
      }
    }catch(err){}
  };
  // Also add manual "mark watched" button after 10 seconds as fallback
  setTimeout(()=>{
    if(!vidDone){
      const sw=document.getElementById('swarn');
      if(sw){sw.style.display='block';sw.style.background='rgba(91,31,140,0.9)';sw.textContent='📺 Finished watching? Click to unlock quiz';}
      sw&&sw.addEventListener('click',async function(){
        vidDone=true;
        await db.addCompletion({user_id:U.id,lecture_id:lid,completed_at:n()});
        const qb=document.getElementById('qbtn');
        if(qb){qb.disabled=false;qb.innerHTML='📝 Take Quiz';}
        this.style.display='none';
        toast('✅ Marked as watched!','ok');
      },{once:true});
    }
  },10000);
}

let QS={};
async function pageQuiz(lid){
  const lec=await db.lecture(lid);if(!lec){go('home');return}
  const all=await db.questions(lid);
  if(!all.length){toast('No questions available yet','er');return}
  // Pick random 10
  const picked=all.sort(()=>Math.random()-.5).slice(0,Math.min(10,all.length));
  // Shuffle options for each question
  const qs=picked.map(q=>{
    const opts=[
      {key:'a',text:q.option_a,correct:q.correct_answer==='a'},
      {key:'b',text:q.option_b,correct:q.correct_answer==='b'},
      {key:'c',text:q.option_c,correct:q.correct_answer==='c'},
      {key:'d',text:q.option_d,correct:q.correct_answer==='d'}
    ].sort(()=>Math.random()-.5);
    const newCorrect=opts.find(o=>o.correct).key; // after shuffle, which letter is correct?
    return{...q,shuffled:opts,correct_shuffled:newCorrect};
  });
  QS={lid,qs,cur:0,ans:{},time:20*60,ti:null,done:false};renderQ();
  QS.ti=setInterval(()=>{
    QS.time--;
    const el=document.getElementById('qtimer');
    if(el){const m=String(Math.floor(QS.time/60)).padStart(2,'0'),s=String(QS.time%60).padStart(2,'0');
      el.textContent='⏱ '+m+':'+s;if(QS.time<120)el.classList.add('red');}
    if(QS.time<=0){clearInterval(QS.ti);submitQ();}
  },1000);
}
function renderQ(){
  const q=QS.qs[QS.cur],tot=QS.qs.length,cur=QS.cur+1,sel=QS.ans[QS.cur];
  const m=String(Math.floor(QS.time/60)).padStart(2,'0'),s=String(QS.time%60).padStart(2,'0');
  const letters=['a','b','c','d'];
  const opts=q.shuffled.map((opt,i)=>{
    const k=letters[i];
    return`<div class="opt ${sel===k?'sel':''}" onclick="selOpt('${k}')">
      <div class="opt-l">${k.toUpperCase()}</div><span>${opt.text}</span></div>`;
  }).join('');
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:740px">
    <div class="q-hdr">
      <div><div style="font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600">Question ${cur} of ${tot}</div>
        <div class="pbar" style="width:220px;height:8px"><div class="pfill" style="width:${((cur/tot)*100).toFixed(0)}%"></div></div></div>
      <div id="qtimer" class="timer ${QS.time<120?'red':''}">⏱ ${m}:${s}</div>
    </div>
    <div class="q-card"><div class="q-num">Question ${cur}</div><div class="q-txt">${q.question_text}</div><div class="opts">${opts}</div></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button class="btn bg2" onclick="qnav(-1)" ${QS.cur===0?'disabled':''}>← Previous</button>
      <span style="font-size:13px;color:var(--muted);font-weight:600">${Object.keys(QS.ans).length}/${tot} answered</span>
      ${QS.cur<tot-1?`<button class="btn bp" onclick="qnav(1)">Next →</button>`:`<button class="btn bn blg" onclick="submitQ()">Submit ✓</button>`}
    </div>
  </div>`
}
function selOpt(k){QS.ans[QS.cur]=k;renderQ()}
function qnav(d){QS.cur+=d;renderQ()}
async function submitQ(){
  if(QS.done)return;QS.done=true;clearInterval(QS.ti);
  const qs=QS.qs;let ok=0;
  qs.forEach((q,i)=>{
    const letters=['a','b','c','d'];
    const selectedIdx=letters.indexOf(QS.ans[i]);
    if(selectedIdx>=0&&q.shuffled[selectedIdx]?.correct)ok++;
  });
  const score=Math.round(ok/qs.length*100),passed=score>=90;
  await db.addAttempt({id:uid(),user_id:U.id,lecture_id:QS.lid,score,passed,attempted_at:n()});
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:600px">
    <div class="card" style="text-align:center;padding:52px 36px">
      <div class="r-circle ${passed?'r-pass':'r-fail'}">${score}%</div>
      <h2 style="font-size:30px;color:var(--pu-d);margin-bottom:10px">${passed?'🎉 Excellent!':'😔 Not Passed'}</h2>
      <p style="color:var(--muted);margin-bottom:26px;font-size:15px">You got ${ok} out of ${qs.length} correct. ${passed?'Congratulations!':'You need 90% to pass.'}</p>
      <div style="background:var(--lav-l);border-radius:14px;padding:22px;margin-bottom:28px;display:grid;grid-template-columns:1fr 1fr;gap:20px;border:1px solid var(--border)">
        <div><div style="font-size:30px;font-weight:800;color:var(--ok)">${ok}</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:4px">Correct</div></div>
        <div><div style="font-size:30px;font-weight:800;color:var(--err)">${qs.length-ok}</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:4px">Incorrect</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${passed?`<button class="btn bp blg" onclick="goAfterQ()">View My Progress →</button>`:`<button class="btn bp blg" onclick="go('lecture',{id:'${QS.lid}'},{page:'home',par:{},label:'Home'})">Review &amp; Retry</button>`}
      </div>
    </div>
  </div>`
}

async function pageAdminCerts(){
  const users=await db.users(),secs=await db.sections();
  const allAtts=await db.allAttempts(),allCerts=await db.allCerts();
  const employees=users.filter(u=>u.role==='employee');

  let secBlocks='';
  for(const sec of secs){
    const lecs=await db.lectures(sec.id);
    if(!lecs.some(l=>l.has_quiz))continue;
    const quizLecs=lecs.filter(l=>l.has_quiz);
    let rows='';
    for(const emp of employees){
      const empAtts=allAtts.filter(a=>a.user_id===emp.id);
      const passedLecs=quizLecs.filter(l=>empAtts.some(a=>a.lecture_id===l.id&&a.passed));
      const allPassed=passedLecs.length===quizLecs.length;
      const hasCert=allCerts.find(c=>c.user_id===emp.id&&c.section_id===sec.id);
      const bestScores=quizLecs.map(l=>{
        const la=empAtts.filter(a=>a.lecture_id===l.id);
        return la.length?Math.max(...la.map(a=>a.score)):null;
      });
      const avgScore=bestScores.filter(s=>s!==null).length?
        Math.round(bestScores.filter(s=>s!==null).reduce((a,b)=>a+b,0)/bestScores.filter(s=>s!==null).length):null;
      rows+=`<tr>
        <td><strong>${emp.name}</strong></td>
        <td><span class="chip cd">#${emp.badge_id}</span></td>
        <td>${emp.file_number||'—'}</td>
        <td>${passedLecs.length}/${quizLecs.length} ${allPassed?'✅':''}</td>
        <td>${avgScore!==null?`<strong style="color:${avgScore>=90?'var(--ok)':'var(--err)'}">${avgScore}%</strong>`:'—'}</td>
        <td>
          ${hasCert
            ?`<button class="btn bo bsm" onclick="go('cert',{id:'${hasCert.id}'},{page:'acerts',par:{},label:'Certificates'})">🏆 View</button>`
            :allPassed
              ?`<button class="btn bp bsm" onclick="issueAdminCert('${emp.id}','${sec.id}')">📜 Issue Certificate</button>`
              :'<span style="color:var(--muted);font-size:12px">Not passed yet</span>'}
        </td>
      </tr>`;
    }
    secBlocks+=`<div class="card" style="margin-bottom:20px">
      <h3 style="color:var(--pu-d);font-weight:800;margin-bottom:16px">📚 ${sec.title}</h3>
      <div class="tw"><table><thead><tr><th>Nurse Name</th><th>Employee #</th><th>File #</th><th>Passed Quizzes</th><th>Avg Score</th><th>Certificate</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">No employees yet</td></tr>'}</tbody></table></div>
    </div>`;
  }
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="ph"><div><h2>🏆 Certificates & Results</h2><p>Issue certificates to nurses who passed all quizzes</p></div></div>
    ${secBlocks||'<div style="text-align:center;padding:60px;color:var(--muted)">No training sections with quizzes yet.</div>'}
  </div>`
}

let _esid='';
function openSecModal(id){
  _esid=id||'';const sec=id?ls('sections').find(s=>s.id===id):null;
  document.getElementById('md').innerHTML=`<div class="mo" onclick="cmo(event)"><div class="modal">
    <div class="mh"><h3>${id?'Edit':'New'} Section</h3><button class="mc" onclick="cmo()">✕</button></div>
    <div class="fg"><label>Title</label><input id="st" value="${sec?sec.title:''}" placeholder="e.g. Tracheostomy Patient Care"></div>
    <div class="fg"><label>Description</label><textarea id="sd">${sec?sec.description||'':''}</textarea></div>
    <div style="display:flex;gap:12px;justify-content:flex-end"><button class="btn bg2" onclick="cmo()">Cancel</button><button class="btn bp" onclick="saveSec()">💾 Save</button></div>
  </div></div>`

async function saveSec(){
  const t=document.getElementById('st').value.trim(),d=document.getElementById('sd').value.trim();
  if(!t){toast('Enter a title','er');return}
  try{
    const secs=await db.sections();
    if(_esid)await db.updSection(_esid,{title:t,description:d});
    else await db.addSection({title:t,description:d,order_num:secs.length+1,created_at:n()});
    toast(_esid?'Updated! ✅':'Section added! ✅','ok');cmo();pageAdminSections();
  }catch(e){toast('❌ Error: '+e.message,'er');console.error(e);}
}
async function delSec(id){if(confirm('Delete section and all lectures?')){await db.delSection(id);toast('Deleted','ok');pageAdminSections()}}

  </div><div id="md"></div>`

function openUploadModal(lid){
  const lec=ls('lectures').find(l=>l.id===lid);
  const existing=getFile(lid);
  document.getElementById('md').innerHTML=`<div class="mo" onclick="cmo(event)"><div class="modal">
    <div class="mh"><h3>Upload File — ${lec?lec.title:''}</h3><button class="mc" onclick="cmo()">✕</button></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Employees will see and download this file. Recommended format: PDF for best display.</p>
    ${existing?`<div style="background:#DCFCE7;border:1.5px solid #86EFAC;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#166534">✅ Current: <strong>${existing.name}</strong> — upload to replace</div>`:''}
    <div class="upload-zone" id="uz" onclick="document.getElementById('upfile').click()">
      <input type="file" id="upfile" accept=".pdf,.pptx,.ppt" onchange="handleAdminUpload('${lid}',this)">
      <div style="font-size:40px;margin-bottom:10px">📂</div>
      <div style="font-weight:700;color:var(--pu-d);margin-bottom:5px">Click to select file</div>
      <div style="font-size:12px;color:var(--muted)">PDF (best) · PPTX · PPT &nbsp;·&nbsp; Max 8 MB</div>
    </div>
    <div id="up-status" style="margin-top:12px;font-size:13px;min-height:20px"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px">
      <button class="btn bg2" onclick="cmo()">Cancel</button>
      <button class="btn bp" id="save-btn" disabled onclick="finishUpload('${lid}')">💾 Save to Lectures</button>
    </div>
  </div></div>`
}
let _pendingFile=null;
function handleAdminUpload(lid,input){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('up-status');
  if(file.size>8*1024*1024){if(st)st.innerHTML=`<span style="color:var(--err)">⚠️ File too large (${(file.size/1048576).toFixed(1)} MB). Use PDF under 8 MB.</span>`;return}
  if(st)st.textContent='Reading file...';
  const reader=new FileReader();
  reader.onload=e=>{
    _pendingFile={data:e.target.result,name:file.name,type:file.type,size:file.size};
    const uz=document.getElementById('uz');
    if(uz){uz.classList.add('has-file');uz.innerHTML=`<div style="font-size:36px;margin-bottom:8px">✅</div><div style="font-weight:700;color:#166534">${file.name}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${Math.round(file.size/1024)} KB</div>`;}
    if(st)st.innerHTML=`<span style="color:var(--ok);font-weight:600">✅ File ready to save</span>`;
    const btn=document.getElementById('save-btn');if(btn)btn.disabled=false;
  };
  reader.onerror=()=>{if(st)st.innerHTML=`<span style="color:var(--err)">❌ Error reading file</span>`;};
  reader.readAsDataURL(file);
}
async function finishUpload(lid){
  if(!_pendingFile){toast('No file','er');return}
  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='Uploading...';}
  try{
    if(SB){
      // Upload to Supabase Storage
      const path='lectures/'+lid+'/'+_pendingFile.name;
      const byteStr=atob(_pendingFile.data.split(',')[1]);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:_pendingFile.type});
      const {error}=await SB.storage.from('lms-files').upload(path,blob,{upsert:true,contentType:_pendingFile.type});
      if(error)throw new Error(error.message);
      const {data}=SB.storage.from('lms-files').getPublicUrl(path);
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type,file_path:data.publicUrl});
      // Also cache locally
      saveFile(lid,{..._pendingFile,url:data.publicUrl});
      toast('✅ File uploaded to cloud!','ok');
    } else {
      const ok=saveFile(lid,_pendingFile);
      if(!ok)throw new Error('Browser storage full. Connect Supabase to upload larger files.');
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type});
      toast('✅ File uploaded!','ok');
    }
    _pendingFile=null;cmo();pageAdminLectures(PAR.id);
  }catch(e){
    toast('❌ '+e.message,'er');
    if(btn){btn.disabled=false;btn.textContent='💾 Save to Lectures';}
  }
}

async function saveQ(){
  const t=document.getElementById('qq').value.trim();

    </div>
    <div class="fg">
      <label>Iqama Number (رقم الإقامة) — used as login password</label>

async function saveEmp(){
  const nm=document.getElementById('en').value.trim();
  const ee=document.getElementById('ee').value.trim();
  const bd=document.getElementById('eb').value.trim();
  const ef=document.getElementById('ef').value.trim();
  const ei=document.getElementById('ei').value.trim();
  if(!nm||!bd||!ei){toast('Name, employee number, and iqama are required','er');return}
  const data={name:nm,email:ee,badge_id:bd,file_number:ef,iqama_number:ei,role:'employee'};
  try{
    if(_eeId){
      await db.updUser(_eeId,data);toast('Updated! ✅','ok');
    }else{
      const existing=await db.userByBadge(bd);
      if(existing){toast('Employee number already exists','er');return}
      await db.addUser({...data,created_at:n()});toast('Employee added! ✅','ok');
    }
    cmo();await pageAdminStaff();
  }catch(e){
    toast('❌ Error: '+e.message,'er');
    console.error(e);
  }
}
async function delEmp(id){if(confirm('Remove employee?')){await db.delUser(id);toast('Removed','ok');pageAdminStaff()}}

async function pageAdminStaff1(uid2){
  const users=await db.users(),emp=users.find(u=>u.id===uid2);if(!emp){go('astaff');return}
  const secs=await db.sections(),comps=await db.completions(uid2),atts=await db.attempts(uid2),certs=await db.certs(uid2);
  const blocks=await Promise.all(secs.map(async sec=>{
    const lecs=await db.lectures(sec.id),done=lecs.filter(l=>comps.find(c=>c.lecture_id===l.id)).length;
    const rows=lecs.map(l=>{
      const c=comps.find(x=>x.lecture_id===l.id),la=atts.filter(a=>a.lecture_id===l.id);
      const best=la.length?Math.max(...la.map(a=>a.score)):null;
      return`<tr><td>${l.title}</td><td>${c?'✅ Viewed':'⭕ Not yet'}</td>
        <td>${c?new Date(c.completed_at).toLocaleDateString():'—'}</td>
        <td>${best!==null?`<strong style="color:${best>=90?'var(--ok)':'var(--err)'}">${best}%</strong>`:'—'}</td></tr>`}).join('');
    return`<div class="card" style="margin-bottom:16px">
      <div class="fb" style="margin-bottom:12px"><h4 style="color:var(--pu-d);font-weight:700">${sec.title}</h4>
        <span class="chip cp">${done}/${lecs.length} complete</span></div>
      <div class="tw"><table><thead><tr><th>Lecture</th><th>Status</th><th>Date</th><th>Best Score</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
  }));
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('adash')">Dashboard</a><span>›</span><a onclick="go('astaff')">Staff</a><span>›</span><span>${emp.name}</span></div>
    <div class="card" style="margin-bottom:24px">
      <div style="display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap">
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--pu),var(--pu-ll));display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;flex-shrink:0">${emp.name[0]}</div>
        <div style="flex:1">
          <h2 style="font-size:22px;color:var(--pu-d);font-weight:800">${emp.name}</h2>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;color:var(--muted)">
            <span>📋 Employee: <strong>#${emp.badge_id}</strong></span>
            <span>📁 File: <strong>${emp.file_number||'—'}</strong></span>
            <span>🪪 Iqama: <strong>${emp.iqama_number}</strong></span>
            ${emp.email?`<span>📧 <strong>${emp.email}</strong></span>`:''}
            <span>🏆 ${certs.length} certificate${certs.length!==1?'s':''}</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${certs.map(c=>`<button class="btn bo bsm" onclick="go('cert',{id:'${c.id}'})">🏆 Cert</button>`).join('')}
        </div>
      </div>
    </div>
    <h3 style="color:var(--pu-d);margin-bottom:16px;font-weight:800">Training Progress</h3>
    ${blocks.join('')||'<div style="text-align:center;padding:40px;color:var(--muted)">No training content</div>'}
  </div>`
}

function cmo(e){if(e&&e.target!==e.currentTarget)return;const m=document.getElementById('md');if(m)m.innerHTML=''}
function toast(msg,type=''){
  const c=document.getElementById('toast');const el=document.createElement('div');
  el.className='ti '+(type==='ok'?'ok':type==='er'?'er':'');el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),3500);
}
