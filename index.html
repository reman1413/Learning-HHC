let INT_STATE={lid:null,slides:[],idx:0,answered:false,wrong:0};
async function pageInteractive(lid){
  const lec=await db.lecture(lid); if(!lec){ go('home'); return; }
  const slides=getSlidesData(lid);
  if(!slides.length){
    document.getElementById('app').innerHTML=bar()+`<div class="pg">
      <div class="bc"><a onclick="go('home')">🏠 Home</a><span>›</span><span>${lec.title}</span></div>
      <div class="card" style="text-align:center;padding:54px 30px">
        <div style="font-size:50px;margin-bottom:14px">📭</div>
        <h2 style="font-family:'Fraunces';font-weight:600;color:var(--ink)">Lecture not ready</h2>
        <p style="color:var(--muted);margin-top:8px">Slides have not been added yet. Please check back later.</p>
        <button class="btn bg2" style="margin-top:20px" onclick="go('section',{id:'${lec.section_id}'})">← Back to Section</button>
      </div>
    </div>`; return;
  }
  const startIdx=getSlideProg(lid,U.id);
  INT_STATE={lid,slides,idx:Math.min(startIdx,slides.length-1),answered:false,wrong:0,sec:lec.section_id,title:lec.title,hasQuiz:lec.has_quiz};
  renderInteractive();
}
function renderInteractive(){
  const{lid,slides,idx,sec,title,hasQuiz}=INT_STATE;
  const slide=slides[idx],total=slides.length,pct=Math.round((idx+1)/total*100);
  let mediaHtml='';
  if(slide.media&&slide.media_type==='image') mediaHtml=`<div style="margin:18px 0;border-radius:14px;overflow:hidden;background:var(--pu-mist);text-align:center;border:1px solid var(--border)"><img src="${slide.media}" style="max-width:100%;max-height:340px;display:inline-block"></div>`;
  else if(slide.media&&slide.media_type==='youtube'){
    let cleanId=slide.media.trim();
    mediaHtml=`<div class="vid-wrap" style="margin:18px 0"><iframe src="https://www.youtube.com/embed/${cleanId}?rel=0&modestbranding=1&playsinline=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  let qHtml='';
  if(slide.question){
    const sel=INT_STATE.selected,showResult=INT_STATE.answered;
    qHtml=`<div style="background:#FFFBEB;border-radius:14px;padding:20px;margin-top:18px;border:1.5px solid #FDE68A">
      <div style="font-weight:700;color:#854D0E;margin-bottom:14px;font-size:14.5px;font-family:'Readex Pro'">❓ ${slide.question}</div>
      <div class="opts">
        ${slide.options.map((opt,i)=>{
          let cls='opt'; if(showResult){ if(i===slide.correct)cls+=' sel'; if(i===sel&&i!==slide.correct)cls+=' sel'; } else if(sel===i)cls+=' sel';
          let style='';
          if(showResult&&i===slide.correct)style='border-color:var(--ok);background:var(--ok-l);color:#065F46';
          if(showResult&&i===sel&&i!==slide.correct)style='border-color:var(--err);background:var(--err-l);color:#9F1239';
          return`<div class="${cls}" style="${style}" onclick="${showResult?'':`selectIntOpt(${i})`}">
            <div class="opt-l" style="${showResult&&i===slide.correct?'background:var(--ok);color:#fff':showResult&&i===sel&&i!==slide.correct?'background:var(--err);color:#fff':''}">${String.fromCharCode(65+i)}</div>
            <span>${opt}</span>${showResult&&i===slide.correct?'<span style="margin-left:auto;font-weight:700">✓</span>':''}${showResult&&i===sel&&i!==slide.correct?'<span style="margin-left:auto;font-weight:700">✗</span>':''}
          </div>`;
        }).join('')}
      </div>
      ${showResult&&slide.explanation?`<div style="background:var(--card);border-radius:11px;padding:13px 16px;margin-top:14px;font-size:13.5px;color:var(--text);line-height:1.6;border-left:4px solid ${INT_STATE.selected===slide.correct?'var(--ok)':'var(--err)'}">
        <strong style="color:${INT_STATE.selected===slide.correct?'var(--ok)':'var(--err)'}">${INT_STATE.selected===slide.correct?'✓ Correct! ':'💡 Explanation: '}</strong>${slide.explanation}
      </div>`:''}
    </div>`;
  }
  let actions='';
  if(slide.question){
    if(!INT_STATE.answered) actions=`<button class="btn bp blg" onclick="submitSlideAnswer()" ${INT_STATE.selected===undefined?'disabled':''}>Check Answer</button>`;
    else if(INT_STATE.selected===slide.correct) actions=idx<total-1?`<button class="btn bp blg" onclick="nextSlide()">Next Slide →</button>`:`<button class="btn bn blg" onclick="finishInteractive()">${hasQuiz?'Continue to Quiz →':'Finish Lecture ✓'}</button>`;
    else actions=`<button class="btn bo blg" onclick="retrySlide()">↻ Try Again</button>`;
  } else {
    actions=idx<total-1?`<button class="btn bp blg" onclick="nextSlide()">Next Slide →</button>`:`<button class="btn bn blg" onclick="finishInteractive()">${hasQuiz?'Continue to Quiz →':'Finish Lecture ✓'}</button>`;
  }
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:760px">
    <div class="bc"><a onclick="go('home')">🏠 Home</a><span>›</span><a onclick="go('section',{id:'${sec}'})">Section</a><span>›</span><span>${title}</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <h2 style="font-size:24px;color:var(--ink);font-family:'Fraunces';font-weight:600">${title}</h2>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:13px;color:var(--muted);font-weight:700">Slide ${idx+1} of ${total}</span>
        <div class="pbar" style="width:140px"><div class="pfill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="card" style="padding:32px">
      ${slide.heading?`<div style="font-size:11.5px;color:var(--pu-l);font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Step ${idx+1}</div>
        <h3 style="font-size:24px;font-weight:600;color:var(--ink);margin-bottom:14px;font-family:'Fraunces';line-height:1.2">${slide.heading}</h3>`:''}
      ${slide.content?`<div style="font-size:15px;color:var(--text);line-height:1.75;white-space:pre-wrap">${slide.content}</div>`:''}
      ${mediaHtml}
      ${qHtml}
      <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;align-items:center">
        ${idx>0?`<button class="btn bg2" onclick="prevSlide()">← Previous</button>`:''}
        <div style="flex:1"></div>
        ${actions}
      </div>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted);font-weight:600">
      💡 ${slide.question?'Answer the checkpoint question to advance':'Read carefully and continue when ready'}
    </div>
  </div>`;
}
function selectIntOpt(i){ if(INT_STATE.answered) return; INT_STATE.selected=i; renderInteractive(); }
function submitSlideAnswer(){ INT_STATE.answered=true; if(INT_STATE.selected!==INT_STATE.slides[INT_STATE.idx].correct) INT_STATE.wrong++; renderInteractive(); }
function retrySlide(){ INT_STATE.answered=false; INT_STATE.selected=undefined; renderInteractive(); }
function nextSlide(){ INT_STATE.idx++; INT_STATE.answered=false; INT_STATE.selected=undefined; setSlideProg(INT_STATE.lid,U.id,INT_STATE.idx); renderInteractive(); }
function prevSlide(){ INT_STATE.idx=Math.max(0,INT_STATE.idx-1); INT_STATE.answered=false; INT_STATE.selected=undefined; renderInteractive(); }
async function finishInteractive(){
  const{lid,hasQuiz,sec}=INT_STATE;
  await db.addCompletion({user_id:U.id,lecture_id:lid,completed_at:n()});
  setSlideProg(lid,U.id,0);
  if(!hasQuiz) await checkAndAutoIssueCert(sec);
  if(hasQuiz){ toast('🎉 Lecture complete! Now the quiz...','ok'); setTimeout(()=>go('quiz',{id:lid}),700); }
  else{ toast('🎉 Lecture complete!','ok'); setTimeout(()=>go('section',{id:sec}),700); }
}

function handleLogoUpload(input){
  const file=input.files[0]; if(!file) return;
  const st=document.getElementById('logo-status');
  if(file.size>1024*1024){ if(st) st.innerHTML=`<span style="color:var(--err);font-weight:700">⚠ File too large (${(file.size/1048576).toFixed(2)} MB). Max 1 MB.</span>`; return; }
  if(st) st.textContent='Reading...';
  const reader=new FileReader();
  reader.onload=e=>{ try{ setCustomLogo(e.target.result); toast('🎨 Logo updated! Reloading...','ok'); setTimeout(()=>location.reload(),900); } catch(err){ if(st) st.innerHTML=`<span style="color:var(--err)">❌ Could not save</span>`; } };
  reader.onerror=()=>{ if(st) st.innerHTML=`<span style="color:var(--err)">❌ Read failed</span>`; };
  reader.readAsDataURL(file);
}
function resetLogo(){ if(!confirm('Reset to default logo?')) return; setCustomLogo(null); toast('Logo reset','ok'); setTimeout(()=>location.reload(),700); }

async function pageAdminSections(){
  const secs=await db.sections();
  const users=await db.users();
  const allComps=await db.allCompletions(), allCerts=await db.allCerts(), allAtts=await db.allAttempts();
  const employees=users.filter(u=>u.role==='employee');
  const totalEmps=employees.length;
  const secStats={};
  for(const s of secs){
    const lecs=ls('lectures').filter(l=>l.section_id===s.id);
    const lecIds=lecs.map(l=>l.id);
    const startedSet=new Set();
    allComps.filter(c=>lecIds.includes(c.lecture_id)).forEach(c=>startedSet.add(c.user_id));
    let completedCount=0;
    for(const emp of employees){
      if(!lecs.length) break;
      let allDone=true;
      for(const lec of lecs){
        const w=allComps.find(c=>c.user_id===emp.id&&c.lecture_id===lec.id);
        if(!w){ allDone=false; break; }
        if(lec.has_quiz){ const p=allAtts.some(a=>a.user_id===emp.id&&a.lecture_id===lec.id&&a.passed); if(!p){ allDone=false; break; } }
      }
      if(allDone) completedCount++;
    }
    secStats[s.id]={lecs:lecs.length,started:startedSet.size,completed:completedCount,certs:allCerts.filter(c=>c.section_id===s.id).length};
  }

  const rows=secs.map(s=>{
    const t=themeFor(s.title), st=secStats[s.id];
    const startedPct=totalEmps?Math.round(st.started/totalEmps*100):0;
    const completedPct=totalEmps?Math.round(st.completed/totalEmps*100):0;
    const canDel=canDelete(s.created_by||OWNER_BADGE);
    return`<tr><td>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:42px;height:42px;border-radius:11px;background:${t.grad};display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--sh)">${t.icon}</div>
        <div><strong style="color:var(--ink)">${s.title}</strong><br><span style="font-size:12px;color:var(--muted)">${s.description||''}</span></div>
      </div></td>
      <td><span class="chip cp">${st.lecs} ${st.lecs===1?'lecture':'lectures'}</span></td>
      <td><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-family:'Readex Pro'">${st.started}</span><span style="font-size:11px;color:var(--muted)">/ ${totalEmps}</span>${st.started>0?`<div class="pbar" style="width:60px;height:6px"><div class="pfill" style="width:${startedPct}%;background:linear-gradient(90deg,var(--sky),#7BA3D9)"></div></div>`:''}</div></td>
      <td><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-family:'Readex Pro';color:${st.completed>0?'var(--ok)':'var(--muted)'}">${st.completed}</span><span style="font-size:11px;color:var(--muted)">/ ${totalEmps}</span>${st.completed>0?`<div class="pbar" style="width:60px;height:6px"><div class="pfill" style="width:${completedPct}%"></div></div>`:''}</div></td>
      <td>${st.certs>0?`<span class="chip" style="background:var(--gold-soft);color:#854D0E;border:1px solid #FDE68A">🏆 ${st.certs}</span>`:'<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      <td><div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn bo bsm" onclick="go('alectures',{id:'${s.id}'},{page:'asections',par:{},label:'Sections'})">📖 Lectures</button>
        <button class="btn bg2 bsm" onclick="openSecModal('${s.id}')">✏</button>
        ${canDel?`<button class="btn bd bsm" onclick="delSec('${s.id}')">🗑</button>`:`<span style="font-size:11px;color:var(--muted);padding:7px 4px" title="Only owner can delete this section">🔒</span>`}
      </div></td></tr>`;
  }).join('');

  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('adash')">Dashboard</a><span>›</span><span>Sections</span></div>

      <button class="btn bp" onclick="openSecModal()">+ New Section</button></div>
    <div class="tw"><table><thead><tr><th>Section</th><th>Lectures</th><th>👀 Started</th><th>✅ Completed</th><th>🏆 Certs</th><th>Actions</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:48px;color:var(--muted)">No sections yet.</td></tr>'}</tbody></table></div>
  </div><div id="md"></div>`;

async function saveSec(){

  try{
    const secs=await db.sections();

    else{

async function moveLec(id,sid,dir){
  const lecs=await db.lectures(sid);

  catch(e){ toast('❌ '+e.message,'er'); }
}

function handleAdminUpload(lid,input,isVideo){
  const file=input.files[0]; if(!file) return;
  const st=document.getElementById('up-status');
  const maxBytes=(isVideo?50:8)*1024*1024;
  if(file.size>maxBytes){ if(st) st.innerHTML=`<span style="color:var(--err)">⚠ File too large (${(file.size/1048576).toFixed(1)} MB). Max ${isVideo?50:8} MB.</span>`; return; }

async function finishUpload(lid){

      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:_pendingFile.type});
      const{error}=await SB.storage.from('lms-files').upload(path,blob,{upsert:true,contentType:_pendingFile.type});

async function saveLec(){
  const t=document.getElementById('lt').value.trim();
  const type=document.getElementById('ltype').value;
  const url=type==='youtube'?(document.getElementById('lurl').value.trim()):'';
  const hq=document.getElementById('lhq').checked;
  const seqStep=parseInt(document.getElementById('lreq')?.value||'0',10)||0;
  const isPrereq=seqStep===1;
  const qc=parseInt(document.getElementById('lqc')?.value||'10');
  const qp=parseInt(document.getElementById('lqp')?.value||'100');
  if(!t){ toast('Enter a title','er'); return; }
  const fullData={title:t,type,url,has_quiz:hq,quiz_count:qc,quiz_pass_pct:qp,is_prerequisite:isPrereq,sequence_step:seqStep};
  const fullDataWithOwner={...fullData,created_by:U?U.badge_id:OWNER_BADGE};
  try{
    const lecs=await db.lectures(_elsid);
    let savedId=_elid;
    try{
      // Send fullData (without created_by) to Supabase to avoid schema errors
      if(_elid) await db.updLecture(_elid,fullData);
      else{
        const newLec=await db.addLecture({section_id:_elsid,...fullData,order_num:lecs.length+1,created_at:n()});
        savedId=newLec?.id||(ls('lectures').slice(-1)[0]?.id);
        logActivity('added_lecture','Lecture',t);
      }
    } catch(e){
      const msg=e.message||'';
      if(/is_prerequisite|sequence_step|quiz_pass_pct|created_by/i.test(msg)){
        const basicData={title:t,type,url,has_quiz:hq,quiz_count:qc};
        if(_elid) await db.updLecture(_elid,basicData);
        else{
          const newLec=await db.addLecture({section_id:_elsid,...basicData,order_num:lecs.length+1,created_at:n()});
          savedId=newLec?.id||(ls('lectures').slice(-1)[0]?.id);
        }

    }
    if(savedId){
      setSeqOv(savedId,{is_prerequisite:isPrereq,sequence_step:seqStep});

      ls2('lectures',ls('lectures').map(l=>l.id===savedId?{...l,...fullDataWithOwner,is_prerequisite:isPrereq,sequence_step:seqStep,quiz_pass_pct:qp}:l));
    }

function parseBulkQuestions(text){
  const blocks=text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  const questions=[], errors=[];
  blocks.forEach((block,i)=>{
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    let qText='', opts={}, correct='', foundQ=false;
    for(const line of lines){
      if(/^Q[:\.\)]/i.test(line)){ qText=line.replace(/^Q[:\.\)]\s*/i,'').trim(); foundQ=true; }
      else if(/^A[:\.\)]/i.test(line)) opts.a=line.replace(/^A[:\.\)]\s*/i,'').trim();
      else if(/^B[:\.\)]/i.test(line)) opts.b=line.replace(/^B[:\.\)]\s*/i,'').trim();
      else if(/^C[:\.\)]/i.test(line)) opts.c=line.replace(/^C[:\.\)]\s*/i,'').trim();
      else if(/^D[:\.\)]/i.test(line)) opts.d=line.replace(/^D[:\.\)]\s*/i,'').trim();
      else if(/^Correct[:\s]/i.test(line)) correct=line.replace(/^Correct[:\s]+/i,'').trim().toLowerCase().charAt(0);
    }
    if(!foundQ){ errors.push(`Block ${i+1}: Missing question (Q: ...)`); return; }
    if(!opts.a||!opts.b||!opts.c||!opts.d){ errors.push(`Q${i+1}: Missing options A/B/C/D`); return; }
    if(!['a','b','c','d'].includes(correct)){ errors.push(`Q${i+1}: Invalid correct answer`); return; }
    questions.push({question_text:qText,option_a:opts.a,option_b:opts.b,option_c:opts.c,option_d:opts.d,correct_answer:correct});
  });
  return{questions,errors};
}
function previewBulk(){
  const{questions,errors}=parseBulkQuestions(document.getElementById('bulk-text').value);
  let html='';
  if(errors.length) html+=`<div class="al" style="background:var(--err-l);color:#9F1239;border-color:#FCA5A5">⚠ <strong>${errors.length} issue${errors.length>1?'s':''}:</strong><br>${errors.join('<br>')}</div>`;
  if(questions.length){
    html+=`<div class="al al-ok">✅ Parsed <strong>${questions.length} question${questions.length>1?'s':''}</strong> ready to save</div>`;
    html+=`<div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:11px;padding:14px;background:var(--pu-mist)">`;
    questions.forEach((q,i)=>{
      html+=`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);font-size:13px">
        <strong>Q${i+1}.</strong> ${q.question_text}<br>
        ${['a','b','c','d'].map(k=>`<span style="color:${q.correct_answer===k?'var(--ok)':'var(--muted)'};">${k.toUpperCase()}) ${q['option_'+k]}</span>`).join('<br>')}
        <span style="margin-left:8px;color:var(--ok);font-weight:700">✓ ${q.correct_answer.toUpperCase()}</span>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById('bulk-preview').innerHTML=html;
}
async function saveBulk(){
  const{questions,errors}=parseBulkQuestions(document.getElementById('bulk-text').value);
  if(errors.length){ toast(`⚠ Fix ${errors.length} error${errors.length>1?'s':''} first`,'er'); previewBulk(); return; }
  if(!questions.length){ toast('No valid questions found','er'); return; }
  if(!confirm(`Add ${questions.length} questions?`)) return;
  let added=0;
  for(const q of questions){ try{ await db.addQuestion({lecture_id:_bulkLid,...q,created_at:n()}); added++; } catch(e){ console.error('Q save:',e); } }
  logActivity('added_question','Questions',`Bulk: ${added} questions`);
  toast(`✅ Added ${added} question${added>1?'s':''}!`,'ok'); cmo(); pageAdminQuestions(_bulkLid);
}

function toggleSlideMedia(){

function handleSlideUpload(input){
  const f=input.files[0]; if(!f) return;
  if(f.size>500*1024){ toast('Image too large — keep under 500 KB','er'); return; }
  const r=new FileReader(); r.onload=e=>{ document.getElementById('sm').value=e.target.result; toast('✓ Image loaded','ok'); }; r.readAsDataURL(f);
}
function saveSlide(){

async function exportExcel(){
  const users=await db.users(), secs=await db.sections();
  const comps=await db.allCompletions(), atts=await db.allAttempts(), certs=await db.allCerts();
  const emps=users.filter(u=>u.role==='employee');
  const rows=[['Employee Name','Employee #','File #','Iqama #','Section','Lecture','Status','Best Score','Certificate Ref']];
  for(const emp of emps){
    const ec=comps.filter(c=>c.user_id===emp.id), ea=atts.filter(a=>a.user_id===emp.id), ecc=certs.filter(c=>c.user_id===emp.id);
    for(const sec of secs){
      const lecs=await db.lectures(sec.id);
      const sc=ecc.find(c=>c.section_id===sec.id);
      for(const lec of lecs){
        const w=ec.find(c=>c.lecture_id===lec.id)?'Watched':'Not watched';
        const la=ea.filter(a=>a.lecture_id===lec.id);
        const bs=la.length?String(Math.max(...la.map(a=>a.score)))+'%':'-';
        rows.push([emp.name,emp.badge_id,emp.file_number||'-',emp.iqama_number,sec.title,lec.title,w,bs,sc?sc.ref_number:'-']);
      }
    }
  }
  const q=v=>'"'+String(v).split('"').join('""')+'"';
  const csv=rows.map(r=>r.map(q).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='Meena_Training_Report.csv'; a.click(); URL.revokeObjectURL(url);
  toast('Report downloaded!','ok');
}

      const passed=lec.has_quiz?lecAtts.some(a=>a.passed):!!watched;
      if(watched&&passed) doneCount++;
      lecRows+=`<tr><td>${lec.title}</td>
        <td>${watched?'<span class="bdg bdg-ok">✓ Yes</span>':'<span class="bdg" style="background:var(--err-l);color:#9F1239;border:1px solid #FCA5A5">✗ No</span>'}</td>
        <td>${lec.has_quiz?(bestScore!==null?`<strong style="color:${bestScore>=90?'var(--ok)':'var(--err)'}">${bestScore}%</strong>`:'<span style="color:var(--muted)">Not attempted</span>'):'<span style="color:var(--muted)">No quiz</span>'}</td>
        <td>${lec.has_quiz?(lecAtts.length||0):'—'}</td></tr>`;
    }
    const cert=certs.find(c=>c.section_id===sec.id);
    const pct=lecs.length?Math.round(doneCount/lecs.length*100):0;
    blocks+=`<div class="card" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <h3 style="color:var(--ink);font-family:'Fraunces';font-weight:600;font-size:20px">${sec.title}</h3>
        <div style="display:flex;align-items:center;gap:14px">
          <div class="pbar" style="width:120px"><div class="pfill" style="width:${pct}%"></div></div>
          <strong style="color:var(--pu-d);font-family:'Readex Pro'">${pct}%</strong>
          ${cert?`<button class="btn bo bsm" onclick="go('cert',{id:'${cert.id}'},{page:'astaff1',par:{id:'${uid}'},label:'Back'})">🏆 Cert</button>`:''}
        </div>
      </div>
      ${lecs.length?`<div class="tw"><table><thead><tr><th>Lecture</th><th>Watched</th><th>Best Score</th><th>Attempts</th></tr></thead><tbody>${lecRows}</tbody></table></div>`:'<p style="color:var(--muted);font-size:13px">No lectures yet</p>'}
    </div>`;
  }
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('adash')">Dashboard</a><span>›</span><a onclick="go('astaff')">Staff</a><span>›</span><span>${u.name}</span></div>
    <div class="ph"><div><h2>${u.name}</h2><p>Employee #${u.badge_id} · ${u.email||'No email'} · ${u.file_number||'No file #'}</p></div>
      <button class="btn bg2 bsm" onclick="openEmpModal('${u.id}')">✏ Edit</button></div>
    <div class="stats">
      <div class="stat"><div class="si">📚</div><div class="sv">${comps.length}</div><div class="sl">Watched</div></div>
      <div class="stat"><div class="si">📝</div><div class="sv">${atts.length}</div><div class="sl">Attempts</div></div>
      <div class="stat"><div class="si">✅</div><div class="sv">${atts.filter(a=>a.passed).length}</div><div class="sl">Passed</div></div>
      <div class="stat"><div class="si">🏆</div><div class="sv">${certs.length}</div><div class="sl">Certs</div></div>
    </div>
    ${blocks||'<div style="text-align:center;padding:48px;color:var(--muted);background:var(--card);border-radius:18px">No sections yet</div>'}
  </div><div id="md"></div>`;
}

// ════════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════════
function cmo(e){ if(e&&e.target!==e.currentTarget) return; document.getElementById('md').innerHTML=''; }
function toast(msg,type){
  const cls=type==='ok'?'ok':type==='er'?'er':'';
  const div=document.createElement('div'); div.className='ti '+cls; div.textContent=msg;
  document.getElementById('toast').appendChild(div);
  setTimeout(()=>{ div.style.animation='si .25s reverse'; setTimeout(()=>div.remove(),250); },3500);
}
async function syncAll(){
  if(!SB) return;
  try{ await Promise.all([db.users(),db.sections(),db.allCompletions(),db.allAttempts(),db.allCerts()]); } catch(e){ console.warn('sync fail',e); }
}
async function syncThenRefresh(){ if(SB){ toast('Syncing...',''); await syncAll(); toast('Updated','ok'); render(); } else { render(); } }

// ════════════════════════════════════════════════════════════════
// INITIALIZATION
// ════════════════════════════════════════════════════════════════
window.addEventListener('load',async()=>{
  if(!localStorage.getItem('lms_setup_seen')&&!SB_URL){
    localStorage.setItem('lms_setup_seen','1'); PAGE='setup';
  } else {
    PAGE=U?'home':'login';
  }
  if(SB) await syncAll();
  render();
});
</script>

    const showFooter = U && PAGE !== 'login' && PAGE !== 'setup' && PAGE !== 'verify';
