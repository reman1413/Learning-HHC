<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meena Health — Learning Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --pu:#5B1F8C;--pu-d:#420F6E;--pu-l:#7B3FB8;--pu-ll:#9D6FD4;
  --lav:#EDE0FF;--lav-l:#F7F1FF;--lav-d:#D4B8F5;
  --bg:#F9F5FF;--card:#FFF;--text:#1A0F2E;--muted:#7C6B96;--border:#E8DCF7;
  --ok:#22C55E;--err:#EF4444;--warn:#F59E0B;
  --r:14px;--sh:0 4px 24px rgba(91,31,140,.1);--shh:0 8px 32px rgba(91,31,140,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{min-height:100vh}
.bar{background:linear-gradient(135deg,var(--pu-d),var(--pu) 60%,var(--pu-l));padding:0 28px;height:68px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(66,15,110,.3);position:sticky;top:0;z-index:100}
.bar-logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.bar-logo .ico{width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;border:1px solid rgba(255,255,255,.3)}
.bar-logo span{color:#fff;font-size:17px;font-weight:700}
.bar-logo em{opacity:.6;font-style:normal;font-weight:500}
.bar-r{display:flex;align-items:center;gap:12px}
.bar-nav button{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9);border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;margin-left:4px;transition:.2s}
.bar-nav button:hover{background:rgba(255,255,255,.24)}
.bar-user{color:rgba(255,255,255,.8);font-size:13px;font-weight:500}
.btn-out{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.35);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-out:hover{background:rgba(255,255,255,.26)}
.back-bar{background:rgba(91,31,140,.06);border-bottom:1px solid var(--border);padding:10px 28px}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:9px;background:#fff;color:var(--pu);border:1.5px solid var(--pu);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:.2s}
.back-btn:hover{background:var(--pu);color:#fff}
.pg{max-width:1100px;margin:0 auto;padding:32px 28px}
.pg-sm{max-width:800px;margin:0 auto;padding:32px 28px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:24px;border:1px solid var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.pbar{height:6px;background:var(--lav);border-radius:99px;overflow:hidden;margin-top:10px}
.pfill{height:100%;background:linear-gradient(90deg,var(--pu),var(--pu-ll));border-radius:99px;transition:width .5s}
.lec-item{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--card);border-radius:12px;border:1.5px solid var(--border);margin-bottom:12px;cursor:pointer;transition:.2s}
.lec-item:hover{border-color:var(--pu-ll);background:var(--lav-l)}
.lec-item.done{border-left:4px solid var(--ok)}
.lec-ico{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--pu),var(--pu-ll));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.lec-info{flex:1}.lec-info h4{font-size:15px;font-weight:700;color:var(--text)}
.lec-info span{font-size:12px;color:var(--muted);margin-top:2px;display:block}
.bdg{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700}
.bdg-ok{background:#DCFCE7;color:#166534}.bdg-q{background:#FEF9C3;color:#854D0E}.bdg-w{background:var(--lav);color:var(--pu)}
.vid-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:var(--r);overflow:hidden;background:#0f0720;margin-bottom:20px;box-shadow:var(--sh)}
.vid-wrap iframe,.vid-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;border:none}
.skip-warn{background:rgba(239,68,68,.9);color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;text-align:center;display:none;margin-bottom:14px}
.file-viewer{background:#1a0f2e;border-radius:var(--r);margin-bottom:20px;box-shadow:var(--sh);overflow:hidden}
.fv-header{background:rgba(255,255,255,.07);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1)}
.fv-header h4{color:#fff;font-size:15px;font-weight:700}
.pdf-frame{width:100%;height:620px;border:none;display:block;background:#fff}
.no-file{padding:60px 30px;text-align:center}
.no-file .nfi{font-size:56px;margin-bottom:16px}
.no-file h3{color:rgba(255,255,255,.7);font-size:18px;font-weight:700;margin-bottom:8px}
.no-file p{color:rgba(255,255,255,.4);font-size:13px;line-height:1.6}
.fv-footer{background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.08);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.upload-zone{border:2px dashed rgba(157,111,212,.5);border-radius:12px;padding:36px 24px;text-align:center;cursor:pointer;transition:.2s;background:rgba(91,31,140,.05)}
.upload-zone:hover{border-color:var(--pu-ll);background:rgba(91,31,140,.1)}
.upload-zone.has-file{border-color:var(--ok);background:rgba(34,197,94,.06)}
.upload-zone input{display:none}
.q-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.timer{background:var(--pu-d);color:#fff;padding:9px 20px;border-radius:10px;font-size:20px;font-weight:700;font-family:monospace;letter-spacing:1px}
.timer.red{background:var(--err)}
.q-card{background:var(--card);border-radius:var(--r);padding:30px;box-shadow:var(--sh);margin-bottom:20px;border:1px solid var(--border)}
.q-num{font-size:12px;font-weight:700;color:var(--pu-l);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.q-txt{font-size:17px;font-weight:700;color:var(--text);margin-bottom:22px;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 18px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;font-size:15px;display:flex;align-items:center;gap:12px;font-weight:500}
.opt:hover{border-color:var(--pu-ll);background:var(--lav-l)}
.opt.sel{border-color:var(--pu);background:rgba(91,31,140,.07);color:var(--pu);font-weight:700}
.opt-l{width:30px;height:30px;border-radius:50%;background:var(--lav);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;color:var(--pu)}
.r-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;font-weight:800}
.r-pass{background:#DCFCE7;color:#166534;border:4px solid var(--ok)}
.r-fail{background:#FEE2E2;color:#991B1B;border:4px solid var(--err)}
.cert-pg{background:#fff;max-width:820px;margin:0 auto}
.cert-out{padding:36px;background:#fff}
.cert-in{border:3px solid var(--pu);padding:52px;position:relative;text-align:center}
.cert-in::before{content:'';position:absolute;inset:8px;border:1px solid rgba(91,31,140,.2);pointer-events:none}
.cert-in::after{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--pu-d),var(--pu),var(--pu-ll));pointer-events:none}
.c-org{font-size:30px;font-weight:800;color:var(--pu-d);letter-spacing:1.5px}
.c-sub0{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.c-div{height:3px;background:linear-gradient(90deg,transparent,var(--pu),var(--pu-ll),transparent);margin:20px auto;max-width:300px}
.c-ttl{font-size:40px;font-weight:300;color:var(--pu);letter-spacing:3px;text-transform:uppercase}
.c-sub2{font-size:14px;color:var(--muted);letter-spacing:1.5px;margin-bottom:26px}
.c-name{font-size:36px;font-weight:800;color:var(--pu-d);border-bottom:2px solid var(--pu-ll);display:inline-block;padding-bottom:6px}
.c-bid{font-size:13px;color:var(--muted);margin:8px 0 20px}
.c-txt{font-size:16px;color:var(--text);margin-bottom:6px;line-height:1.6}
.c-sec{font-size:24px;font-weight:700;color:var(--pu);margin-bottom:22px}
.c-meta{display:flex;justify-content:space-around;margin-top:30px;padding-top:22px;border-top:1px solid var(--border)}
.c-mi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.c-mi .val{font-size:15px;font-weight:700;color:var(--pu-d);margin-top:5px}
.c-ref{margin-top:18px;font-size:12px;color:var(--muted)}
.c-stamp{position:absolute;bottom:44px;right:44px;width:80px;height:80px;border-radius:50%;border:3px solid var(--pu);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--pu);text-align:center;line-height:1.4;transform:rotate(-15deg);background:rgba(91,31,140,.04)}
.c-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:80px;font-weight:800;color:rgba(91,31,140,.04);white-space:nowrap;pointer-events:none;letter-spacing:4px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--card);border-radius:var(--r);padding:22px;border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;position:relative}
.stat::after{content:'';position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;background:var(--lav);border-radius:50%}
.stat .sv{font-size:38px;font-weight:800;color:var(--pu);position:relative;z-index:1}
.stat .sl{font-size:13px;color:var(--muted);margin-top:4px;font-weight:600;position:relative;z-index:1}
.stat .si{font-size:26px;margin-bottom:8px;position:relative;z-index:1}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:var(--pu-d);color:#fff;padding:13px 16px;text-align:left;font-size:13px;font-weight:700;white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--lav-l)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;border:none;font-family:inherit}
.bp{background:linear-gradient(135deg,var(--pu),var(--pu-l));color:#fff;box-shadow:0 4px 14px rgba(91,31,140,.3)}
.bp:hover{background:linear-gradient(135deg,var(--pu-d),var(--pu));transform:translateY(-1px)}
.bn{background:var(--pu-d);color:#fff}.bn:hover{background:var(--pu)}
.bo{background:#fff;color:var(--pu);border:2px solid var(--pu)}.bo:hover{background:var(--pu);color:#fff}
.bd{background:var(--err);color:#fff}.bd:hover{background:#DC2626}
.bg2{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.bg2:hover{background:var(--lav);color:var(--pu);border-color:var(--lav-d)}
.blg{padding:14px 30px;font-size:16px;border-radius:12px}
.bsm{padding:6px 13px;font-size:12px;border-radius:7px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.fg{margin-bottom:16px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
label{display:block;font-size:13px;font-weight:700;color:var(--pu-d);margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 15px;border:2px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;font-family:inherit;background:#fff}
input:focus,select:focus,textarea:focus{border-color:var(--pu);box-shadow:0 0 0 3px rgba(91,31,140,.08)}
textarea{resize:vertical;min-height:80px}
.mo{position:fixed;inset:0;background:rgba(26,15,46,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:18px;padding:30px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(91,31,140,.25)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mh h3{font-size:18px;font-weight:800;color:var(--pu-d)}
.mc{width:34px;height:34px;border-radius:50%;background:var(--lav);border:none;cursor:pointer;font-size:16px;color:var(--pu);font-weight:700}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.ti{background:var(--pu-d);color:#fff;padding:13px 22px;border-radius:12px;font-size:14px;animation:si .3s;box-shadow:0 4px 20px rgba(91,31,140,.3);font-weight:600}
.ti.ok{background:#16A34A}.ti.er{background:var(--err)}
@keyframes si{from{transform:translateX(110px);opacity:0}to{transform:translateX(0);opacity:1}}
.lw{min-height:100vh;display:flex}
.ll{flex:1;background:linear-gradient(145deg,var(--pu-d),var(--pu) 60%,var(--pu-ll));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;color:#fff;position:relative;overflow:hidden}
.ll::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:rgba(255,255,255,.05);border-radius:50%}
.ll h1{font-size:40px;font-weight:800;margin-bottom:8px;position:relative}
.ll p{font-size:15px;opacity:.75;text-align:center;max-width:300px;position:relative;line-height:1.6}
.li{font-size:88px;margin-bottom:28px;position:relative}
.lr{width:480px;display:flex;align-items:center;justify-content:center;padding:40px;background:#fff}
.lb{width:100%}
.lb h2{font-size:30px;font-weight:800;color:var(--pu-d);margin-bottom:4px}
.lb p{font-size:14px;color:var(--muted);margin-bottom:30px}
.rt{display:flex;background:var(--lav);border-radius:12px;padding:4px;margin-bottom:26px}
.rb{flex:1;padding:9px;text-align:center;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:.2s}
.rb.on{background:#fff;color:var(--pu);box-shadow:0 2px 10px rgba(91,31,140,.15)}
.bc{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:14px;font-weight:500}
.bc a{color:var(--pu-l);cursor:pointer}.bc a:hover{color:var(--pu)}
.bc span{color:var(--muted)}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.ph h2{font-size:26px;font-weight:800;color:var(--pu-d)}
.ph p{font-size:14px;color:var(--muted);margin-top:5px}
.al{padding:14px 18px;border-radius:12px;font-size:14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;font-weight:500}
.al-i{background:var(--lav);border:1.5px solid var(--lav-d);color:var(--pu-d)}
.al-ok{background:#DCFCE7;border:1.5px solid #86EFAC;color:#166534}
.al-w{background:#FEF9C3;border:1.5px solid #FDE68A;color:#854D0E}
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.chip{display:inline-flex;align-items:center;padding:3px 11px;border-radius:99px;font-size:12px;font-weight:700}
.cp{background:var(--lav);color:var(--pu)}.cd{background:rgba(91,31,140,.15);color:var(--pu-d)}

/* HERO + FILTERS for home */
.hero-home{background:linear-gradient(135deg,var(--pu-d),var(--pu) 55%,var(--pu-l));border-radius:20px;padding:30px 32px;color:#fff;position:relative;overflow:hidden;margin-bottom:24px;box-shadow:0 10px 40px rgba(66,15,110,.25)}
.hero-home::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;background:rgba(255,255,255,.07);border-radius:50%}
.hero-home::after{content:'';position:absolute;bottom:-80px;left:-40px;width:200px;height:200px;background:rgba(255,255,255,.05);border-radius:50%}
.hero-greet{font-size:14px;opacity:.8;font-weight:500;margin-bottom:4px;position:relative}
.hero-name{font-size:28px;font-weight:800;margin-bottom:14px;position:relative}
.hero-kpis{display:flex;gap:14px;flex-wrap:wrap;position:relative}
.hero-kpi{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);padding:10px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.18)}
.hero-kpi .v{font-size:22px;font-weight:800}
.hero-kpi .l{font-size:11px;opacity:.8;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;align-items:center}
.fchip{padding:7px 14px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:.2s}
.fchip:hover{border-color:var(--pu-ll);color:var(--pu)}
.fchip.on{background:var(--pu);color:#fff;border-color:var(--pu)}
.fchip .n{opacity:.7;margin-left:4px;font-size:11px}
.fchip.on .n{opacity:1}

/* Section grid — richer cards */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:20px}
.sec-c{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:.25s;box-shadow:var(--sh);position:relative;display:flex;flex-direction:column}
.sec-c:hover{transform:translateY(-5px);box-shadow:var(--shh);border-color:var(--pu-ll)}
.sec-c-head{padding:20px 22px 16px;position:relative;overflow:hidden;color:#fff}
.sec-c-head::before{content:'';position:absolute;top:-30px;right:-30px;width:110px;height:110px;background:rgba(255,255,255,.1);border-radius:50%}
.sec-c-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;position:relative}
.sec-c-title{font-size:17px;font-weight:800;line-height:1.3;position:relative}
.sec-c-chip{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.2);padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;z-index:2}
.sec-c-body{padding:16px 22px 20px;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:14px}
.sec-c-desc{font-size:13px;color:var(--muted);line-height:1.5}
.sec-c-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600}
.sec-c-progress{margin-top:4px}
.sec-c-cert{margin-top:10px;padding:10px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;font-size:12px;color:#854D0E;font-weight:700;display:flex;align-items:center;gap:8px}

/* SETUP SCREEN */
.setup-wrap{min-height:100vh;background:linear-gradient(145deg,var(--pu-d),var(--pu) 60%,var(--pu-ll));display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:#fff;border-radius:20px;padding:40px;max-width:540px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.setup-card h2{font-size:24px;font-weight:800;color:var(--pu-d);margin-bottom:6px}
.db-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:16px}
.db-demo{background:#FEF9C3;color:#854D0E}
.db-live{background:#DCFCE7;color:#166534}
@media(max-width:768px){
  .ll{display:none}.lr{width:100%}
  .grid{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .bar-nav{display:none}
  .cert-in{padding:20px}
  .c-ttl{font-size:22px}.c-name{font-size:22px}
  .pdf-frame{height:500px}
  .pg{padding:16px 14px}
  .pg-sm{padding:16px 14px}
  .bar{padding:0 14px;height:58px}
  .bar-logo span{font-size:14px}
  .back-bar{padding:8px 14px}
  .q-card{padding:18px}
  .q-txt{font-size:15px}
  .opt{padding:11px 14px;font-size:14px}
  .modal{padding:20px;border-radius:14px}
  .fg2{grid-template-columns:1fr}

function themeFor(title){
  const t=(title||'').toLowerCase();
  for(const p of SEC_THEMES){ if(p.k.some(k=>t.includes(k))) return p; }
  // fallback by hash
  const palettes=[
    {icon:'📚',grad:'linear-gradient(135deg,#5B1F8C,#7B3FB8 60%,#9D6FD4)'},
    {icon:'🎓',grad:'linear-gradient(135deg,#0F766E,#14B8A6 60%,#5EEAD4)'},

    {icon:'🌟',grad:'linear-gradient(135deg,#DB2777,#EC4899 60%,#F9A8D4)'},
  ];
  let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))>>>0;
  return palettes[h%palettes.length];
}

function ls(k){try{return JSON.parse(localStorage.getItem('lms_'+k)||'[]')}catch{return[]}}
function ls2(k,v){localStorage.setItem('lms_'+k,JSON.stringify(v))}
function n(){return new Date().toISOString()}
function uid(){return 'id'+Date.now()+Math.floor(Math.random()*9999)}
function saveFile(lid,d){try{localStorage.setItem('lms_f_'+lid,JSON.stringify(d));return true}catch{return false}}
function getFile(lid){try{return JSON.parse(localStorage.getItem('lms_f_'+lid)||'null')}catch{return null}}
function delFile(lid){localStorage.removeItem('lms_f_'+lid)}

// ── Sequence overrides — persistent local store that survives Supabase syncs
// This lets the sequence_step feature work even when the SQL columns aren't added yet
function getSeqOv(){try{return JSON.parse(localStorage.getItem('lms_seq_ov')||'{}')}catch{return{}}}
function setSeqOv(lid,data){
  const o=getSeqOv();
  const step=data.sequence_step||0;
  const prereq=!!data.is_prerequisite;
  if(step>0||prereq){o[lid]={is_prerequisite:prereq,sequence_step:step};}
  else{delete o[lid];}
  localStorage.setItem('lms_seq_ov',JSON.stringify(o));
}
function delSeqOv(lid){const o=getSeqOv();delete o[lid];localStorage.setItem('lms_seq_ov',JSON.stringify(o));}
function applySeqOv(x){
  if(!x)return x;
  const o=getSeqOv();
  if(Array.isArray(x)){
    return x.map(l=>{
      const ov=o[l.id];
      if(!ov)return l;
      return{...l,is_prerequisite:ov.is_prerequisite,sequence_step:ov.sequence_step};
    });
  }
  if(x.id){
    const ov=o[x.id];
    if(!ov)return x;
    return{...x,is_prerequisite:ov.is_prerequisite,sequence_step:ov.sequence_step};
  }
  return x;
}

const db = {
  async users(){
    if(SB){
      const{data,error}=await SB.from('lms_users').select('*');

  async addUser(u){
    if(SB){
      const {data,error}=await SB.from('lms_users').insert(u).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('users');a.push(data);ls2('users',a);
      return data;
    }
    u.id=uid();let a=ls('users');a.push(u);ls2('users',a);return u;
  },
  async updUser(id,d){
    if(SB){
      const {error}=await SB.from('lms_users').update(d).eq('id',id);
      if(error)throw new Error('Update failed: '+error.message);
    }
    ls2('users',ls('users').map(u=>u.id===id?{...u,...d}:u));
  },
  async delUser(id){
    if(SB){
      const {error}=await SB.from('lms_users').delete().eq('id',id);
      if(error)throw new Error('Delete failed: '+error.message);
    }
    ls2('users',ls('users').filter(u=>u.id!==id));
  },
  async sections(){
    if(SB){
      const{data,error}=await SB.from('lms_sections').select('*').order('order_num');
      if(!error&&data){ls2('sections',data);return data;}
    }
    return ls('sections').sort((a,b)=>(a.order_num||0)-(b.order_num||0));
  },
  async addSection(s){
    if(SB){
      const {data,error}=await SB.from('lms_sections').insert(s).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('sections');a.push(data);ls2('sections',a);

        return merged;

    return applySeqOv(ls('lectures').filter(l=>l.section_id===sid).sort((a,b)=>a.order_num-b.order_num));

  async lecture(id){

    return applySeqOv(ls('lectures').find(l=>l.id===id))||null;

  async addLecture(l){
    if(SB){
      const {data,error}=await SB.from('lms_lectures').insert(l).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('lectures');a.push(data);ls2('lectures',a);
      return data;

  async updLecture(id,d){

      const {error}=await SB.from('lms_lectures').update(d).eq('id',id);

      if(error)throw new Error('Delete failed: '+error.message);
    }
    delFile(id);delSeqOv(id);ls2('lectures',ls('lectures').filter(l=>l.id!==id));ls2('questions',ls('questions').filter(q=>q.lecture_id!==id));
  },
  async questions(lid){
    if(SB){
      const{data,error}=await SB.from('lms_questions').select('*').eq('lecture_id',lid);
      if(!error&&data){
        const others=ls('questions').filter(q=>q.lecture_id!==lid);
        ls2('questions',[...others,...data]);
        return data;
      }
    }
    return ls('questions').filter(q=>q.lecture_id===lid);

  async addQuestion(q){
    if(SB){
      const {data,error}=await SB.from('lms_questions').insert(q).select().single();
      if(error)throw new Error('Save failed: '+error.message);
      let a=ls('questions');a.push(data);ls2('questions',a);

    ls2('questions',ls('questions').map(q=>q.id===id?{...q,...d}:q));

      const {error}=await SB.from('lms_questions').delete().eq('id',id);

    }

  async completions(uid){
    if(SB){const{data}=await SB.from('lms_completions').select('*').eq('user_id',uid);return data||[]}
    return ls('completions').filter(c=>c.user_id===uid);

  async allCompletions(){
    if(SB){const{data}=await SB.from('lms_completions').select('*');return data||[]}
    return ls('completions');

  async addCompletion(c){
    if(SB){
      await SB.from('lms_completions').upsert(
        {user_id:c.user_id,lecture_id:c.lecture_id,completed_at:c.completed_at},
        {onConflict:'user_id,lecture_id'}
      );
    }
    let a=ls('completions');
    if(!a.find(x=>x.user_id===c.user_id&&x.lecture_id===c.lecture_id)){
      c.id=c.id||uid();a.push(c);ls2('completions',a);
    }
  },
  async isCompleted(uid,lid){
    if(SB){const{data}=await SB.from('lms_completions').select('id').eq('user_id',uid).eq('lecture_id',lid).single();return!!data}
    return ls('completions').some(c=>c.user_id===uid&&c.lecture_id===lid);

  async attempts(uid){
    if(SB){const{data}=await SB.from('lms_attempts').select('*').eq('user_id',uid);return data||[]}

  },
  async uploadFile(lid, file, progressCb){
    if(SB){
      const path=`lectures/${lid}/${file.name}`;
      const{error}=await SB.storage.from('lms-files').upload(path,file,{upsert:true});
      if(error)throw error;
      const{data}=SB.storage.from('lms-files').getPublicUrl(path);
      return{url:data.publicUrl,name:file.name,type:file.type,size:file.size};
    }else{
      return new Promise((res,rej)=>{
        const reader=new FileReader();
        reader.onload=e=>{
          const ok=saveFile(lid,{data:e.target.result,name:file.name,type:file.type,size:file.size});
          if(ok)res({url:null,name:file.name,type:file.type,size:file.size});
          else rej(new Error('Storage full'));
        };
        reader.onerror=()=>rej(new Error('Read failed'));
        reader.readAsDataURL(file);
      });
    }
  },
  getFileUrl(lid){
    if(SB){const lec=ls('lectures').find(l=>l.id===lid);return lec?.file_path||null}
    const fd=getFile(lid);return fd?fd.data:null;
  }
};

// AUTO-SEED: Ensure Dialysis Team section exists
// ════════════════════════════════════════════════════════════════
async function ensureDefaultSections(){
  if(localStorage.getItem('lms_default_seeded_v2'))return;
  try{
    const existing=await db.sections();
    const defaults=[
      {title:'Dialysis Team',description:'Training materials and continuing education for the dialysis nursing team',placeholder_icon:'🩸'}
    ];
    let added=false;
    for(const def of defaults){
      const exists=existing.find(s=>s.title.toLowerCase().includes(def.title.toLowerCase().split(' ')[0]));
      if(!exists){
        await db.addSection({title:def.title,description:def.description,order_num:(existing.length||0)+1,created_at:n()});
        added=true;
      }
    }
    localStorage.setItem('lms_default_seeded_v2','1');
    if(added)console.log('Default sections seeded ✅');
  }catch(e){console.warn('Default seed failed:',e);}
}

// ════════════════════════════════════════════════════════════════
async function pageSection(sid){
  const secs=await db.sections(),sec=secs.find(s=>s.id===sid);if(!sec){go('home');return}
  const lecs=await db.lectures(sid),comps=await db.completions(U.id),certs=await db.certs(U.id);
  const hasCert=certs.find(c=>c.section_id===sid);
  const quizResults=await Promise.all(lecs.map(async l=>({
    watched:!!comps.find(c=>c.lecture_id===l.id),
    passed:l.has_quiz?await db.hasPassed(U.id,l.id):true
  })));
  const allDone=lecs.length>0&&quizResults.every(r=>r.watched&&r.passed);

  // ── Multi-step sequence logic ──
  // Each lecture can have sequence_step 0 (free) or 1-5 (ordered).
  // Step N unlocks only after ALL lectures at step N-1 are completed.
  // Free (step 0) lectures unlock after ALL sequence steps are completed.
  // Backward compat: is_prerequisite=true → treat as step 1 if no sequence_step set.
  const stepOf=l=>l.sequence_step||(l.is_prerequisite?1:0);
  const sequentialLecs=lecs.filter(l=>stepOf(l)>0);
  const stepsGrouped={};
  sequentialLecs.forEach(l=>{const s=stepOf(l);(stepsGrouped[s]=stepsGrouped[s]||[]).push(l)});
  const sortedSteps=Object.keys(stepsGrouped).map(Number).sort((a,b)=>a-b);

  // Helper: is a lecture fully completed?
  const isDone=async l=>{
    const w=!!comps.find(c=>c.lecture_id===l.id);
    const p=l.has_quiz?await db.hasPassed(U.id,l.id):true;
    return w&&p;
  };
  // Check completion per step
  const stepDone={};
  for(const step of sortedSteps){
    const results=await Promise.all(stepsGrouped[step].map(isDone));
    stepDone[step]=results.every(Boolean);
  }
  const allSeqDone=sortedSteps.every(s=>stepDone[s]);

  // Determine lock state for each lecture
  const lockOf=l=>{
    const step=stepOf(l);
    if(step===0){
      // Free lecture — locked until ALL sequence steps are done
      return sortedSteps.length>0&&!allSeqDone;
    }
    // Step lecture — unlocked if all previous steps done
    const prevSteps=sortedSteps.filter(s=>s<step);
    return prevSteps.some(s=>!stepDone[s]);
  };

  const pendingSteps=sortedSteps.filter(s=>!stepDone[s]);
  const nextPendingStep=pendingSteps[0];
  const nextPendingNames=nextPendingStep?stepsGrouped[nextPendingStep].map(l=>l.title):[];

  const items=await Promise.all(lecs.map(async lec=>{
    const watched=comps.find(c=>c.lecture_id===lec.id);
    const quizPassed=lec.has_quiz?await db.hasPassed(U.id,lec.id):true;
    const done=watched&&quizPassed;
    const typeIcon=lec.type==='youtube'?'▶':lec.type==='video'?'🎬':'📄';
    const typeLabel=lec.type==='youtube'?'Video lecture':lec.type==='video'?'Video file':'Presentation / PDF';
    const step=stepOf(lec);
    const isLocked=lockOf(lec);
    let badge='';
    if(isLocked){
      badge=`<span class="bdg" style="background:#F3F4F6;color:#6B7280">🔒 Locked</span>`;
    } else if(lec.has_quiz){
      if(done) badge=`<span class="bdg bdg-ok">✅ Done</span>`;
      else if(watched) badge=`<span class="bdg" style="background:#FEE2E2;color:#991B1B">❌ Retake Quiz</span>`;
      else badge=`<span class="bdg bdg-q">📝 Quiz</span>`;
    } else {
      badge=done?`<span class="bdg bdg-ok">✅ Done</span>`:`<span class="bdg bdg-w">${typeIcon} View</span>`;
    }
    const stepBadge=step>0?`<span class="bdg" style="background:#FEF3C7;color:#92400E;margin-right:6px">⭐ Step ${step}</span>`:'';
    const clickHandler=isLocked
      ?`onclick="toast('🔒 Complete Step '+${step>0?step-1:'all sequence steps'}+' first','')"`
      :`onclick="go('lecture',{id:'${lec.id}'},{page:'section',par:{id:'${sid}'},label:'Back to Section'})"`;
    const rowStyle=isLocked?'opacity:.6;background:#FAFAFA;':step>0?'border-left:4px solid #F59E0B;background:#FFFBEB':'';
    return`<div class="lec-item ${done?'done':''}" style="${rowStyle}" ${clickHandler}>
      <div class="lec-ico" style="${isLocked?'filter:grayscale(1);opacity:.7':''}">${isLocked?'🔒':typeIcon}</div>
      <div class="lec-info"><h4>${lec.title}</h4><span>${typeLabel}${lec.has_quiz?' · Includes quiz':''}</span></div>
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">${stepBadge}${badge}</div>
    </div>`;
  }));
  const itemsHtml=items.join('');

  const prereqBanner=sortedSteps.length>0&&!allSeqDone
    ?`<div class="al al-w"><span>⭐ <strong>Follow the sequence:</strong> Complete <strong>Step ${nextPendingStep}</strong> (${nextPendingNames.join(', ')}) to unlock the next step${pendingSteps.length>1?'s':''}.</span></div>`
    :'';
  const banner=hasCert
    ?`<div class="al al-ok"><span>🏆 You earned a certificate for this section!</span><button class="btn bp bsm" onclick="go('cert',{id:'${hasCert.id}'},{page:'section',par:{id:'${sid}'},label:'Back'})">View Certificate</button></div>`
    :allDone?`<div class="al al-i"><span>🎉 All lectures complete! Claim your certificate.</span><button class="btn bp bsm" onclick="issueCert('${sid}')">Get Certificate</button></div>`:prereqBanner;
  const theme=themeFor(sec.title);
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('home')">🏠 Home</a><span>›</span><span>${sec.title}</span></div>
    <div style="background:${theme.grad};border-radius:16px;padding:24px 28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:rgba(255,255,255,.1);border-radius:50%"></div>
      <div style="width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px;position:relative">${theme.icon}</div>
      <h2 style="font-size:24px;font-weight:800;position:relative">${sec.title}</h2>
      ${sec.description?`<p style="margin-top:6px;opacity:.85;font-size:14px;position:relative">${sec.description}</p>`:''}
    </div>
    ${banner}
    <div>${itemsHtml||`<div style="text-align:center;padding:50px 20px;background:var(--card);border-radius:var(--r);border:1px dashed var(--border);color:var(--muted)">
      <div style="font-size:42px;margin-bottom:10px">🔜</div>
      <p style="font-weight:600">No lectures in this section yet</p>
      <p style="font-size:13px;margin-top:4px">Lectures will be added soon — check back later!</p>
    </div>`}</div>
  </div>`
}
async function issueCert(sid){
  const secs=await db.sections(),sec=secs.find(s=>s.id===sid);

let vidDone=false;
let YT_PLAYER=null;

async function pageLecture(lid){
  const lec=await db.lecture(lid);if(!lec){go('home');return}
  // Enforce sequence lock on direct navigation
  const sectionLecs=await db.lectures(lec.section_id);
  const stepOf=l=>l.sequence_step||(l.is_prerequisite?1:0);
  const myStep=stepOf(lec);
  const allStepLecs=sectionLecs.filter(l=>stepOf(l)>0);
  if(allStepLecs.length){
    const comps2=await db.completions(U.id);
    const stepsGrouped={};
    allStepLecs.forEach(l=>{const s=stepOf(l);(stepsGrouped[s]=stepsGrouped[s]||[]).push(l)});
    const sortedSteps=Object.keys(stepsGrouped).map(Number).sort((a,b)=>a-b);
    const isDone=async l=>{
      const w=!!comps2.find(c=>c.lecture_id===l.id);
      const p=l.has_quiz?await db.hasPassed(U.id,l.id):true;
      return w&&p;
    };
    const stepDone={};
    for(const s of sortedSteps){
      const r=await Promise.all(stepsGrouped[s].map(isDone));
      stepDone[s]=r.every(Boolean);
    }
    let locked=false;
    if(myStep===0){
      // Free lecture — needs ALL sequence steps done
      locked=!sortedSteps.every(s=>stepDone[s]);
    } else {
      // Step lecture — needs all previous steps done
      const prev=sortedSteps.filter(s=>s<myStep);
      locked=prev.some(s=>!stepDone[s]);
    }
    if(locked){
      toast('🔒 Complete the previous step first','er');
      go('section',{id:lec.section_id});
      return;
    }
  }
  const secs=await db.sections(),sec=secs.find(s=>s.id===lec.section_id);
  vidDone=await db.isCompleted(U.id,lid);
  const passed=lec.has_quiz?await db.hasPassed(U.id,lid):true;

  let content='';
  if(lec.type==='youtube'){
    content=buildYT(lec.url,lid);
  }else if(lec.type==='video'){
    content=buildVideo(lid,lec);
  }else{
    content=buildFileViewer(lid,lec);
  }

  let actionBtns='';
  if(vidDone&&lec.has_quiz&&passed){
    actionBtns=`<div class="al al-ok" style="margin:0;flex:1">✅ Quiz passed!</div>`;
    if(lec.has_quiz) actionBtns+=`<button class="btn bp blg" onclick="go('quiz',{id:'${lid}'},{page:'lecture',par:{id:'${lid}'},label:'Back to Lecture'})">↩ Retake Quiz</button>`;
  } else if(lec.has_quiz){
    if(!vidDone){
      actionBtns=`<button class="btn bg2 blg" onclick="markWatchedManual('${lid}')">✅ I've finished — Unlock Quiz</button>`;
    } else {
      actionBtns=`<button id="qbtn" class="btn bp blg" onclick="go('quiz',{id:'${lid}'},{page:'lecture',par:{id:'${lid}'},label:'Back to Lecture'})">📝 Take Quiz</button>`;
    }
  } else {
    if(vidDone){
      actionBtns=`<div class="al al-ok" style="margin:0;flex:1">✅ Marked as viewed</div>`;
    } else {
      actionBtns=`<button class="btn bp blg" onclick="markDone('${lid}')">✅ Mark as complete</button>`;
    }
  }

// YOUTUBE — EMBEDDED INLINE (no redirect)

function buildYT(videoId,lid){
  return`<div class="vid-wrap">
    <iframe id="yt-iframe"
      src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}"
      allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
      allowfullscreen></iframe>
  </div>
  <div style="background:var(--lav-l);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    💡 <span>Watch the full video — the system will auto-detect when it ends.</span>
  </div>`;
}
function initYTListener(lid){
  const iframe=document.getElementById('yt-iframe');
  if(!iframe)return;
  let playing=false;
  const handler=function(e){
    if(e.source!==iframe.contentWindow)return;
    if(!e.data||typeof e.data!=='string')return;
    try{
      const d=JSON.parse(e.data);
      if(d.event==='onStateChange'){
        if(d.info===1)playing=true;
        if(d.info===0&&playing&&!vidDone){
          (async()=>{
            vidDone=true;
            await db.addCompletion({user_id:U.id,lecture_id:lid,completed_at:n()});
            toast('✅ Video complete — quiz unlocked!','ok');
            await pageLecture(lid);
          })();
        }
      }
    }catch(err){}
  };
  window.addEventListener('message',handler);
  // Subscribe to YouTube events via postMessage
  setTimeout(()=>{
    try{
      iframe.contentWindow.postMessage(JSON.stringify({event:'listening'}),'*');
      iframe.contentWindow.postMessage(JSON.stringify({event:'command',func:'addEventListener',args:['onStateChange']}),'*');
    }catch(e){}
  },1000);
}

function buildFileViewer(lid,lec){
  const fileUrl=lec.file_path||null;
  const localFd=getFile(lid);
  const fd=fileUrl?{url:fileUrl,name:lec.file_name||'File',type:lec.file_type||'',size:0}:localFd;
  if(!fd){
    return`<div class="file-viewer"><div class="fv-header"><h4>📄 ${lec.title}</h4></div>
      <div class="no-file"><div class="nfi">⏳</div><h3>File not uploaded yet</h3>
      <p>The admin has not uploaded this file yet.<br>Please check back later.</p></div></div>`;
  }
  const src=fd.url||fd.data;
  const isPdf=fd.type==='application/pdf'||fd.name.endsWith('.pdf');
  const sizeLabel=fd.size>0?(fd.size>1048576?(fd.size/1048576).toFixed(1)+' MB':Math.round(fd.size/1024)+' KB'):'';
  const isPptx=fd.name.endsWith('.pptx')||fd.name.endsWith('.ppt');
  let viewerHtml='';
  if(isPdf){
    const isLocalData=src.startsWith('data:');
    if(isLocalData){
      viewerHtml=`<iframe class="pdf-frame" id="pdf-iframe" src="${src}" onload="onPdfLoad()"></iframe>`;
    } else {
      const gDocsUrl='https://docs.google.com/viewer?url='+encodeURIComponent(src)+'&embedded=true';
      viewerHtml=`<div style="position:relative">
        <iframe class="pdf-frame" id="pdf-iframe" src="${gDocsUrl}" onload="onPdfLoad()"></iframe>
        <div style="padding:10px 0;text-align:center">
          <a href="${src}" target="_blank" class="btn bg2 bsm" style="font-size:12px">📱 Open PDF directly (if viewer doesn't load)</a>
        </div>
      </div>`;
    }
  } else if(isPptx && (fd.url)){
    const gUrl='https://docs.google.com/gview?url='+encodeURIComponent(fd.url)+'&embedded=true';
    viewerHtml=`<iframe class="pdf-frame" id="pdf-iframe" src="${gUrl}" onload="onPdfLoad()"></iframe>`;
  } else {
    viewerHtml=`<div style="padding:50px 30px;text-align:center">
      <div style="font-size:60px;margin-bottom:16px">📊</div>
      <h3 style="color:#fff;font-size:18px;margin-bottom:8px">${fd.name}</h3>
      <p style="color:rgba(255,255,255,.5);font-size:14px;line-height:1.7;margin-bottom:20px">
        This presentation is ready to view.<br>
        Upload as <strong style="color:var(--pu-ll)">PDF format</strong> for best inline display.
      </p>
    </div>`;
  }

  const dlBtn=isPdf?`<a href="${src}" download="${fd.name}" class="btn bo bsm" style="color:#fff;border-color:rgba(255,255,255,.3)">⬇️ Download PDF</a>`:'';
  return`<div class="file-viewer">
    <div class="fv-header">
      <h4>📄 ${fd.name} ${sizeLabel?`<span style="font-size:11px;opacity:.4;font-weight:500">${sizeLabel}</span>`:''}</h4>
      ${dlBtn}
    </div>
    ${viewerHtml}
    <div class="fv-footer">
      <span style="color:rgba(255,255,255,.5);font-size:13px">
        ${isPdf?'Scroll through all pages to review':'View all slides carefully'}
      </span>
    </div>
  </div>`;
}

let QS={};
async function pageQuiz(lid){
  const lec=await db.lecture(lid);if(!lec){go('home');return}
  const all=await db.questions(lid);
  if(!all.length){toast('No questions available yet','er');return}
  const quizCount=Math.min(lec.quiz_count||10, all.length);
  const seed=Date.now();
  const shuffleArr=arr=>[...arr].map(v=>({v,s:Math.sin(seed*Math.random())})).sort((a,b)=>a.s-b.s).map(x=>x.v);
  const picked=shuffleArr(all).slice(0,quizCount);
  const qs=picked.map(q=>{
    const opts=shuffleArr([
      {key:'a',text:q.option_a,correct:q.correct_answer==='a'},
      {key:'b',text:q.option_b,correct:q.correct_answer==='b'},
      {key:'c',text:q.option_c,correct:q.correct_answer==='c'},
      {key:'d',text:q.option_d,correct:q.correct_answer==='d'}
    ]);
    return{...q,shuffled:opts};
  });
  QS={lid,qs,cur:0,ans:{},time:20*60,ti:null,done:false};renderQ();
  QS.ti=setInterval(()=>{
    QS.time--;
    const el=document.getElementById('qtimer');
    if(el){const m=String(Math.floor(QS.time/60)).padStart(2,'0'),s=String(QS.time%60).padStart(2,'0');
      el.textContent='⏱ '+m+':'+s;if(QS.time<120)el.classList.add('red');}
    if(QS.time<=0){clearInterval(QS.ti);submitQ();}
  },1000);
}
function renderQ(){
  const q=QS.qs[QS.cur],tot=QS.qs.length,cur=QS.cur+1,sel=QS.ans[QS.cur];
  const m=String(Math.floor(QS.time/60)).padStart(2,'0'),s=String(QS.time%60).padStart(2,'0');
  const letters=['a','b','c','d'];
  const opts=q.shuffled.map((opt,i)=>{
    const k=letters[i];
    return`<div class="opt ${sel===k?'sel':''}" onclick="selOpt('${k}')">
      <div class="opt-l">${k.toUpperCase()}</div><span>${opt.text}</span></div>`;
  }).join('');
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:740px">
    <div class="q-hdr">
      <div><div style="font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600">Question ${cur} of ${tot}</div>
        <div class="pbar" style="width:220px;height:8px"><div class="pfill" style="width:${((cur/tot)*100).toFixed(0)}%"></div></div></div>
      <div id="qtimer" class="timer ${QS.time<120?'red':''}">⏱ ${m}:${s}</div>
    </div>
    <div class="q-card"><div class="q-num">Question ${cur}</div><div class="q-txt">${q.question_text}</div><div class="opts">${opts}</div></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button class="btn bg2" onclick="qnav(-1)" ${QS.cur===0?'disabled':''}>← Previous</button>
      <span style="font-size:13px;color:var(--muted);font-weight:600">${Object.keys(QS.ans).length}/${tot} answered</span>
      ${QS.cur<tot-1?`<button class="btn bp" onclick="qnav(1)">Next →</button>`:`<button class="btn bn blg" onclick="submitQ()">Submit ✓</button>`}
    </div>
  </div>`
}
function selOpt(k){QS.ans[QS.cur]=k;renderQ()}
function qnav(d){QS.cur+=d;renderQ()}
async function submitQ(){
  if(QS.done)return;QS.done=true;clearInterval(QS.ti);
  const qs=QS.qs;let ok=0;
  qs.forEach((q,i)=>{
    const letters=['a','b','c','d'];
    const selectedIdx=letters.indexOf(QS.ans[i]);
    if(selectedIdx>=0&&q.shuffled[selectedIdx]?.correct)ok++;
  });
  const score=Math.round(ok/qs.length*100),passed=score===100;
  await db.addAttempt({user_id:U.id,lecture_id:QS.lid,score,passed,attempted_at:n()});
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:600px">
    <div class="card" style="text-align:center;padding:52px 36px">
      <div class="r-circle ${passed?'r-pass':'r-fail'}">${passed?'100%':score+'%'}</div>
      <h2 style="font-size:30px;color:var(--pu-d);margin-bottom:10px">${passed?'🎉 Excellent!':'😔 Not Passed'}</h2>
      <p style="color:var(--muted);margin-bottom:26px;font-size:15px">You got ${ok} out of ${qs.length} correct. ${passed?'Congratulations! 🎉':'You need 100% to earn the certificate. Please retry.'}</p>
      <div style="background:var(--lav-l);border-radius:14px;padding:22px;margin-bottom:28px;display:grid;grid-template-columns:1fr 1fr;gap:20px;border:1px solid var(--border)">
        <div><div style="font-size:30px;font-weight:800;color:var(--ok)">${ok}</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:4px">Correct</div></div>
        <div><div style="font-size:30px;font-weight:800;color:var(--err)">${qs.length-ok}</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:4px">Incorrect</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${passed
          ?`<button class="btn bp blg" onclick="goAfterQ()">View My Progress →</button>`
          :`<button class="btn bp blg" onclick="go('lecture',{id:'${QS.lid}'},{page:'home',par:{},label:'Home'})">🔄 Retake Quiz</button>`
        }
      </div>
    </div>
  </div>`
}

async function exportExcel(){
  const users=await db.users(),secs=await db.sections();
  const comps=await db.allCompletions(),atts=await db.allAttempts(),certs=await db.allCerts();
  const emps=users.filter(u=>u.role==='employee');
  const rows=[];
  rows.push(['Employee Name','Employee #','File #','Iqama #','Section','Lecture','Status','Best Score','Certificate Ref']);
  for(const emp of emps){
    const ec=comps.filter(c=>c.user_id===emp.id);
    const ea=atts.filter(a=>a.user_id===emp.id);
    const ecc=certs.filter(c=>c.user_id===emp.id);
    for(const sec of secs){
      const lecs=await db.lectures(sec.id);
      const sc=ecc.find(c=>c.section_id===sec.id);
      for(const lec of lecs){
        const w=ec.find(c=>c.lecture_id===lec.id)?'Watched':'Not watched';
        const la=ea.filter(a=>a.lecture_id===lec.id);
        const bs=la.length?String(Math.max(...la.map(a=>a.score)))+'%':'-';
        rows.push([emp.name,emp.badge_id,emp.file_number||'-',emp.iqama_number,sec.title,lec.title,w,bs,sc?sc.ref_number:'-']);
      }
    }
  }
  const q=function(v){return '"'+String(v).split('"').join('""')+'"';};
  const nl=String.fromCharCode(13)+String.fromCharCode(10);
  const csvStr=rows.map(function(r){return r.map(q).join(',');}).join(nl);
  const bom=String.fromCharCode(65279);
  const blob=new Blob([bom+csvStr],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='Meena_Training_Report.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Report downloaded!','ok');
}

async function moveLec(id,sid,dir){
  const lecs=await db.lectures(sid);

  const aOrder=a.order_num||(idx+1),bOrder=b.order_num||(targetIdx+1);
  try{
    await db.updLecture(a.id,{order_num:bOrder});
    await db.updLecture(b.id,{order_num:aOrder});
    toast('✅ Order updated','ok');
    pageAdminLectures(sid);
  }catch(e){toast('❌ '+e.message,'er');}
}

      <button class="btn bg2" onclick="cmo()">Cancel</button>
      <button class="btn bp" id="save-btn" disabled onclick="finishUpload('${lid}')">💾 Save to Lectures</button>
    </div>
  </div></div>`
}
let _pendingFile=null;
function handleAdminUpload(lid,input,isVideo){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('up-status');
  const maxBytes=(isVideo?50:8)*1024*1024;
  if(file.size>maxBytes){if(st)st.innerHTML=`<span style="color:var(--err)">⚠️ File too large (${(file.size/1048576).toFixed(1)} MB). Max ${isVideo?50:8} MB.</span>`;return}
  if(st)st.textContent='Reading file...';
  const reader=new FileReader();
  reader.onload=e=>{
    _pendingFile={data:e.target.result,name:file.name,type:file.type,size:file.size};
    const uz=document.getElementById('uz');
    if(uz){uz.classList.add('has-file');uz.innerHTML=`<div style="font-size:36px;margin-bottom:8px">✅</div><div style="font-weight:700;color:#166534">${file.name}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${(file.size/1048576).toFixed(2)} MB</div>`;}
    if(st)st.innerHTML=`<span style="color:var(--ok);font-weight:600">✅ File ready to save</span>`;
    const btn=document.getElementById('save-btn');if(btn)btn.disabled=false;
  };
  reader.onerror=()=>{if(st)st.innerHTML=`<span style="color:var(--err)">❌ Error reading file</span>`;};
  reader.readAsDataURL(file);
}
async function finishUpload(lid){
  if(!_pendingFile){toast('No file','er');return}
  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='Uploading...';}
  try{
    if(SB){
      const path='lectures/'+lid+'/'+_pendingFile.name;
      const byteStr=atob(_pendingFile.data.split(',')[1]);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:_pendingFile.type});
      const {error}=await SB.storage.from('lms-files').upload(path,blob,{upsert:true,contentType:_pendingFile.type});
      if(error)throw new Error(error.message);
      const {data}=SB.storage.from('lms-files').getPublicUrl(path);
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type,file_path:data.publicUrl});
      saveFile(lid,{..._pendingFile,url:data.publicUrl});
      toast('✅ File uploaded to cloud!','ok');
    } else {
      const ok=saveFile(lid,_pendingFile);
      if(!ok)throw new Error('Browser storage full. Connect Supabase to upload larger files.');
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type});
      toast('✅ File uploaded!','ok');
    }
    _pendingFile=null;cmo();pageAdminLectures(PAR.id);
  }catch(e){
    toast('❌ '+e.message,'er');
    if(btn){btn.disabled=false;btn.textContent='💾 Save to Lectures';}
  }
}

  const fullData={title:t,type,url,has_quiz:hq,quiz_count:qc,is_prerequisite:isPrereq,sequence_step:seqStep};
  const basicData={title:t,type,url,has_quiz:hq,quiz_count:qc};
  try{
    const lecs=await db.lectures(_elsid);
    let savedId=_elid;
    try{
      if(_elid)await db.updLecture(_elid,fullData);
      else {
        const newLec=await db.addLecture({section_id:_elsid,...fullData,order_num:lecs.length+1,created_at:n()});
        savedId=newLec?.id||(ls('lectures').slice(-1)[0]?.id);
      }
    }catch(e){
      // Fallback: try without new columns if they don't exist in DB
      const msg=e.message||'';
      if(/is_prerequisite|sequence_step/i.test(msg)){
        console.warn('Column missing — saving without sequence fields. Run in Supabase:\nALTER TABLE lms_lectures ADD COLUMN IF NOT EXISTS is_prerequisite BOOLEAN DEFAULT false;\nALTER TABLE lms_lectures ADD COLUMN IF NOT EXISTS sequence_step INTEGER DEFAULT 0;');
        toast('⚠️ Saved locally. Run SQL migration for cloud sync (see console)','');
        if(_elid)await db.updLecture(_elid,basicData);
        else {
          const newLec=await db.addLecture({section_id:_elsid,...basicData,order_num:lecs.length+1,created_at:n()});
          savedId=newLec?.id||(ls('lectures').slice(-1)[0]?.id);
        }
      } else { throw e; }
    }
    // ALWAYS persist the sequence override locally — survives syncAll overwrites
    if(savedId){
      setSeqOv(savedId,{is_prerequisite:isPrereq,sequence_step:seqStep});
      // Also update current ls cache so UI reflects change immediately
      ls2('lectures',ls('lectures').map(l=>l.id===savedId?{...l,is_prerequisite:isPrereq,sequence_step:seqStep}:l));
    }
    toast(_elid?'Updated! ✅':'Lecture added! ✅','ok');cmo();pageAdminLectures(_elsid);
  }catch(e){toast('❌ Error: '+e.message,'er');console.error(e);}
}

function parseBulkQuestions(text){
  const out=[],errors=[];
  // Split by blank lines (one or more)
  const blocks=text.split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  blocks.forEach((block,idx)=>{
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length<5){
      errors.push(`Block ${idx+1}: needs at least 5 lines (question + 4 options), got ${lines.length}`);
      return;
    }
    let questionText='';
    const opts={a:'',b:'',c:'',d:''};
    let correct='';
    for(const line of lines){
      // Option pattern: A) / A. / A: / A- with optional space
      const optMatch=line.match(/^([a-dA-D])\s*[\)\.:\-]\s*(.+)$/);
      if(optMatch){
        let text=optMatch[2].trim();
        const key=optMatch[1].toLowerCase();
        // Check for correct marker
        if(/[\*\✓\✅]\s*$/.test(text)){
          correct=key;
          text=text.replace(/\s*[\*\✓\✅]\s*$/,'').trim();
        } else if(/\s*\(correct\)\s*$/i.test(text)){
          correct=key;
          text=text.replace(/\s*\(correct\)\s*$/i,'').trim();
        }
        opts[key]=text;
        continue;
      }
      // Answer line: "Answer: B" / "Correct: B" / "الجواب: B"
      const ansMatch=line.match(/^(?:Answer|Correct|الجواب|الاجابة)\s*[:\-]\s*([a-dA-D])/i);
      if(ansMatch){
        correct=ansMatch[1].toLowerCase();
        continue;
      }
      // Q line: "Q:" / "Question:" / numbered "1." "1)"
      const qMatch=line.match(/^(?:Q|Question|س|السؤال)\s*[:\-]\s*(.+)$/i)
                 ||line.match(/^\d+\s*[\.\)\-]\s*(.+)$/);
      if(qMatch){
        questionText=qMatch[qMatch.length-1].trim();
        continue;
      }
      // If no question yet, this IS the question
      if(!questionText){questionText=line;}
      else if(!opts.a){questionText+=' '+line;} // continuation
    }
    // Validate
    if(!questionText){errors.push(`Block ${idx+1}: no question text found`);return;}
    if(!opts.a||!opts.b||!opts.c||!opts.d){
      const missing=['a','b','c','d'].filter(k=>!opts[k]).map(k=>k.toUpperCase()).join(', ');
      errors.push(`Block ${idx+1} "${questionText.slice(0,40)}...": missing option(s) ${missing}`);
      return;
    }
    if(!correct){errors.push(`Block ${idx+1} "${questionText.slice(0,40)}...": no correct answer marked (use * or "Answer: X")`);return;}
    out.push({
      question_text:questionText,
      option_a:opts.a,option_b:opts.b,option_c:opts.c,option_d:opts.d,
      correct_answer:correct
    });
  });
  return{questions:out,errors};
}
function previewBulk(){
  const text=document.getElementById('bulk-text').value;

  const {questions,errors}=parseBulkQuestions(text);

        <div style="flex:1">
          <h2 style="font-size:22px;color:var(--pu-d);font-weight:800">${emp.name}</h2>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;color:var(--muted)">
            <span>📋 Employee: <strong>#${emp.badge_id}</strong></span>
            <span>📁 File: <strong>${emp.file_number||'—'}</strong></span>
            <span>🪪 Iqama: <strong>${emp.iqama_number}</strong></span>
            ${emp.email?`<span>📧 <strong>${emp.email}</strong></span>`:''}
            <span>🏆 ${certs.length} certificate${certs.length!==1?'s':''}</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${certs.map(c=>`<button class="btn bo bsm" onclick="go('cert',{id:'${c.id}'})">🏆 Cert</button>`).join('')}
        </div>
      </div>
    </div>
    <h3 style="color:var(--pu-d);margin-bottom:16px;font-weight:800">Training Progress</h3>
    ${blocks.join('')||'<div style="text-align:center;padding:40px;color:var(--muted)">No training content</div>'}
  </div>`
}

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════
function cmo(e){if(e&&e.target!==e.currentTarget)return;const m=document.getElementById('md');if(m)m.innerHTML=''}
function toast(msg,type=''){
  const c=document.getElementById('toast');const el=document.createElement('div');
  el.className='ti '+(type==='ok'?'ok':type==='er'?'er':'');el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),3500);
}

async function syncThenRefresh(){
  toast('Syncing...','');
  await syncAll();
  await render();
  toast('Updated! ✅','ok');
}
async function syncAll(){
  if(!SB)return;
  try{
    const[u,s,l,q,c,a,ce]=await Promise.all([
      SB.from('lms_users').select('*'),
      SB.from('lms_sections').select('*').order('order_num'),
      SB.from('lms_lectures').select('*').order('order_num'),
      SB.from('lms_questions').select('*'),
      SB.from('lms_completions').select('*'),
      SB.from('lms_attempts').select('*'),
      SB.from('lms_certs').select('*')
    ]);
    if(!u.error&&u.data)ls2('users',u.data);
    if(!s.error&&s.data)ls2('sections',s.data);
    if(!l.error&&l.data)ls2('lectures',applySeqOv(l.data));
    if(!q.error&&q.data)ls2('questions',q.data);
    if(!c.error&&c.data)ls2('completions',c.data);
    if(!a.error&&a.data)ls2('attempts',a.data);
    if(!ce.error&&ce.data)ls2('certs',ce.data);
    console.log('Synced from Supabase ✅');
  }catch(e){console.warn('Sync failed:',e);}
}

window.addEventListener('load',async()=>{
  await syncAll();
  U?go('home'):go('login');
});
</script>
