<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meena Health — Learning Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  /* ─── Refined Cream + Navy + Purple Accent ─── */
  --bg:#FAF6EE;
  --bg-deep:#F2EDE2;
  --card:#FFFFFF;
  --cream:#FFFDF8;

  --ink:#1E1147;
  --text:#3A2D5C;
  --muted:#7A6F8E;
  --soft:#B0A8C0;

  --pu:#6B3FB5;
  --pu-d:#4A2785;
  --pu-dd:#311C5D;
  --pu-l:#9863F1;
  --pu-ll:#C4B5FD;
  --pu-soft:#EFE9FA;
  --pu-tint:#F8F4FC;
  --pu-mist:#FCFAFE;

  --sage:#8FA88E;
  --sage-l:#B5CCB5;
  --sage-soft:#E8EFE5;

  --mint:#5C9C7E;
  --mint-l:#A5C9B5;
  --mint-soft:#E0EDE3;
  --sky:#5B7DB3;
  --rose:#C9536A;

  --border:#EDE7DC;
  --border-d:#D9D0C0;

  --ok:#5C9C7E;
  --ok-l:#DDEDE0;
  --err:#C9536A;
  --err-l:#F5DDE2;
  --warn:#C99464;
  --warn-l:#F4E6D0;

  --gold:#B8985E;
  --gold-l:#D9BB7E;
  --gold-soft:#FAF3E2;

  --r:16px;
  --r-sm:12px;
  --r-lg:22px;
  --sh:0 2px 12px rgba(49,28,93,.05), 0 1px 2px rgba(49,28,93,.03);
  --sh-md:0 8px 28px rgba(49,28,93,.08), 0 2px 4px rgba(49,28,93,.04);
  --sh-lg:0 16px 40px rgba(49,28,93,.14), 0 4px 8px rgba(49,28,93,.06);
  --sh-glow:0 0 0 4px rgba(107,63,181,.1);

  --grad-pu:linear-gradient(135deg, #311C5D 0%, #4A2785 50%, #6B3FB5 100%);
  --grad-pu-bright:linear-gradient(135deg, #4A2785 0%, #6B3FB5 50%, #9863F1 100%);
  --grad-soft:linear-gradient(135deg, #FAF6EE 0%, #F2EDE2 100%);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Readex Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:-.005em;
}
/* Subtle medical pattern in body bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(107,63,181,.04) 0, transparent 40%),
    radial-gradient(circle at 85% 85%, rgba(143,168,142,.05) 0, transparent 40%);
}
#app{min-height:100vh;position:relative;z-index:1}

/* ── Display font for headlines ── */
.display, h1, h2{font-family:'Fraunces', 'Readex Pro', serif; letter-spacing:-.02em}
.sans-display{font-family:'Readex Pro', sans-serif; letter-spacing:-.015em; font-weight:600}

/* ═══════════════ TOP BAR ═══════════════ */
.bar{
  background:linear-gradient(115deg, #1E1147 0%, #2A1858 50%, #311C5D 100%);
  padding:0 28px;height:74px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 16px rgba(30,17,71,.18);
  position:sticky;top:0;z-index:100;
  position:relative;overflow:hidden;
}
.bar::before{
  content:'';position:absolute;top:-60%;right:-5%;width:340px;height:340px;
  background:radial-gradient(circle, rgba(152,99,241,.14) 0%, transparent 70%);
  pointer-events:none;
}
.bar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, #9863F1 30%, #6B3FB5 70%, transparent);
}
.bar-logo{display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;z-index:2;transition:transform .2s}
.bar-logo:hover{transform:translateY(-1px)}
.bar-logo .ico{
  width:46px;height:46px;
  background:rgba(255,255,255,.95);
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.18), 0 0 0 1px rgba(255,255,255,.4);
  overflow:hidden;
}
.bar-logo .ico img{width:100%;height:100%;object-fit:contain;padding:6px}
.bar-logo-text{display:flex;flex-direction:column;line-height:1.1}
.bar-logo-text .name{color:#fff;font-size:16px;font-weight:800;font-family:'Readex Pro',sans-serif;letter-spacing:-.01em}
.bar-logo-text .sub{color:rgba(255,255,255,.65);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.bar-r{display:flex;align-items:center;gap:10px;position:relative;z-index:2}
.bar-nav{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.08);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.1)}
.bar-nav button{
  background:transparent;color:rgba(255,255,255,.85);border:none;
  padding:7px 14px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;transition:.2s
}
.bar-nav button:hover{background:rgba(255,255,255,.18);color:#fff}
.bar-user{
  color:rgba(255,255,255,.92);font-size:13px;font-weight:600;
  padding:7px 14px;background:rgba(255,255,255,.1);border-radius:9px;
  border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:7px
}
.bar-user .badge{opacity:.65;font-size:11px;font-family:'Readex Pro';font-weight:700}
.btn-out{
  background:rgba(255,255,255,.14);color:#fff;
  border:1px solid rgba(255,255,255,.25);
  padding:8px 16px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:700;font-family:inherit;transition:.2s
}
.btn-out:hover{background:rgba(255,255,255,.25);transform:translateY(-1px)}

/* ── Back bar ── */
.back-bar{
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:12px 28px
}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:10px;
  background:#fff;color:var(--pu-d);
  border:1.5px solid var(--border-d);
  cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;
  transition:.2s;box-shadow:0 1px 2px rgba(124,92,230,.04)
}
.back-btn:hover{background:var(--pu);color:#fff;border-color:var(--pu);transform:translateX(-2px)}

/* ── Layout ── */
.pg{max-width:1180px;margin:0 auto;padding:32px 28px}
.pg-sm{max-width:840px;margin:0 auto;padding:32px 28px}

/* ── Cards ── */
.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--sh);padding:26px;
  border:1px solid var(--border);
  transition:.25s
}

/* ── Progress bars ── */
.pbar{height:7px;background:var(--pu-soft);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg, var(--pu), var(--pu-l));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Lecture row ── */
.lec-item{
  display:flex;align-items:center;gap:16px;
  padding:18px 22px;background:var(--card);border-radius:14px;
  border:1.5px solid var(--border);margin-bottom:12px;
  cursor:pointer;transition:.25s;position:relative;overflow:hidden
}
.lec-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:.25s
}
.lec-item:hover{
  border-color:var(--pu-ll);
  background:linear-gradient(90deg, var(--pu-soft), var(--card) 80%);
  transform:translateX(4px);
  box-shadow:var(--sh)
}
.lec-item:hover::before{background:var(--pu)}
.lec-item.done{border-left:none;background:linear-gradient(90deg, var(--ok-l), var(--card) 30%)}
.lec-item.done::before{background:var(--ok)}
.lec-ico{
  width:48px;height:48px;border-radius:13px;
  background:linear-gradient(135deg, #4A2785, #6B3FB5);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:19px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(74,39,133,.22)
}
.lec-info{flex:1;min-width:0}
.lec-info h4{font-size:15px;font-weight:700;color:var(--ink);font-family:'Readex Pro';line-height:1.35}
.lec-info span{font-size:12px;color:var(--muted);margin-top:3px;display:block;font-weight:500}

/* ── Badges ── */
.bdg{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.2px;display:inline-flex;align-items:center;gap:4px}
.bdg-ok{background:var(--ok-l);color:#065F46;border:1px solid #6EE7B7}
.bdg-q{background:var(--warn-l);color:#92400E;border:1px solid #FCD34D}
.bdg-w{background:var(--pu-soft);color:var(--pu-d);border:1px solid var(--pu-ll)}
.chip{display:inline-flex;align-items:center;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:700}
.cp{background:var(--pu-soft);color:var(--pu-d)}
.cd{background:var(--mint-soft);color:#0F766E}

/* ── Video / file viewer ── */
.vid-wrap{
  position:relative;padding-bottom:56.25%;height:0;
  border-radius:var(--r);overflow:hidden;
  background:linear-gradient(135deg,#1a0f2e,#0f0720);
  margin-bottom:20px;box-shadow:var(--sh-md);
  border:1px solid var(--border)
}
.vid-wrap iframe,.vid-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;border:none}
.skip-warn{background:var(--err);color:#fff;padding:13px 20px;border-radius:11px;font-weight:700;text-align:center;display:none;margin-bottom:14px}
.file-viewer{
  background:linear-gradient(160deg, #1E1147 0%, #2D1A5C 70%, #311C5D 100%);
  border-radius:var(--r);margin-bottom:20px;
  box-shadow:var(--sh-md);overflow:hidden;
  border:1px solid rgba(196,181,253,.08)
}
.fv-header{
  background:rgba(255,255,255,.06);
  padding:15px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px)
}
.fv-header h4{color:#fff;font-size:15px;font-weight:700;font-family:'Readex Pro'}
.pdf-frame{width:100%;height:640px;border:none;display:block;background:#fff}
.no-file{padding:64px 30px;text-align:center}
.no-file .nfi{font-size:60px;margin-bottom:16px;opacity:.7}
.no-file h3{color:rgba(255,255,255,.8);font-size:18px;font-weight:700;margin-bottom:8px;font-family:'Readex Pro'}
.no-file p{color:rgba(255,255,255,.45);font-size:13px;line-height:1.7}
.fv-footer{
  background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.06);
  padding:16px 22px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px
}
.upload-zone{
  border:2px dashed var(--pu-ll);border-radius:14px;padding:38px 24px;
  text-align:center;cursor:pointer;transition:.25s;
  background:linear-gradient(135deg, var(--pu-tint), var(--pu-mist))
}
.upload-zone:hover{border-color:var(--pu);background:var(--pu-soft);transform:scale(1.005)}
.upload-zone.has-file{border-color:var(--ok);background:var(--ok-l)}
.upload-zone input{display:none}

/* ── Quiz ── */
.q-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.timer{
  background:linear-gradient(135deg, #311C5D, #6B3FB5);color:#fff;
  padding:10px 22px;border-radius:11px;
  font-size:20px;font-weight:800;
  font-family:'Readex Pro',ui-monospace,monospace;letter-spacing:1px;
  box-shadow:0 4px 14px rgba(49,28,93,.25)
}
.timer.red{background:linear-gradient(135deg,#A03044,#C9536A);box-shadow:0 4px 14px rgba(201,83,106,.35)}
.q-card{
  background:var(--card);border-radius:var(--r-lg);
  padding:34px;box-shadow:var(--sh-md);
  margin-bottom:20px;border:1px solid var(--border);
  position:relative;overflow:hidden
}
.q-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--grad-pu)
}
.q-num{font-size:11px;font-weight:800;color:var(--pu-l);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;font-family:'Readex Pro'}
.q-txt{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:24px;line-height:1.55;font-family:'Readex Pro'}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{
  padding:15px 18px;border:2px solid var(--border);border-radius:12px;
  cursor:pointer;transition:.2s;font-size:15px;
  display:flex;align-items:center;gap:13px;font-weight:500;
  background:var(--card)
}
.opt:hover{border-color:var(--pu-l);background:var(--pu-mist);transform:translateX(2px)}
.opt.sel{
  border-color:var(--pu);
  background:linear-gradient(90deg,var(--pu-soft),var(--card));
  color:var(--pu-d);font-weight:700;
  box-shadow:var(--sh-glow)
}
.opt-l{
  width:32px;height:32px;border-radius:50%;
  background:var(--pu-soft);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;flex-shrink:0;color:var(--pu);
  font-family:'Readex Pro'
}
.opt.sel .opt-l{background:var(--pu);color:#fff}

/* ── Result circles ── */
.r-circle{
  width:130px;height:130px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;font-size:38px;font-weight:800;
  font-family:'Readex Pro';
  box-shadow:0 8px 32px rgba(0,0,0,.08)
}
.r-pass{background:var(--ok-l);color:#065F46;border:5px solid var(--ok)}
.r-fail{background:var(--err-l);color:#9F1239;border:5px solid var(--err)}

/* ── Certificate ── */
.cert-pg{background:#fff;max-width:840px;margin:0 auto}
.cert-out{padding:38px;background:#fff}
.cert-in{
  border:3px solid var(--pu);padding:54px;
  position:relative;text-align:center;
  background:radial-gradient(ellipse at top, var(--pu-mist), #fff 60%)
}
.cert-in::before{content:'';position:absolute;inset:9px;border:1px solid var(--pu-ll);pointer-events:none}
.cert-in::after{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--grad-pu);pointer-events:none}
.c-org{font-size:32px;font-weight:800;color:var(--pu-d);letter-spacing:2px;font-family:'Fraunces'}
.c-sub0{font-size:11px;color:var(--muted);letter-spacing:3.5px;text-transform:uppercase;margin-top:4px;font-weight:600}
.c-div{height:3px;background:linear-gradient(90deg,transparent,var(--pu),var(--pu-ll),transparent);margin:22px auto;max-width:300px}
.c-ttl{font-size:42px;font-weight:500;color:var(--pu);letter-spacing:4px;text-transform:uppercase;font-family:'Fraunces'}
.c-sub2{font-size:13px;color:var(--muted);letter-spacing:1.5px;margin-bottom:28px;font-weight:600}
.c-name{font-size:38px;font-weight:700;color:var(--pu-d);border-bottom:2px solid var(--pu-ll);display:inline-block;padding-bottom:7px;font-family:'Fraunces'}
.c-bid{font-size:13px;color:var(--muted);margin:9px 0 22px;font-weight:600}
.c-txt{font-size:16px;color:var(--text);margin-bottom:7px;line-height:1.6}
.c-sec{font-size:26px;font-weight:700;color:var(--pu);margin-bottom:24px;font-family:'Fraunces'}
.c-meta{display:flex;justify-content:space-around;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
.c-mi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.c-mi .val{font-size:15px;font-weight:700;color:var(--pu-d);margin-top:5px;font-family:'Readex Pro'}
.c-ref{margin-top:20px;font-size:12px;color:var(--muted);font-family:'Readex Pro'}
.c-stamp{
  position:absolute;bottom:46px;right:46px;width:84px;height:84px;
  border-radius:50%;border:3px solid var(--pu);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:var(--pu);
  text-align:center;line-height:1.4;transform:rotate(-15deg);
  background:rgba(124,92,230,.05);
  font-family:'Readex Pro'
}
.c-wm{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-size:88px;font-weight:800;color:rgba(124,92,230,.04);
  white-space:nowrap;pointer-events:none;letter-spacing:5px;
  font-family:'Fraunces'
}

/* ── Stat tiles ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat{
  background:var(--card);border-radius:var(--r);
  padding:24px;border:1px solid var(--border);
  box-shadow:var(--sh);overflow:hidden;position:relative;
  transition:.25s
}
.stat:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.stat-clickable{cursor:pointer}
.stat-clickable:hover{border-color:var(--pu-ll);transform:translateY(-4px)}
.stat-clickable:hover .stat-arrow{opacity:1;transform:translateX(0)}
.stat-clickable:hover .sv{color:var(--pu)}
.stat-arrow{
  position:absolute;top:18px;right:18px;
  width:30px;height:30px;border-radius:50%;
  background:var(--pu-soft);color:var(--pu-d);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;font-family:'Readex Pro';
  opacity:0;transform:translateX(-6px);
  transition:.25s;z-index:2
}
.stat::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:var(--grad-pu)
}
.stat::after{
  content:'';position:absolute;bottom:-30px;right:-30px;width:110px;height:110px;
  background:radial-gradient(circle, var(--pu-tint), transparent 70%);
  border-radius:50%;
}
.stat .sv{font-size:36px;font-weight:800;color:var(--ink);position:relative;z-index:1;font-family:'Readex Pro';line-height:1.1}
.stat .sl{font-size:13px;color:var(--muted);margin-top:4px;font-weight:600;position:relative;z-index:1}
.stat .si{font-size:22px;margin-bottom:10px;position:relative;z-index:1;display:inline-block;width:42px;height:42px;background:var(--sage-soft);border-radius:11px;text-align:center;line-height:42px;border:1px solid var(--border)}

/* ── Tables ── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);-webkit-overflow-scrolling:touch;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:linear-gradient(135deg, #311C5D, #4A2785);color:#fff;padding:14px 18px;text-align:left;font-size:12px;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.6px;font-family:'Readex Pro'}
td{padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--pu-mist)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;border:none;font-family:inherit;white-space:nowrap}
.bp{background:linear-gradient(135deg, #4A2785, #6B3FB5);color:#fff;box-shadow:0 4px 14px rgba(74,39,133,.22)}
.bp:hover{box-shadow:0 6px 20px rgba(74,39,133,.32);transform:translateY(-2px);background:linear-gradient(135deg, #311C5D, #6B3FB5)}
.bn{background:var(--pu-dd);color:#fff}
.bn:hover{background:var(--pu-d)}
.bo{background:#fff;color:var(--pu-d);border:1.5px solid var(--pu-ll);box-shadow:0 1px 2px rgba(124,92,230,.06)}
.bo:hover{background:var(--pu);color:#fff;border-color:var(--pu)}
.bd{background:var(--err);color:#fff;box-shadow:0 4px 14px rgba(244,63,94,.25)}
.bd:hover{background:#E11D48}
.bg2{background:transparent;color:var(--muted);border:1.5px solid var(--border-d)}
.bg2:hover{background:var(--pu-soft);color:var(--pu-d);border-color:var(--pu-ll)}
.bmint{background:linear-gradient(135deg, #6FA288, #5C9C7E);color:#fff;box-shadow:0 4px 14px rgba(92,156,126,.22)}
.bmint:hover{box-shadow:0 6px 20px rgba(92,156,126,.32);transform:translateY(-2px)}
.blg{padding:14px 30px;font-size:15px;border-radius:13px}
.bsm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── Forms ── */
.fg{margin-bottom:18px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
label{display:block;font-size:12.5px;font-weight:700;color:var(--pu-d);margin-bottom:7px;font-family:'Readex Pro';letter-spacing:.2px}
input,select,textarea{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--border-d);border-radius:11px;
  font-size:14px;color:var(--ink);outline:none;
  transition:.2s;font-family:inherit;background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,.02)
}
input:focus,select:focus,textarea:focus{
  border-color:var(--pu);
  box-shadow:0 0 0 4px rgba(124,92,230,.1)
}
textarea{resize:vertical;min-height:84px;font-family:inherit}

/* ── Modal ── */
.mo{position:fixed;inset:0;background:rgba(30,27,58,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal{
  background:#fff;border-radius:20px;padding:32px;
  max-width:600px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(30,27,58,.3);
  border:1px solid var(--border);
  animation:modalIn .25s cubic-bezier(.4,0,.2,1)
}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.mh h3{font-size:19px;font-weight:800;color:var(--pu-d);font-family:'Readex Pro'}
.mc{
  width:36px;height:36px;border-radius:50%;
  background:var(--pu-soft);border:none;cursor:pointer;
  font-size:16px;color:var(--pu-d);font-weight:700;
  transition:.2s
}
.mc:hover{background:var(--pu);color:#fff;transform:rotate(90deg)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.ti{background:var(--pu-d);color:#fff;padding:14px 24px;border-radius:13px;font-size:14px;animation:si .35s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 24px rgba(79,56,184,.3);font-weight:600;border:1px solid rgba(255,255,255,.1)}
.ti.ok{background:linear-gradient(135deg,#10B981,#059669);box-shadow:0 8px 24px rgba(16,185,129,.3)}
.ti.er{background:linear-gradient(135deg,#F43F5E,#E11D48);box-shadow:0 8px 24px rgba(244,63,94,.3)}
@keyframes si{from{transform:translateX(120%) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}

/* ═══════════════ LOGIN PAGE ═══════════════ */
.lw{min-height:100vh;display:flex}

/* ─── Animated Login Left Panel ─── */
.ll{
  flex:1;
  background:
    radial-gradient(ellipse at 28% 22%, rgba(152,99,241,.22) 0, transparent 55%),
    radial-gradient(ellipse at 75% 78%, rgba(143,168,142,.12) 0, transparent 55%),
    linear-gradient(160deg, #1E1147 0%, #2D1A5C 50%, #311C5D 100%);
  background-size:200% 200%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 40px;color:#fff;position:relative;overflow:hidden;
  animation: bgDrift 18s ease-in-out infinite
}
@keyframes bgDrift{
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.ll::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.025) 1px, transparent 1.5px);
  background-size:32px 32px;
  pointer-events:none;opacity:.7;
  animation: dotShift 30s linear infinite
}
@keyframes dotShift{
  from { background-position: 0 0; }
  to { background-position: 32px 32px; }
}

/* Floating particles */
.ll-particles{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.ll-particles span{
  position:absolute;display:block;
  width:5px;height:5px;border-radius:50%;
  background:rgba(196,181,253,.5);
  box-shadow:0 0 8px rgba(152,99,241,.4);
  animation: floatUp linear infinite;
  bottom:-20px
}
.ll-particles span:nth-child(1){left:8%; width:3px;height:3px; animation-duration:14s; animation-delay:0s}
.ll-particles span:nth-child(2){left:18%; width:5px;height:5px; animation-duration:18s; animation-delay:3s}
.ll-particles span:nth-child(3){left:28%; width:4px;height:4px; animation-duration:12s; animation-delay:7s}
.ll-particles span:nth-child(4){left:42%; width:3px;height:3px; animation-duration:16s; animation-delay:1s}
.ll-particles span:nth-child(5){left:55%; width:6px;height:6px; animation-duration:20s; animation-delay:5s}
.ll-particles span:nth-child(6){left:68%; width:4px;height:4px; animation-duration:13s; animation-delay:9s}
.ll-particles span:nth-child(7){left:78%; width:3px;height:3px; animation-duration:17s; animation-delay:2s}
.ll-particles span:nth-child(8){left:88%; width:5px;height:5px; animation-duration:15s; animation-delay:6s}
.ll-particles span:nth-child(9){left:35%; width:3px;height:3px; animation-duration:19s; animation-delay:11s}
.ll-particles span:nth-child(10){left:62%; width:4px;height:4px; animation-duration:14s; animation-delay:4s}
@keyframes floatUp{
  0% { transform: translateY(0) translateX(0) scale(.6); opacity:0 }
  10% { opacity:.8 }
  50% { transform: translateY(-50vh) translateX(20px) scale(1) }
  90% { opacity:.4 }
  100% { transform: translateY(-110vh) translateX(-15px) scale(.4); opacity:0 }
}

.ll-content{position:relative;z-index:2;text-align:center;max-width:420px}

/* ─── Animated logo with ripple, float & breath ─── */
.ll-logo-wrap{
  position:relative;width:160px;height:160px;margin:0 auto 24px;
  display:flex;align-items:center;justify-content:center;
  animation: logoEnter 1.2s .15s cubic-bezier(.16,1,.3,1) backwards
}
@keyframes logoEnter{
  from { opacity:0; transform: scale(.5) }
  to { opacity:1; transform: scale(1) }
}

/* Outer expanding ripple rings */
.ll-logo-wrap::before,.ll-logo-wrap::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(152,99,241,.4);
  pointer-events:none
}
.ll-logo-wrap::before{ animation: ripple 3.5s ease-out infinite }
.ll-logo-wrap::after{ animation: ripple 3.5s ease-out 1.75s infinite }
@keyframes ripple{
  0% { transform: scale(.85); opacity: .55 }
  70% { opacity: .15 }
  100% { transform: scale(1.55); opacity: 0 }
}

.ll-logo{
  width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.1), rgba(255,255,255,.02));
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(196,181,253,.3);
  padding:20px;position:relative;
  backdrop-filter:blur(10px);
  animation: logoFloat 5s ease-in-out infinite, logoGlow 3s ease-in-out infinite;
  z-index:2
}
@keyframes logoFloat{
  0%,100% { transform: translateY(0) }
  50% { transform: translateY(-7px) }
}
@keyframes logoGlow{
  0%,100% { box-shadow: 0 0 0 0 rgba(152,99,241,0), 0 8px 30px rgba(152,99,241,.15) }
  50% { box-shadow: 0 0 0 8px rgba(152,99,241,.08), 0 12px 40px rgba(152,99,241,.35) }
}
.ll-logo img{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(152,99,241,.45));
  animation: logoBreath 3.5s ease-in-out infinite
}
@keyframes logoBreath{
  0%,100% { 
    filter: drop-shadow(0 4px 14px rgba(152,99,241,.4)) brightness(1);
    transform: scale(1)
  }
  50% { 
    filter: drop-shadow(0 6px 24px rgba(152,99,241,.65)) brightness(1.08);
    transform: scale(1.04)
  }
}

/* Meena text — pure white, smooth entrance only (no flicker) */
.ll-meena-text{
  display:block;margin:0 auto 12px;width:auto;height:auto;max-width:240px;max-height:120px;
  filter:drop-shadow(0 2px 14px rgba(152,99,241,.4));
  -webkit-filter:drop-shadow(0 2px 14px rgba(152,99,241,.4));
  opacity:.96;
  animation: meenaFadeIn 1s .6s ease-out backwards
}
@keyframes meenaFadeIn{
  from { opacity:0; transform: translateY(12px) }
  to { opacity:.96; transform: translateY(0) }
}

.ll-divider{
  display:block;width:60px;height:1.5px;
  background:linear-gradient(90deg,transparent,#9863F1,transparent);
  margin:14px auto 18px;
  animation: dividerExpand 1s .9s cubic-bezier(.4,0,.2,1) backwards, dividerPulse 2.5s 1.9s ease-in-out infinite
}
@keyframes dividerExpand{
  from { width:0; opacity:0 }
  to { width:60px; opacity:1 }
}
@keyframes dividerPulse{
  0%,100% { opacity:.7; box-shadow:0 0 0 rgba(152,99,241,0) }
  50% { opacity:1; box-shadow:0 0 12px rgba(152,99,241,.5) }
}

.ll-sub{
  font-size:11.5px;letter-spacing:5px;text-transform:uppercase;
  color:rgba(196,181,253,.7);margin-bottom:16px;font-weight:700;font-family:'Readex Pro';
  animation: fadeInUp 1s 1.1s backwards
}
.ll p{
  font-size:14.5px;opacity:.78;line-height:1.7;font-weight:500;
  color:rgba(255,255,255,.88);margin-top:6px;
  animation: fadeInUp 1s 1.3s backwards
}
.ll-footer{
  position:absolute;bottom:32px;left:0;right:0;text-align:center;
  font-size:11px;color:rgba(196,181,253,.45);letter-spacing:3px;font-weight:600;font-family:'Readex Pro';
  animation: fadeInUp 1s 1.5s backwards
}
.ll-deco{display:none}

@keyframes fadeInUp{
  from { opacity:0; transform: translateY(15px) }
  to { opacity:1; transform: translateY(0) }
}

/* Right panel slides in */
.lr{animation: slideInRight 1s cubic-bezier(.16,1,.3,1) backwards}
@keyframes slideInRight{
  from { opacity:0; transform: translateX(40px) }
  to { opacity:1; transform: translateX(0) }
}
.lb-greet{animation: fadeInUp .8s .3s backwards}
.lb h2{animation: fadeInUp .8s .4s backwards}
.lb > p{animation: fadeInUp .8s .5s backwards}
.rt{animation: fadeInUp .8s .65s backwards}
.lb .fg:nth-of-type(1){animation: fadeInUp .8s .8s backwards}
.lb .fg:nth-of-type(2){animation: fadeInUp .8s .95s backwards}
.lb .btn.bp.blg{animation: fadeInUp .8s 1.1s backwards}

.lr{width:480px;display:flex;align-items:center;justify-content:center;padding:40px;background:var(--cream);position:relative}
.lr::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;background:linear-gradient(180deg,transparent,var(--border-d),transparent)}
.lb{width:100%;max-width:380px}
.lb-greet{font-size:11.5px;color:var(--pu);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;font-family:'Readex Pro'}
.lb h2{font-size:34px;font-weight:600;color:var(--ink);margin-bottom:8px;font-family:'Fraunces';letter-spacing:-.02em}
.lb p{font-size:14px;color:var(--muted);margin-bottom:30px;line-height:1.55}
.rt{display:flex;background:var(--bg);border-radius:13px;padding:5px;margin-bottom:26px;border:1px solid var(--border)}
.rb{flex:1;padding:11px;text-align:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:.25s;font-family:'Readex Pro'}
.rb.on{background:#fff;color:var(--pu-dd);box-shadow:0 2px 10px rgba(49,28,93,.08)}

/* ── Breadcrumb ── */
.bc{display:flex;align-items:center;gap:10px;margin-bottom:24px;font-size:14px;font-weight:500;flex-wrap:wrap}
.bc a{color:var(--pu);cursor:pointer;font-weight:600;transition:.2s}
.bc a:hover{color:var(--pu-d)}
.bc span:not(.bdg){color:var(--muted);font-weight:600}

/* ── Page header ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:14px}
.ph h2{font-size:30px;font-weight:600;color:var(--ink);font-family:'Fraunces';letter-spacing:-.02em;line-height:1.15}
.ph p{font-size:14px;color:var(--muted);margin-top:6px;line-height:1.5}

/* ── Alerts ── */
.al{padding:15px 20px;border-radius:13px;font-size:14px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;font-weight:500;border:1px solid}
.al-i{background:linear-gradient(90deg, var(--pu-soft), var(--pu-mist));border-color:var(--pu-ll);color:var(--pu-d)}
.al-ok{background:linear-gradient(90deg, var(--ok-l), #ECFDF5);border-color:#6EE7B7;color:#065F46}
.al-w{background:linear-gradient(90deg, var(--warn-l), #FFFBEB);border-color:#FCD34D;color:#854D0E}
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}

/* ═══════════════ HOME HERO ═══════════════ */
.hero-home{
  background:linear-gradient(135deg, #FFFDF8 0%, #FAF6EE 100%);
  border-radius:22px;padding:36px 38px;color:var(--ink);
  position:relative;overflow:hidden;margin-bottom:28px;
  box-shadow:0 4px 24px rgba(49,28,93,.06), 0 1px 0 rgba(255,255,255,.5) inset;
  border:1px solid var(--border)
}
.hero-home::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg, #311C5D, #6B3FB5, #9863F1, #6B3FB5, #311C5D)
}
.hero-home::after{
  content:'';position:absolute;bottom:-80px;right:-80px;width:280px;height:280px;
  background:radial-gradient(circle, rgba(152,99,241,.08), transparent 70%);
  border-radius:50%;pointer-events:none
}
.hero-deco-m{position:absolute;top:14px;right:22px;width:88px;height:88px;opacity:.06;pointer-events:none}
.hero-deco-m img{width:100%;height:100%;object-fit:contain}
.hero-greet{font-size:11.5px;color:var(--pu);font-weight:700;margin-bottom:8px;position:relative;letter-spacing:3px;text-transform:uppercase;font-family:'Readex Pro'}
.hero-name{font-size:36px;font-weight:600;margin-bottom:22px;position:relative;font-family:'Fraunces';letter-spacing:-.02em;line-height:1.1;color:var(--ink)}
.hero-kpis{display:flex;gap:14px;flex-wrap:wrap;position:relative}
.hero-kpi{
  background:#fff;
  padding:16px 22px;border-radius:14px;
  border:1px solid var(--border);
  transition:.25s;
  position:relative;overflow:hidden
}
.hero-kpi::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg, #9863F1, #6B3FB5)
}
.hero-kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--pu-ll)}
.hero-kpi .v{font-size:28px;font-weight:800;font-family:'Readex Pro';line-height:1.1;color:var(--pu-dd)}
.hero-kpi .l{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-top:3px}

/* ── Filter chips ── */
.filter-row{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.fchip{
  padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--border-d);background:#fff;
  color:var(--muted);transition:.25s;font-family:'Readex Pro'
}
.fchip:hover{border-color:var(--pu-l);color:var(--pu-d);transform:translateY(-1px)}
.fchip.on{background:var(--grad-pu);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(79,56,184,.28)}
.fchip .n{opacity:.7;margin-left:5px;font-size:11px}
.fchip.on .n{opacity:1}

/* ═══════════════ SECTION CARDS (medical) ═══════════════ */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:22px}
.sec-c{
  background:var(--card);border-radius:18px;
  border:1.5px solid var(--border);overflow:hidden;cursor:pointer;
  transition:.3s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--sh);position:relative;
  display:flex;flex-direction:column
}
.sec-c:hover{transform:translateY(-6px);box-shadow:var(--sh-lg);border-color:var(--pu-ll)}
.sec-c-head{
  padding:24px 24px 20px;position:relative;overflow:hidden;color:#fff;
  min-height:120px
}
.sec-c-head::before{
  content:'';position:absolute;top:0;right:0;width:140px;height:140px;
  background-image:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.12) 1.5px, transparent 2.5px);
  background-size:18px 18px;
  opacity:.6
}
.sec-c-head::after{
  content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;
  background:radial-gradient(circle, rgba(255,255,255,.15), transparent 70%);
  border-radius:50%
}
.sec-c-icon{
  width:50px;height:50px;border-radius:14px;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:12px;position:relative;
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 4px 12px rgba(0,0,0,.1)
}
.sec-c-title{font-size:19px;font-weight:700;line-height:1.3;position:relative;font-family:'Readex Pro'}
.sec-c-chip{
  position:absolute;top:18px;right:18px;
  background:rgba(0,0,0,.25);backdrop-filter:blur(10px);
  padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;z-index:2;
  border:1px solid rgba(255,255,255,.15);font-family:'Readex Pro'
}
.sec-c-body{padding:18px 24px 22px;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:14px}
.sec-c-desc{font-size:13.5px;color:var(--muted);line-height:1.55}
.sec-c-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:700;font-family:'Readex Pro'}
.sec-c-progress{margin-top:4px}
.sec-c-cert{
  margin-top:10px;padding:11px 14px;
  background:linear-gradient(90deg, var(--gold-soft), #FEF7E0);
  border:1px solid #FDE68A;border-radius:11px;
  font-size:12px;color:#854D0E;font-weight:700;
  display:flex;align-items:center;gap:9px;cursor:pointer;
  transition:.2s
}
.sec-c-cert:hover{background:linear-gradient(90deg, #FEF3C7, #FFFBEB);transform:translateX(2px)}

/* ── Setup screen ── */
.setup-wrap{
  min-height:100vh;
  background:

.db-badge{

.db-live{background:var(--ok-l);color:#065F46;border:1px solid #6EE7B7}

  .back-bar{padding:10px 14px}
  .q-card{padding:22px}
  .q-txt{font-size:16px}

  {k:['phlebo','blood'], icon:'🧪', grad:'linear-gradient(135deg,#7F1D1D 0%,#B91C1C 50%,#E11D48 100%)'},
  {k:['consult'], icon:'💬', grad:'linear-gradient(135deg,#3B0764 0%,#5B21B6 50%,#7C3AED 100%)'},
  {k:['admin','management'], icon:'📊', grad:'linear-gradient(135deg,#1F2937 0%,#374151 50%,#4B5563 100%)'},
];
function themeFor(title){
  const t=(title||'').toLowerCase();
  for(const p of SEC_THEMES){ if(p.k.some(k=>t.includes(k))) return p; }
  const palettes=[
    {icon:'📚',grad:'linear-gradient(135deg,#3A2A8E 0%,#5B21B6 50%,#7C3AED 100%)'},
    {icon:'🎓',grad:'linear-gradient(135deg,#0F766E 0%,#0D9488 50%,#14B8A6 100%)'},
    {icon:'✨',grad:'linear-gradient(135deg,#581C87 0%,#9333EA 50%,#C026D3 100%)'},
    {icon:'🌟',grad:'linear-gradient(135deg,#9F1239 0%,#BE185D 50%,#EC4899 100%)'},
  ];
  let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))>>>0;
  return palettes[h%palettes.length];
}

function ls(k){try{return JSON.parse(localStorage.getItem('lms_'+k)||'[]')}catch{return[]}}
function ls2(k,v){localStorage.setItem('lms_'+k,JSON.stringify(v))}
function n(){return new Date().toISOString()}
function uid(){return 'id'+Date.now()+Math.floor(Math.random()*9999)}
function saveFile(lid,d){try{localStorage.setItem('lms_f_'+lid,JSON.stringify(d));return true}catch{return false}}
function getFile(lid){try{return JSON.parse(localStorage.getItem('lms_f_'+lid)||'null')}catch{return null}}
function delFile(lid){localStorage.removeItem('lms_f_'+lid)}

function getSeqOv(){try{return JSON.parse(localStorage.getItem('lms_seq_ov')||'{}')}catch{return{}}}
function setSeqOv(lid,data){
  const o=getSeqOv();
  const step=data.sequence_step||0;
  const prereq=!!data.is_prerequisite;
  if(step>0||prereq){o[lid]={is_prerequisite:prereq,sequence_step:step};}
  else{delete o[lid];}
  localStorage.setItem('lms_seq_ov',JSON.stringify(o));
}
function delSeqOv(lid){const o=getSeqOv();delete o[lid];localStorage.setItem('lms_seq_ov',JSON.stringify(o));}
function applySeqOv(x){
  if(!x)return x;
  const o=getSeqOv();
  if(Array.isArray(x)){
    return x.map(l=>{
      const ov=o[l.id];
      if(!ov)return l;
      return{...l,is_prerequisite:ov.is_prerequisite,sequence_step:ov.sequence_step};
    });
  }
  if(x.id){
    const ov=o[x.id];
    if(!ov)return x;
    return{...x,is_prerequisite:ov.is_prerequisite,sequence_step:ov.sequence_step};
  }
  return x;
}

function getSlidesOv(){try{return JSON.parse(localStorage.getItem('lms_slides_ov')||'{}')}catch{return{}}}
function setSlidesData(lid,slides){
  const o=getSlidesOv();
  if(slides&&slides.length)o[lid]=slides;
  else delete o[lid];
  localStorage.setItem('lms_slides_ov',JSON.stringify(o));
  ls2('lectures',ls('lectures').map(l=>l.id===lid?{...l,slides_data:JSON.stringify(slides||[])}:l));
}
function getSlidesData(lid){
  const o=getSlidesOv();
  if(o[lid])return o[lid];
  const lec=ls('lectures').find(l=>l.id===lid);
  if(lec&&lec.slides_data){
    try{return JSON.parse(lec.slides_data)||[];}catch{return[];}
  }
  return [];
}
function delSlidesData(lid){
  const o=getSlidesOv();delete o[lid];
  localStorage.setItem('lms_slides_ov',JSON.stringify(o));
}

function getSlideProg(lid,uid){

async function ensureDefaultSections(){
  if(localStorage.getItem('lms_default_seeded_v2'))return;
  try{
    const existing=await db.sections();
    const defaults=[
      {title:'Dialysis Team',description:'Training materials and continuing education for the dialysis nursing team',placeholder_icon:'🩸'}
    ];
    let added=false;
    for(const def of defaults){
      const exists=existing.find(s=>s.title.toLowerCase().includes(def.title.toLowerCase().split(' ')[0]));
      if(!exists){
        await db.addSection({title:def.title,description:def.description,order_num:(existing.length||0)+1,created_at:n()});
        added=true;
      }
    }
    localStorage.setItem('lms_default_seeded_v2','1');
    if(added)console.log('Default sections seeded ✅');
  }catch(e){console.warn('Default seed failed:',e);}
}

async function pageSection(sid){
  const secs=await db.sections(),sec=secs.find(s=>s.id===sid);if(!sec){go('home');return}
  const lecs=await db.lectures(sid),comps=await db.completions(U.id),certs=await db.certs(U.id);
  const hasCert=certs.find(c=>c.section_id===sid);
  const quizResults=await Promise.all(lecs.map(async l=>({
    watched:!!comps.find(c=>c.lecture_id===l.id),
    passed:l.has_quiz?await db.hasPassed(U.id,l.id):true
  })));
  const allDone=lecs.length>0&&quizResults.every(r=>r.watched&&r.passed);

  const stepOf=l=>l.sequence_step||(l.is_prerequisite?1:0);
  const sequentialLecs=lecs.filter(l=>stepOf(l)>0);
  const stepsGrouped={};
  sequentialLecs.forEach(l=>{const s=stepOf(l);(stepsGrouped[s]=stepsGrouped[s]||[]).push(l)});
  const sortedSteps=Object.keys(stepsGrouped).map(Number).sort((a,b)=>a-b);

  const isDone=async l=>{
    const w=!!comps.find(c=>c.lecture_id===l.id);
    const p=l.has_quiz?await db.hasPassed(U.id,l.id):true;
    return w&&p;
  };
  const stepDone={};
  for(const step of sortedSteps){
    const results=await Promise.all(stepsGrouped[step].map(isDone));
    stepDone[step]=results.every(Boolean);
  }
  const allSeqDone=sortedSteps.every(s=>stepDone[s]);

  const lockOf=l=>{
    const step=stepOf(l);
    if(step===0){
      return sortedSteps.length>0&&!allSeqDone;
    }
    const prevSteps=sortedSteps.filter(s=>s<step);
    return prevSteps.some(s=>!stepDone[s]);
  };

  const pendingSteps=sortedSteps.filter(s=>!stepDone[s]);
  const nextPendingStep=pendingSteps[0];
  const nextPendingNames=nextPendingStep?stepsGrouped[nextPendingStep].map(l=>l.title):[];

  const items=await Promise.all(lecs.map(async lec=>{
    const watched=comps.find(c=>c.lecture_id===lec.id);
    const quizPassed=lec.has_quiz?await db.hasPassed(U.id,lec.id):true;
    const done=watched&&quizPassed;
    const typeIcon=lec.type==='youtube'?'▶':lec.type==='video'?'🎬':lec.type==='interactive'?'🎓':'📄';
    const typeLabel=lec.type==='youtube'?'Video lecture':lec.type==='video'?'Video file':lec.type==='interactive'?'Interactive slides':'Presentation / PDF';
    const step=stepOf(lec);
    const isLocked=lockOf(lec);
    let badge='';
    if(isLocked){
      badge=`<span class="bdg" style="background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB">🔒 Locked</span>`;
    } else if(lec.has_quiz){
      if(done) badge=`<span class="bdg bdg-ok">✓ Done</span>`;
      else if(watched) badge=`<span class="bdg" style="background:var(--err-l);color:#9F1239;border:1px solid #FCA5A5">↻ Retake Quiz</span>`;
      else badge=`<span class="bdg bdg-q">📝 Quiz</span>`;
    } else {
      badge=done?`<span class="bdg bdg-ok">✓ Done</span>`:`<span class="bdg bdg-w">${typeIcon} View</span>`;
    }
    const stepBadge=step>0?`<span class="bdg" style="background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;margin-right:6px">⭐ Step ${step}</span>`:'';
    const clickHandler=isLocked
      ?`onclick="toast('🔒 Complete Step '+${step>0?step-1:'all sequence steps'}+' first','')"`
      :`onclick="go('lecture',{id:'${lec.id}'},{page:'section',par:{id:'${sid}'},label:'Back to Section'})"`;
    const rowStyle=isLocked?'opacity:.55;background:#FAFAFA;':step>0?'border-left:4px solid #F59E0B;background:linear-gradient(90deg,#FFFBEB,var(--card) 40%)':'';
    return`<div class="lec-item ${done?'done':''}" style="${rowStyle}" ${clickHandler}>
      <div class="lec-ico" style="${isLocked?'filter:grayscale(1);opacity:.7':''}">${isLocked?'🔒':typeIcon}</div>
      <div class="lec-info"><h4>${lec.title}</h4><span>${typeLabel}${lec.has_quiz?' · Includes quiz':''}</span></div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end">${stepBadge}${badge}</div>
    </div>`;
  }));
  const itemsHtml=items.join('');

  const prereqBanner=sortedSteps.length>0&&!allSeqDone
    ?`<div class="al al-w"><span>⭐ <strong>Follow the sequence:</strong> Complete <strong>Step ${nextPendingStep}</strong> (${nextPendingNames.join(', ')}) to unlock the next step${pendingSteps.length>1?'s':''}.</span></div>`
    :'';
  // Auto-issue certificate if all lectures complete (handles legacy users + safety net)
  let activeCert=hasCert;
  if(allDone&&!activeCert){
    activeCert=await checkAndAutoIssueCert(sid);
  }
  const banner=activeCert
    ?`<div class="al al-ok"><span>🏆 <strong>Certificate earned!</strong> You completed all lectures in this section.</span><button class="btn bp bsm" onclick="go('cert',{id:'${activeCert.id}'},{page:'section',par:{id:'${sid}'},label:'Back'})">🏆 View Certificate</button></div>`
    :prereqBanner;
  const theme=themeFor(sec.title);
  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('home')">🏠 Home</a><span>›</span><span>${sec.title}</span></div>
    <div style="background:${theme.grad};border-radius:20px;padding:28px 32px;color:#fff;margin-bottom:26px;position:relative;overflow:hidden;box-shadow:var(--sh-md)">
      <div style="position:absolute;top:0;right:0;width:240px;height:240px;background-image:radial-gradient(circle at 30% 30%, rgba(255,255,255,.1) 1.5px, transparent 2.5px);background-size:22px 22px;opacity:.5;pointer-events:none"></div>
      <div style="position:absolute;bottom:-60px;left:-30px;width:200px;height:200px;background:radial-gradient(circle, rgba(255,255,255,.15), transparent 70%);border-radius:50%;pointer-events:none"></div>
      <div style="width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,.22);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px;position:relative;border:1px solid rgba(255,255,255,.25);box-shadow:0 4px 12px rgba(0,0,0,.1)">${theme.icon}</div>
      <h2 style="font-size:28px;font-weight:600;position:relative;font-family:'Fraunces';letter-spacing:-.02em">${sec.title}</h2>
      ${sec.description?`<p style="margin-top:8px;opacity:.88;font-size:14.5px;position:relative;line-height:1.5;max-width:680px">${sec.description}</p>`:''}
    </div>
    ${banner}
    <div>${itemsHtml||`<div style="text-align:center;padding:60px 20px;background:var(--card);border-radius:var(--r);border:1px dashed var(--border-d);color:var(--muted)">
      <div style="font-size:46px;margin-bottom:12px">🔜</div>
      <p style="font-weight:700;color:var(--ink)">No lectures in this section yet</p>
      <p style="font-size:13px;margin-top:6px">Lectures will be added soon — check back later!</p>
    </div>`}</div>
  </div>`
}
// AUTO-ISSUE certificate when all lectures in a section are complete
// Returns the existing or newly-created cert, or null if not all done
async function checkAndAutoIssueCert(sectionId){
  if(!sectionId||!U)return null;
  const certs=await db.certs(U.id);
  const existing=certs.find(c=>c.section_id===sectionId);
  if(existing)return existing;
  const lecs=await db.lectures(sectionId);
  if(!lecs.length)return null;
  const comps=await db.completions(U.id);
  for(const lec of lecs){
    const watched=!!comps.find(c=>c.lecture_id===lec.id);
    if(!watched)return null;
    if(lec.has_quiz){
      const passed=await db.hasPassed(U.id,lec.id);
      if(!passed)return null;
    }
  }
  // All lectures complete — auto-issue certificate
  const secs=await db.sections();
  const sec=secs.find(s=>s.id===sectionId);
  if(!sec)return null;
  const code=sec.title.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,4);
  const ref='MH-'+new Date().getFullYear()+'-'+code+'-'+Math.floor(10000+Math.random()*90000);
  const cert={user_id:U.id,section_id:sectionId,ref_number:ref,issued_at:n()};
  const saved=await db.addCert(cert);
  toast('🏆 Certificate earned: '+sec.title+'!','ok');
  return saved||cert;
}

async function issueCert(sid){
  const cert=await checkAndAutoIssueCert(sid);
  if(cert)go('cert',{id:cert.id},{page:'section',par:{id:sid},label:'Back to Section'});
}

    const sortedSteps=Object.keys(stepsGrouped).map(Number).sort((a,b)=>a-b);
    const isDone=async l=>{
      const w=!!comps2.find(c=>c.lecture_id===l.id);
      const p=l.has_quiz?await db.hasPassed(U.id,l.id):true;
      return w&&p;
    };
    const stepDone={};
    for(const s of sortedSteps){
      const r=await Promise.all(stepsGrouped[s].map(isDone));
      stepDone[s]=r.every(Boolean);
    }
    let locked=false;
    if(myStep===0){
      locked=!sortedSteps.every(s=>stepDone[s]);
    } else {
      const prev=sortedSteps.filter(s=>s<myStep);
      locked=prev.some(s=>!stepDone[s]);
    }
    if(locked){
      toast('🔒 Complete the previous step first','er');
      go('section',{id:lec.section_id});
      return;
    }
  }
  const secs=await db.sections(),sec=secs.find(s=>s.id===lec.section_id);

  if(lec.type==='interactive'){
    return pageInteractive(lid);
  }

  vidDone=await db.isCompleted(U.id,lid);
  const passed=lec.has_quiz?await db.hasPassed(U.id,lid):true;

  let content='';
  if(lec.type==='youtube'){
    content=buildYT(lec.url,lid);
  }else if(lec.type==='video'){
    content=buildVideo(lid,lec);
  }else{
    content=buildFileViewer(lid,lec);
  }

  let actionBtns='';
  if(vidDone&&lec.has_quiz&&passed){
    actionBtns=`<div class="al al-ok" style="margin:0;flex:1">✓ Quiz passed!</div>`;
    if(lec.has_quiz) actionBtns+=`<button class="btn bg2 blg" onclick="go('quiz',{id:'${lid}'},{page:'lecture',par:{id:'${lid}'},label:'Back to Lecture'})">↻ Retake Quiz</button>`;
  } else if(lec.has_quiz){
    if(!vidDone){
      actionBtns=`<button class="btn bg2 blg" onclick="markWatchedManual('${lid}')">✓ I've finished — Unlock Quiz</button>`;
    } else {
      actionBtns=`<button id="qbtn" class="btn bp blg" onclick="go('quiz',{id:'${lid}'},{page:'lecture',par:{id:'${lid}'},label:'Back to Lecture'})">📝 Take Quiz</button>`;
    }
  } else {
    if(vidDone){
      actionBtns=`<div class="al al-ok" style="margin:0;flex:1">✓ Marked as viewed</div>`;
    } else {
      actionBtns=`<button class="btn bp blg" onclick="markDone('${lid}')">✓ Mark as complete</button>`;
    }
  }

  // ─── NEXT LECTURE BUTTON ───
  // Show "Next" when current lecture is fully done (watched + passed if quiz)
  const isCurrentDone = vidDone && (lec.has_quiz ? passed : true);
  let nextBtn = '';
  if(isCurrentDone){
    const sortedSecLecs = [...sectionLecs].sort((a,b)=>(a.order_num||0)-(b.order_num||0));
    const curIdx = sortedSecLecs.findIndex(l=>l.id===lid);
    const nextLec = curIdx>=0 && curIdx < sortedSecLecs.length-1 ? sortedSecLecs[curIdx+1] : null;
    if(nextLec){
      // Check if next lecture is locked using same logic as pageSection
      const compsAll = await db.completions(U.id);
      const stepOf2 = l=>l.sequence_step||(l.is_prerequisite?1:0);
      const seqLecs = sectionLecs.filter(l=>stepOf2(l)>0);
      let nextLocked = false;
      if(seqLecs.length){
        const grp = {};
        seqLecs.forEach(l=>{const s=stepOf2(l);(grp[s]=grp[s]||[]).push(l)});
        const sSteps = Object.keys(grp).map(Number).sort((a,b)=>a-b);
        const sDone = {};
        for(const s of sSteps){
          const results = await Promise.all(grp[s].map(async l=>{
            const w = !!compsAll.find(c=>c.lecture_id===l.id);
            const p = l.has_quiz ? await db.hasPassed(U.id,l.id) : true;
            return w && p;
          }));
          sDone[s] = results.every(Boolean);
        }
        const nStep = stepOf2(nextLec);
        if(nStep===0){
          nextLocked = !sSteps.every(s=>sDone[s]);
        } else {
          const prev = sSteps.filter(s=>s<nStep);
          nextLocked = prev.some(s=>!sDone[s]);
        }
      }
      if(nextLocked){
        nextBtn = `<button class="btn bg2 blg" disabled title="Complete the previous step first" style="opacity:.55;cursor:not-allowed">🔒 Next Locked</button>`;
      } else {
        const nextTitle = nextLec.title.length>28 ? nextLec.title.slice(0,28)+'…' : nextLec.title;
        nextBtn = `<button class="btn bp blg" onclick="go('lecture',{id:'${nextLec.id}'},{page:'section',par:{id:'${lec.section_id}'},label:'Back to Section'})" title="${nextLec.title.replace(/"/g,'&quot;')}">${nextTitle} →</button>`;
      }
    } else {
      // Last lecture — offer return to section
      nextBtn = `<button class="btn bmint blg" onclick="go('section',{id:'${lec.section_id}'})">🏁 Finish Section →</button>`;
    }
  }

  document.getElementById('app').innerHTML=bar()+`<div class="pg pg-sm">
    <div class="bc"><a onclick="go('home')">🏠 Home</a><span>›</span><a onclick="go('section',{id:'${sec?sec.id:''}'},{page:'home',par:{},label:'Home'})">${sec?sec.title:''}</a><span>›</span><span>${lec.title}</span></div>
    <div class="ph"><div><h2>${lec.title}</h2></div></div>
    ${!vidDone?`<div class="al al-w" style="margin-bottom:16px">⚠ Watch / review all content to unlock the next step.</div>`:''}
    ${content}
    <div style="display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;align-items:center">
      ${actionBtns}
      ${nextBtn}
    </div>
  </div>`;

  if(lec.type==='youtube')initYTListener(lid);
}

function buildYT(videoId,lid){
  return`<div class="vid-wrap">
    <iframe id="yt-iframe"
      src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}"
      allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
      allowfullscreen></iframe>
  </div>
  <div style="background:var(--pu-mist);border:1.5px solid var(--border);border-radius:11px;padding:11px 16px;font-size:12.5px;color:var(--pu-d);margin-bottom:10px;display:flex;align-items:center;gap:9px;font-weight:500">
    💡 <span>Watch the full video — completion is auto-detected.</span>
  </div>`;
}
function initYTListener(lid){
  const iframe=document.getElementById('yt-iframe');
  if(!iframe)return;
  let playing=false;
  const handler=function(e){
    if(e.source!==iframe.contentWindow)return;
    if(!e.data||typeof e.data!=='string')return;
    try{
      const d=JSON.parse(e.data);
      if(d.event==='onStateChange'){
        if(d.info===1)playing=true;
        if(d.info===0&&playing&&!vidDone){
          (async()=>{
            vidDone=true;
            await db.addCompletion({user_id:U.id,lecture_id:lid,completed_at:n()});
            toast('✓ Video complete!','ok');
            const lec=await db.lecture(lid);
            if(lec)await checkAndAutoIssueCert(lec.section_id);
            await pageLecture(lid);
          })();
        }
      }
    }catch(err){}
  };
  window.addEventListener('message',handler);
  setTimeout(()=>{
    try{
      iframe.contentWindow.postMessage(JSON.stringify({event:'listening'}),'*');
      iframe.contentWindow.postMessage(JSON.stringify({event:'command',func:'addEventListener',args:['onStateChange']}),'*');
    }catch(e){}
  },1000);
}

function buildVideo(lid,lec){
  const fileUrl=lec.file_path||null;
  const localFd=getFile(lid);

    return`<div class="file-viewer"><div class="fv-header"><h4>🎬 ${lec.title}</h4></div>
      <div class="no-file"><div class="nfi">⏳</div><h3>Video not uploaded yet</h3>

  return`<div class="file-viewer">
    <div class="fv-header"><h4>🎬 ${name} ${sizeLabel?`<span style="font-size:11px;opacity:.5;font-weight:500">${sizeLabel}</span>`:''}</h4></div>

function buildFileViewer(lid,lec){
  const fileUrl=lec.file_path||null;
  const localFd=getFile(lid);
  const fd=fileUrl?{url:fileUrl,name:lec.file_name||'File',type:lec.file_type||'',size:0}:localFd;
  if(!fd){
    return`<div class="file-viewer"><div class="fv-header"><h4>📄 ${lec.title}</h4></div>
      <div class="no-file"><div class="nfi">⏳</div><h3>File not uploaded yet</h3>
      <p>The admin has not uploaded this file yet.<br>Please check back later.</p></div></div>`;
  }
  const src=fd.url||fd.data;
  const isPdf=fd.type==='application/pdf'||fd.name.endsWith('.pdf');
  const sizeLabel=fd.size>0?(fd.size>1048576?(fd.size/1048576).toFixed(1)+' MB':Math.round(fd.size/1024)+' KB'):'';
  const isPptx=fd.name.endsWith('.pptx')||fd.name.endsWith('.ppt');
  let viewerHtml='';
  if(isPdf){
    const isLocalData=src.startsWith('data:');
    if(isLocalData){
      viewerHtml=`<iframe class="pdf-frame" id="pdf-iframe" src="${src}#toolbar=0&navpanes=0" onload="onPdfLoad()"></iframe>`;
    } else {
      const gDocsUrl='https://docs.google.com/viewer?url='+encodeURIComponent(src)+'&embedded=true';
      viewerHtml=`<iframe class="pdf-frame" id="pdf-iframe" src="${gDocsUrl}" onload="onPdfLoad()"></iframe>`;
    }
  } else if(isPptx && (fd.url)){
    const gUrl='https://docs.google.com/gview?url='+encodeURIComponent(fd.url)+'&embedded=true';
    viewerHtml=`<iframe class="pdf-frame" id="pdf-iframe" src="${gUrl}" onload="onPdfLoad()"></iframe>`;
  } else {
    viewerHtml=`<div style="padding:54px 30px;text-align:center">
      <div style="font-size:60px;margin-bottom:16px">📊</div>
      <h3 style="color:#fff;font-size:18px;margin-bottom:8px;font-family:'Readex Pro'">${fd.name}</h3>
      <p style="color:rgba(255,255,255,.5);font-size:14px;line-height:1.7;margin-bottom:20px">
        This presentation is ready to view.<br>
        Upload as <strong style="color:var(--pu-l)">PDF format</strong> for best inline display.
      </p>
    </div>`;
  }

  return`<div class="file-viewer" oncontextmenu="return false">
    <div class="fv-header">
      <h4>📄 ${fd.name} ${sizeLabel?`<span style="font-size:11px;opacity:.5;font-weight:500">${sizeLabel}</span>`:''}</h4>
    </div>
    ${viewerHtml}
    <div class="fv-footer">
      <span style="color:rgba(255,255,255,.6);font-size:13px">
        👁 ${isPdf?'Scroll through all pages to review':'View all slides carefully'} — view only
      </span>
    </div>
  </div>`;
}

let QS={};
async function pageQuiz(lid){
  const lec=await db.lecture(lid);if(!lec){go('home');return}
  const all=await db.questions(lid);
  if(!all.length){toast('No questions available yet','er');return}
  const quizCount=Math.min(lec.quiz_count||10, all.length);
  const seed=Date.now();
  const shuffleArr=arr=>[...arr].map(v=>({v,s:Math.sin(seed*Math.random())})).sort((a,b)=>a.s-b.s).map(x=>x.v);
  const picked=shuffleArr(all).slice(0,quizCount);
  const qs=picked.map(q=>{
    const opts=shuffleArr([
      {key:'a',text:q.option_a,correct:q.correct_answer==='a'},
      {key:'b',text:q.option_b,correct:q.correct_answer==='b'},
      {key:'c',text:q.option_c,correct:q.correct_answer==='c'},
      {key:'d',text:q.option_d,correct:q.correct_answer==='d'}
    ]);
    return{...q,shuffled:opts};
  });
  QS={lid,qs,cur:0,ans:{},time:20*60,ti:null,done:false};renderQ();
  QS.ti=setInterval(()=>{
    QS.time--;
    const el=document.getElementById('qtimer');
    if(el){const m=String(Math.floor(QS.time/60)).padStart(2,'0'),s=String(QS.time%60).padStart(2,'0');
      el.textContent='⏱ '+m+':'+s;if(QS.time<120)el.classList.add('red');}
    if(QS.time<=0){clearInterval(QS.ti);submitQ();}
  },1000);
}
function renderQ(){
  const q=QS.qs[QS.cur],tot=QS.qs.length,cur=QS.cur+1,sel=QS.ans[QS.cur];
  const m=String(Math.floor(QS.time/60)).padStart(2,'0'),s=String(QS.time%60).padStart(2,'0');
  const letters=['a','b','c','d'];
  const opts=q.shuffled.map((opt,i)=>{
    const k=letters[i];
    return`<div class="opt ${sel===k?'sel':''}" onclick="selOpt('${k}')">
      <div class="opt-l">${k.toUpperCase()}</div><span>${opt.text}</span></div>`;
  }).join('');
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:760px">
    <div class="q-hdr">
      <div><div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:'Readex Pro'">Question ${cur} of ${tot}</div>
        <div class="pbar" style="width:240px;height:9px"><div class="pfill" style="width:${((cur/tot)*100).toFixed(0)}%"></div></div></div>
      <div id="qtimer" class="timer ${QS.time<120?'red':''}">⏱ ${m}:${s}</div>
    </div>
    <div class="q-card"><div class="q-num">Question ${cur}</div><div class="q-txt">${q.question_text}</div><div class="opts">${opts}</div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <button class="btn bg2" onclick="qnav(-1)" ${QS.cur===0?'disabled':''}>← Previous</button>
      <span style="font-size:13px;color:var(--muted);font-weight:700;font-family:'Readex Pro'">${Object.keys(QS.ans).length}/${tot} answered</span>
      ${QS.cur<tot-1?`<button class="btn bp" onclick="qnav(1)">Next →</button>`:`<button class="btn bn blg" onclick="submitQ()">Submit ✓</button>`}
    </div>
  </div>`
}
function selOpt(k){QS.ans[QS.cur]=k;renderQ()}
function qnav(d){QS.cur+=d;renderQ()}
async function submitQ(){
  if(QS.done)return;QS.done=true;clearInterval(QS.ti);
  const qs=QS.qs;let ok=0;
  qs.forEach((q,i)=>{
    const letters=['a','b','c','d'];
    const selectedIdx=letters.indexOf(QS.ans[i]);
    if(selectedIdx>=0&&q.shuffled[selectedIdx]?.correct)ok++;
  });
  const score=Math.round(ok/qs.length*100),passed=score===100;
  await db.addAttempt({user_id:U.id,lecture_id:QS.lid,score,passed,attempted_at:n()});
  if(passed){
    const lec=await db.lecture(QS.lid);
    if(lec)await checkAndAutoIssueCert(lec.section_id);
  }
  document.getElementById('app').innerHTML=bar()+`<div class="pg" style="max-width:620px">
    <div class="card" style="text-align:center;padding:54px 38px">
      <div class="r-circle ${passed?'r-pass':'r-fail'}">${passed?'100%':score+'%'}</div>
      <h2 style="font-size:32px;color:var(--ink);margin-bottom:10px;font-family:'Fraunces';font-weight:600">${passed?'🎉 Excellent!':'😔 Not Passed'}</h2>
      <p style="color:var(--muted);margin-bottom:28px;font-size:15px;line-height:1.6">You got ${ok} out of ${qs.length} correct. ${passed?'Congratulations! 🎉':'You need 100% to earn the certificate. Please retry.'}</p>
      <div style="background:var(--pu-mist);border-radius:16px;padding:24px;margin-bottom:30px;display:grid;grid-template-columns:1fr 1fr;gap:20px;border:1px solid var(--border)">
        <div><div style="font-size:32px;font-weight:800;color:var(--ok);font-family:'Readex Pro'">${ok}</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Correct</div></div>
        <div><div style="font-size:32px;font-weight:800;color:var(--err);font-family:'Readex Pro'">${qs.length-ok}</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Incorrect</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${passed
          ?`<button class="btn bp blg" onclick="goAfterQ()">View My Progress →</button>`
          :`<button class="btn bp blg" onclick="go('lecture',{id:'${QS.lid}'},{page:'home',par:{},label:'Home'})">↻ Retake Quiz</button>`
        }
      </div>
    </div>
  </div>`
}
async function goAfterQ(){const lec=await db.lecture(QS.lid);go('section',{id:lec.section_id})}

function handleLogoUpload(input){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('logo-status');
  if(file.size>1024*1024){
    if(st)st.innerHTML=`<span style="color:var(--err);font-weight:700">⚠ File too large (${(file.size/1048576).toFixed(2)} MB). Max 1 MB.</span>`;
    return;
  }
  if(st)st.textContent='Reading...';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      setCustomLogo(e.target.result);
      toast('🎨 Logo updated! Reloading...','ok');
      setTimeout(()=>location.reload(),900);
    }catch(err){
      if(st)st.innerHTML=`<span style="color:var(--err)">❌ Could not save (storage full)</span>`;
    }
  };
  reader.onerror=()=>{if(st)st.innerHTML=`<span style="color:var(--err)">❌ Read failed</span>`};
  reader.readAsDataURL(file);
}
function resetLogo(){
  if(!confirm('Reset to default logo?'))return;
  setCustomLogo(null);
  toast('Logo reset to default','ok');
  setTimeout(()=>location.reload(),700);
}

async function deleteCert(id){

  if(SB){
    const {error}=await SB.from('lms_certs').delete().eq('id',id);
    if(error){toast('❌ '+error.message,'er');return;}
  }
  ls2('certs',ls('certs').filter(c=>c.id!==id));
  toast('Certificate deleted','ok');
  await pageAdminCerts();
}
async function exportExcel(){
  const users=await db.users(),secs=await db.sections();
  const comps=await db.allCompletions(),atts=await db.allAttempts(),certs=await db.allCerts();
  const emps=users.filter(u=>u.role==='employee');
  const rows=[];
  rows.push(['Employee Name','Employee #','File #','Iqama #','Section','Lecture','Status','Best Score','Certificate Ref']);
  for(const emp of emps){
    const ec=comps.filter(c=>c.user_id===emp.id);
    const ea=atts.filter(a=>a.user_id===emp.id);
    const ecc=certs.filter(c=>c.user_id===emp.id);
    for(const sec of secs){
      const lecs=await db.lectures(sec.id);
      const sc=ecc.find(c=>c.section_id===sec.id);
      for(const lec of lecs){
        const w=ec.find(c=>c.lecture_id===lec.id)?'Watched':'Not watched';
        const la=ea.filter(a=>a.lecture_id===lec.id);
        const bs=la.length?String(Math.max(...la.map(a=>a.score)))+'%':'-';
        rows.push([emp.name,emp.badge_id,emp.file_number||'-',emp.iqama_number,sec.title,lec.title,w,bs,sc?sc.ref_number:'-']);
      }
    }
  }
  const q=function(v){return '"'+String(v).split('"').join('""')+'"';};
  const nl=String.fromCharCode(13)+String.fromCharCode(10);
  const csvStr=rows.map(function(r){return r.map(q).join(',');}).join(nl);
  const bom=String.fromCharCode(65279);
  const blob=new Blob([bom+csvStr],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='Meena_Training_Report.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Report downloaded!','ok');
}

async function pageAdminSections(){
  const secs=await db.sections();
  const users=await db.users();
  const allComps=await db.allCompletions();
  const allCerts=await db.allCerts();
  const allAtts=await db.allAttempts();
  const employees=users.filter(u=>u.role==='employee');
  const totalEmps=employees.length;

  // Compute engagement per section
  const secStats={};
  for(const s of secs){
    const lecs=ls('lectures').filter(l=>l.section_id===s.id);
    const lecIds=lecs.map(l=>l.id);
    // started = at least one lecture watched in this section
    const startedSet=new Set();
    allComps.filter(c=>lecIds.includes(c.lecture_id)).forEach(c=>startedSet.add(c.user_id));
    // completed = ALL lectures done (watched + passed if quiz)
    let completedCount=0;
    for(const emp of employees){
      if(!lecs.length){break;}
      let allDone=true;
      for(const lec of lecs){
        const w=allComps.find(c=>c.user_id===emp.id&&c.lecture_id===lec.id);
        if(!w){allDone=false;break;}
        if(lec.has_quiz){
          const p=allAtts.some(a=>a.user_id===emp.id&&a.lecture_id===lec.id&&a.passed);
          if(!p){allDone=false;break;}
        }
      }
      if(allDone)completedCount++;
    }
    const certCount=allCerts.filter(c=>c.section_id===s.id).length;
    secStats[s.id]={lecs:lecs.length,started:startedSet.size,completed:completedCount,certs:certCount};
  }

  const rows=secs.map(s=>{
    const t=themeFor(s.title);
    const st=secStats[s.id];
    const startedPct=totalEmps?Math.round(st.started/totalEmps*100):0;
    const completedPct=totalEmps?Math.round(st.completed/totalEmps*100):0;
    return`<tr><td>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:42px;height:42px;border-radius:11px;background:${t.grad};display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--sh)">${t.icon}</div>
        <div><strong style="color:var(--ink)">${s.title}</strong><br><span style="font-size:12px;color:var(--muted)">${s.description||''}</span></div>
      </div>
    </td>
    <td><span class="chip cp">${st.lecs} ${st.lecs===1?'lecture':'lectures'}</span></td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <span style="font-family:'Readex Pro';font-weight:700;color:var(--ink);font-size:14px">${st.started}</span>
      <span style="font-size:11px;color:var(--muted)">/ ${totalEmps}</span>
      ${st.started>0?`<div class="pbar" style="width:60px;height:6px"><div class="pfill" style="width:${startedPct}%;background:linear-gradient(90deg,var(--sky),#7BA3D9)"></div></div>`:''}
    </div></td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <span style="font-family:'Readex Pro';font-weight:700;color:${st.completed>0?'var(--ok)':'var(--muted)'};font-size:14px">${st.completed}</span>
      <span style="font-size:11px;color:var(--muted)">/ ${totalEmps}</span>
      ${st.completed>0?`<div class="pbar" style="width:60px;height:6px"><div class="pfill" style="width:${completedPct}%;background:linear-gradient(90deg,var(--ok),#8FA88E)"></div></div>`:''}
    </div></td>
    <td>${st.certs>0?`<span class="chip" style="background:var(--gold-soft);color:#854D0E;border:1px solid #FDE68A">🏆 ${st.certs}</span>`:'<span style="color:var(--muted);font-size:12px">—</span>'}</td>
    <td><div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bo bsm" onclick="go('alectures',{id:'${s.id}'},{page:'asections',par:{},label:'Sections'})">📖 Lectures</button>
      <button class="btn bg2 bsm" onclick="openSecModal('${s.id}')">✏</button>
      <button class="btn bd bsm" onclick="delSec('${s.id}')">🗑</button>
    </div></td></tr>`;
  }).join('');

  document.getElementById('app').innerHTML=bar()+`<div class="pg">
    <div class="bc"><a onclick="go('adash')">Dashboard</a><span>›</span><span>Sections</span></div>
    <div class="ph"><div><h2>Training Sections</h2><p>Engagement & completion per section across ${totalEmps} ${totalEmps===1?'nurse':'nurses'}</p></div><button class="btn bp" onclick="openSecModal()">+ New Section</button></div>
    <div class="tw"><table><thead><tr><th>Section</th><th>Lectures</th><th>👀 Started</th><th>✅ Completed</th><th>🏆 Certs</th><th>Actions</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:48px;color:var(--muted)">No sections yet.</td></tr>'}</tbody></table></div>
  </div><div id="md"></div>`

async function moveLec(id,sid,dir){
  const lecs=await db.lectures(sid);
  const idx=lecs.findIndex(l=>l.id===id);
  const targetIdx=idx+dir;
  if(targetIdx<0||targetIdx>=lecs.length)return;
  const a=lecs[idx],b=lecs[targetIdx];
  const aOrder=a.order_num||(idx+1),bOrder=b.order_num||(targetIdx+1);
  try{
    await db.updLecture(a.id,{order_num:bOrder});
    await db.updLecture(b.id,{order_num:aOrder});
    toast('✅ Order updated','ok');
    pageAdminLectures(sid);
  }catch(e){toast('❌ '+e.message,'er');}
}

let _pendingFile=null;
function handleAdminUpload(lid,input,isVideo){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('up-status');
  const maxBytes=(isVideo?50:8)*1024*1024;
  if(file.size>maxBytes){if(st)st.innerHTML=`<span style="color:var(--err)">⚠ File too large (${(file.size/1048576).toFixed(1)} MB). Max ${isVideo?50:8} MB.</span>`;return}
  if(st)st.textContent='Reading file...';
  const reader=new FileReader();
  reader.onload=e=>{
    _pendingFile={data:e.target.result,name:file.name,type:file.type,size:file.size};
    const uz=document.getElementById('uz');
    if(uz){uz.classList.add('has-file');uz.innerHTML=`<div style="font-size:38px;margin-bottom:8px">✅</div><div style="font-weight:700;color:#065F46;font-family:'Readex Pro'">${file.name}</div><div style="font-size:12px;color:var(--muted);margin-top:5px">${(file.size/1048576).toFixed(2)} MB</div>`;}
    if(st)st.innerHTML=`<span style="color:var(--ok);font-weight:700">✅ File ready to save</span>`;
    const btn=document.getElementById('save-btn');if(btn)btn.disabled=false;
  };
  reader.onerror=()=>{if(st)st.innerHTML=`<span style="color:var(--err)">❌ Error reading file</span>`;};
  reader.readAsDataURL(file);
}
async function finishUpload(lid){
  if(!_pendingFile){toast('No file','er');return}
  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='Uploading...';}
  try{
    if(SB){
      const path='lectures/'+lid+'/'+_pendingFile.name;
      const byteStr=atob(_pendingFile.data.split(',')[1]);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:_pendingFile.type});
      const {error}=await SB.storage.from('lms-files').upload(path,blob,{upsert:true,contentType:_pendingFile.type});
      if(error)throw new Error(error.message);
      const {data}=SB.storage.from('lms-files').getPublicUrl(path);
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type,file_path:data.publicUrl});
      saveFile(lid,{..._pendingFile,url:data.publicUrl});
      toast('✅ File uploaded to cloud!','ok');
    } else {
      const ok=saveFile(lid,_pendingFile);
      if(!ok)throw new Error('Browser storage full. Connect Supabase to upload larger files.');
      await db.updLecture(lid,{file_name:_pendingFile.name,file_type:_pendingFile.type});
      toast('✅ File uploaded!','ok');
    }
    _pendingFile=null;cmo();pageAdminLectures(PAR.id);
  }catch(e){
    toast('❌ '+e.message,'er');
    if(btn){btn.disabled=false;btn.textContent='💾 Save';}
  }
}

function loadBulkExample(){
  document.getElementById('bulk-text').value=`Q: What is the most important step before any nursing procedure?
A) Wear gloves
B) Hand hygiene
C) Identify the patient
D) Document the time
Correct: C

Q: Normal adult resting heart rate is:
A) 30-50 bpm
B) 60-100 bpm
C) 100-140 bpm
D) 140-180 bpm
Correct: B`;
}
function parseBulkQuestions(text){
  const blocks=text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  const questions=[],errors=[];
  blocks.forEach((block,i)=>{
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    let qText='',opts={},correct='';
    let foundQ=false;
    for(const line of lines){
      if(/^Q[:\.\)]/i.test(line)){qText=line.replace(/^Q[:\.\)]\s*/i,'').trim();foundQ=true;}
      else if(/^A[:\.\)]/i.test(line)){opts.a=line.replace(/^A[:\.\)]\s*/i,'').trim();}
      else if(/^B[:\.\)]/i.test(line)){opts.b=line.replace(/^B[:\.\)]\s*/i,'').trim();}
      else if(/^C[:\.\)]/i.test(line)){opts.c=line.replace(/^C[:\.\)]\s*/i,'').trim();}
      else if(/^D[:\.\)]/i.test(line)){opts.d=line.replace(/^D[:\.\)]\s*/i,'').trim();}
      else if(/^Correct[:\s]/i.test(line)){correct=line.replace(/^Correct[:\s]+/i,'').trim().toLowerCase().charAt(0);}
    }
    if(!foundQ){errors.push(`Block ${i+1}: Missing question (Q: ...)`);return;}
    if(!opts.a||!opts.b||!opts.c||!opts.d){errors.push(`Q${i+1}: Missing options A/B/C/D`);return;}
    if(!['a','b','c','d'].includes(correct)){errors.push(`Q${i+1}: Invalid correct answer`);return;}
    questions.push({question_text:qText,option_a:opts.a,option_b:opts.b,option_c:opts.c,option_d:opts.d,correct_answer:correct});
  });
  return{questions,errors};
}
function previewBulk(){
  const text=document.getElementById('bulk-text').value;
  const{questions,errors}=parseBulkQuestions(text);
  let html='';
  if(errors.length){html+=`<div class="al" style="background:var(--err-l);color:#9F1239;border-color:#FCA5A5">⚠ <strong>${errors.length} issue${errors.length>1?'s':''}:</strong><br>${errors.join('<br>')}</div>`;}
  if(questions.length){
    html+=`<div class="al al-ok">✅ Parsed <strong>${questions.length} question${questions.length>1?'s':''}</strong> ready to save</div>`;
    html+=`<div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:11px;padding:14px;background:var(--pu-mist)">`;
    questions.forEach((q,i)=>{
      html+=`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);font-size:13px">
        <strong>Q${i+1}.</strong> ${q.question_text}<br>
        <span style="color:${q.correct_answer==='a'?'var(--ok)':'var(--muted)'}">A) ${q.option_a}</span><br>
        <span style="color:${q.correct_answer==='b'?'var(--ok)':'var(--muted)'}">B) ${q.option_b}</span><br>
        <span style="color:${q.correct_answer==='c'?'var(--ok)':'var(--muted)'}">C) ${q.option_c}</span><br>
        <span style="color:${q.correct_answer==='d'?'var(--ok)':'var(--muted)'}">D) ${q.option_d}</span>
        <span style="margin-left:8px;color:var(--ok);font-weight:700">✓ Correct: ${q.correct_answer.toUpperCase()}</span>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById('bulk-preview').innerHTML=html;
}
async function saveBulk(){
  const text=document.getElementById('bulk-text').value;
  const{questions,errors}=parseBulkQuestions(text);
  if(errors.length){toast(`⚠ Fix ${errors.length} error${errors.length>1?'s':''} first`,'er');previewBulk();return;}
  if(!questions.length){toast('No valid questions found','er');return;}
  if(!confirm(`Add ${questions.length} questions?`))return;
  let added=0;
  for(const q of questions){
    try{
      await db.addQuestion({lecture_id:_bulkLid,...q,created_at:n()});
      added++;
    }catch(e){console.error('Q save:',e);}
  }
  toast(`✅ Added ${added} question${added>1?'s':''}!`,'ok');cmo();pageAdminQuestions(_bulkLid);
}

function handleSlideUpload(input){

  r.onload=e=>{document.getElementById('sm').value=e.target.result;toast('✓ Image loaded','ok');};
  r.readAsDataURL(f);

    explanation:document.getElementById('sex').value.trim()
  };

      💡 ${slide.question?'Answer the checkpoint question to advance':'Read carefully and continue when ready'}

}
function selectIntOpt(i){if(INT_STATE.answered)return;INT_STATE.selected=i;renderInteractive();}
function submitSlideAnswer(){INT_STATE.answered=true;if(INT_STATE.selected!==INT_STATE.slides[INT_STATE.idx].correct)INT_STATE.wrong++;renderInteractive();}
function retrySlide(){INT_STATE.answered=false;INT_STATE.selected=undefined;renderInteractive();}
function nextSlide(){
  INT_STATE.idx++;INT_STATE.answered=false;INT_STATE.selected=undefined;
  setSlideProg(INT_STATE.lid,U.id,INT_STATE.idx);
  renderInteractive();
}
function prevSlide(){
  INT_STATE.idx=Math.max(0,INT_STATE.idx-1);
  INT_STATE.answered=false;INT_STATE.selected=undefined;
  renderInteractive();
}
async function finishInteractive(){
  const{lid,hasQuiz,sec}=INT_STATE;
  await db.addCompletion({user_id:U.id,lecture_id:lid,completed_at:n()});
  setSlideProg(lid,U.id,0);
  if(!hasQuiz)await checkAndAutoIssueCert(sec);
  if(hasQuiz){toast('🎉 Lecture complete! Now the quiz...','ok');setTimeout(()=>go('quiz',{id:lid}),700);}
  else{toast('🎉 Lecture complete!','ok');setTimeout(()=>go('section',{id:sec}),700);}
}
